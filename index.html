              <div style={{width:"2px", height:"8px",
                background: active
                  ? "linear-gradient(180deg,rgba(74,219,148,.38),rgba(74,158,219,.38))"
                  : "rgba(255,255,255,.06)"}}/>
            </div>
          );
        })}
      </div>

      {/* ── Pipe GRDF — connexion depuis injection Vue 1 (← gauche) ── */}
      <div style={{flexShrink:0, height:"18px", position:"relative"}}>
        <div style={{position:"absolute", left:0, top:0, bottom:0, display:"flex",
          alignItems:"center", paddingLeft:"10px", zIndex:5}}>
          <div style={{fontSize:"6px", color:"rgba(74,158,219,.55)", fontWeight:700, letterSpacing:".03em"}}>← Inj.</div>
        </div>
        <div style={{position:"absolute", top:"50%", transform:"translateY(-50%)",
          left:0, right:0, height:"5px",
          background:"linear-gradient(90deg,rgba(74,158,219,.95),rgba(74,158,219,.85),rgba(74,158,219,.45))",
          boxShadow:"0 0 10px rgba(74,158,219,.4)", borderRadius:"0 3px 3px 0", overflow:"hidden"}}>
          {[0,1,2,3,4].map(i => (
            <div key={i} style={{position:"absolute", top:"50%", transform:"translateY(-50%)",
              width:"7px", height:"7px", borderRadius:"50%",
              background:"rgba(200,230,255,.9)", boxShadow:"0 0 5px rgba(200,230,255,.8)",
              animation:`gnvFlow ${2 + i * 0.28}s ${-(i * 0.55)}s infinite linear`}}/>
          ))}
        </div>
      </div>

      {/* ── Route de retour L→R — véhicules clients devant les bâtiments ── */}
      <div style={{flexShrink:0, height:"30px", position:"relative", overflow:"hidden",
        background:"#141e2e",
        borderTop:"2px solid rgba(240,80,180,.45)",
        borderBottom:"2px solid rgba(240,80,180,.28)"}}>
        {/* Marquage central rose */}
        <div style={{position:"absolute", top:"50%", transform:"translateY(-50%)",
          left:0, right:0, height:"2px",
          backgroundImage:"repeating-linear-gradient(90deg,rgba(240,80,180,.32) 0,rgba(240,80,180,.32) 6px,transparent 6px,transparent 14px)"}}/>
        {/* Véhicules L→R (retour) — face droite */}
        {retRoadVeh.map(v => (
          <div key={v.id} style={{
            position:"absolute", top:"5px", fontSize:"13px", lineHeight:"16px",
            animation:"gnvRetLR 6.5s linear 1 forwards",
            transform:"scaleX(-1)",
          }}>
            {v.icon}
          </div>
        ))}
      </div>

      {/* ── Bâtiments réseau aval (consommateurs raccordés) ── */}
      <div style={{flexShrink:0, height:"40px", position:"relative"}}>
        {[8, 22, 40, 58, 72, 88].map((xPct, i) => {
          const bw = [16,12,20,14,18,10][i];
          const bh = [14,10,20,12,16,9][i];
          const ic = i===2 ? "🏭" : i===4 ? "🏬" : i===1 ? "🏢" : "🏠";
          return (
            <div key={i} style={{position:"absolute", top:0, left:`${xPct}%`,
              transform:"translateX(-50%)", display:"flex", flexDirection:"column", alignItems:"center"}}>
              <div style={{width:"1px", height:"5px", background:"rgba(74,158,219,.22)"}}/>
              <div style={{width:`${bw}px`, height:`${bh}px`,
                background:"rgba(74,158,219,.07)", border:"1px solid rgba(74,158,219,.12)",
                borderRadius:"0 0 2px 2px"}}/>
              <div style={{fontSize:"7px", lineHeight:1, marginTop:"1px"}}>{ic}</div>
            </div>
          );
        })}
      </div>

      {/* Spacer */}
      <div style={{flex:1}}/>

      {/* ── Stats footer ── */}
      <div style={{flexShrink:0, height:"26px", display:"flex", gap:"8px", alignItems:"center",
        justifyContent:"center", padding:"0 12px",
        background:"rgba(7,14,25,.7)", borderTop:"1px solid rgba(255,255,255,.05)"}}>
        <span style={{fontSize:"8px", color:"rgba(255,255,255,.4)"}}>
          ⛽ GNV : <strong style={{color:"#4ADB94"}}>{fmt(gnvBm)}</strong> m³
        </span>
        <span style={{fontSize:"8px", color:"rgba(255,255,255,.15)"}}>·</span>
        <span style={{fontSize:"8px", color:"rgba(255,255,255,.4)"}}>
          Stations : <strong style={{color: gnvStations > 0 ? "#4ADB94" : "rgba(255,255,255,.3)"}}>{gnvStations}/3</strong>
        </span>
        {gnvConverted > 0 && (
          <>
            <span style={{fontSize:"8px", color:"rgba(255,255,255,.15)"}}>·</span>
            <span style={{fontSize:"8px", color:"rgba(240,80,180,.85)"}}>🚜 ×{gnvConverted} GNV</span>
          </>
        )}
      </div>
    </div>
  );
}

// ─── AGRANDISSEMENT SECTION ───────────────────────────────────────────────────
function AgrandissementSection({ digesteurs, euros, bmPerHour, chargePct, chargeMaxEff, onBuy }) {
  const nextCost  = digesteurs < 3 ? DIGESTEUR_COSTS[digesteurs - 1] : null;
  const canBuy    = nextCost !== null && euros >= nextCost;
  const slots     = [1, 2, 3];

  return (
    <div style={{
      marginTop:"14px", borderRadius:"18px", overflow:"hidden",
      border:"1px solid rgba(109,181,236,.2)", background:"rgba(11,22,35,.55)"
    }}>
      {/* Header */}
      <div style={{
        padding:"12px 16px 10px", borderBottom:"1px solid rgba(109,181,236,.1)",
        display:"flex", justifyContent:"space-between", alignItems:"center"
      }}>
        <div>
          <div style={{fontSize:"12px", fontWeight:700, color:"rgba(255,255,255,.82)", display:"flex", alignItems:"center", gap:"6px"}}>
            <MiniDigesterIcon size={14}/> Agrandissement du site
          </div>
          <div style={{fontSize:"10px", color:"rgba(255,255,255,.35)", marginTop:"2px"}}>
            Digesteurs supplémentaires · capacité ×{digesteurs} actuellement
          </div>
        </div>
        <div style={{
          fontSize:"13px", fontWeight:800,
          color:"#6DB5EC", padding:"3px 12px", borderRadius:"20px",
          background:"rgba(74,158,219,.15)", border:"1px solid rgba(74,158,219,.3)"
        }}>
          ×{digesteurs} digesteur{digesteurs > 1 ? "s" : ""}
        </div>
      </div>

      <div style={{padding:"14px 16px", display:"flex", flexDirection:"column", gap:"12px"}}>

        {/* Slots digesteurs */}
        <div style={{display:"flex", gap:"8px"}}>
          {slots.map(n => {
            const active = n <= digesteurs;
            const isCurrent = n === digesteurs;
            const isNext = n === digesteurs + 1;
            const cost = n > 1 ? DIGESTEUR_COSTS[n - 2] : null;
            return (
              <div key={n} style={{
                flex:1, padding:"10px 6px", borderRadius:"12px", textAlign:"center",
                background: active
                  ? isCurrent ? "rgba(74,158,219,.2)" : "rgba(74,158,219,.1)"
                  : "rgba(255,255,255,.04)",
                border:`1px solid ${active ? "rgba(74,158,219,.45)" : "rgba(255,255,255,.08)"}`,
                transition:"all .5s"
              }}>
                <div style={{filter: active ? "drop-shadow(0 0 8px rgba(74,158,219,.7))" : "grayscale(90%) opacity(0.3)"}}>
                  <MiniDigesterIcon size={22}/>
                </div>
                <div style={{
                  fontSize:"9px", fontWeight:700, marginTop:"4px",
                  color: active ? "#6DB5EC" : "rgba(255,255,255,.25)"
                }}>
                  Digesteur {n}
                </div>
                <div style={{
                  fontSize:"8px", marginTop:"2px",
                  color: active ? "rgba(74,158,219,.7)" : "rgba(255,255,255,.2)"
                }}>
                  {active ? (isCurrent && digesteurs < 3 ? "🟢 actif" : "✅ actif") : cost ? fmtEuro(cost) : ""}
                </div>
                {/* Barre charge mini */}
                {active && isCurrent && (
                  <div style={{marginTop:"5px", height:"3px", borderRadius:"2px", background:"rgba(74,158,219,.15)"}}>
                    <div style={{
                      height:"100%", borderRadius:"2px",
                      width:`${chargePct * 100}%`,
                      background: chargePct > .5
                        ? "linear-gradient(90deg,#2A7DBB,#6DB5EC)"
                        : "linear-gradient(90deg,#7A3000,#FF9900)",
                      transition:"width .3s"
                    }}/>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Stats capacité */}
        <div style={{
          display:"flex", gap:"8px",
          padding:"10px 12px", borderRadius:"10px",
          background:"rgba(74,158,219,.06)", border:"1px solid rgba(74,158,219,.12)"
        }}>
          {[
            {icon:<MiniDigesterIcon/>, label:"Digesteurs", val:`${digesteurs} / 3`},
            {icon:"🔋", label:"Charge max",   val:fmt(chargeMaxEff)},
            {icon:"⚡", label:"Prod./heure", val:bmPerHour > 0 ? fmt(bmPerHour) : "—"},
          ].map(s => (
            <div key={s.label} style={{flex:1, textAlign:"center"}}>
              <div style={{fontSize:"14px"}}>{s.icon}</div>
              <div style={{fontSize:"12px", fontWeight:800, color:"#6DB5EC", marginTop:"2px"}}>{s.val}</div>
              <div style={{fontSize:"8px", color:"rgba(255,255,255,.4)", marginTop:"1px"}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Bouton achat */}
        {digesteurs < 3 ? (
          <button onClick={onBuy} disabled={!canBuy} style={{
            width:"100%", padding:"12px 14px", borderRadius:"12px", border:"none",
            background: canBuy
              ? "linear-gradient(135deg,#1A5FA8,#2A7DBB)"
              : "rgba(255,255,255,.05)",
            color: canBuy ? "white" : "rgba(255,255,255,.28)",
            fontWeight:800, fontSize:"13px",
            cursor: canBuy ? "pointer" : "not-allowed",
            boxShadow: canBuy ? "0 4px 18px rgba(42,125,187,.45)" : "none",
            transition:"all .3s", textAlign:"left"
          }}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <span style={{display:"inline-flex",alignItems:"center",gap:"6px"}}><MiniDigesterIcon size={14}/> Ajouter Digesteur {digesteurs + 1} — {DIGESTEUR_LABELS[digesteurs - 1]}</span>
              <span style={{
                fontSize:"11px", background:"rgba(255,255,255,.12)",
                padding:"2px 10px", borderRadius:"8px", whiteSpace:"nowrap", marginLeft:"8px"
              }}>
                {fmtEuro(DIGESTEUR_COSTS[digesteurs - 1])}
              </span>
            </div>
            <div style={{fontSize:"10px", color: canBuy ? "rgba(255,255,255,.55)" : "rgba(255,255,255,.25)", marginTop:"3px"}}>
              {canBuy
                ? `Production × ${digesteurs + 1} — capacité charge ${fmt(CHARGE_MAX * (digesteurs + 1))}`
                : `Manque ${fmtEuro(Math.max(0, DIGESTEUR_COSTS[digesteurs - 1] - euros))}`}
            </div>
          </button>
        ) : (
          <div style={{
            padding:"10px 14px", borderRadius:"12px",
            background:"rgba(74,158,219,.1)", border:"1px solid rgba(74,158,219,.3)",
            fontSize:"12px", color:"#6DB5EC", fontWeight:700, textAlign:"center"
          }}>
            🏆 Site maximum atteint — 3 digesteurs actifs !
          </div>
        )}

        {/* Info pédago */}
        <div style={{
          padding:"8px 10px", borderRadius:"9px",
          background:"rgba(255,255,255,.03)", border:"1px solid rgba(255,255,255,.07)",
          fontSize:"10px", color:"rgba(255,255,255,.45)", lineHeight:1.6
        }}>
          💡 En France, les installations de biométhane varient de quelques centaines à plusieurs milliers de m³/h.
          L'agrandissement progressif d'un site existant est souvent plus rentable qu'un nouveau raccordement.
        </div>
      </div>
    </div>
  );
}

// ─── DIGESTEUR SCENE ──────────────────────────────────────────────────────────
// Scène principale avec dézoom animé + N digesteurs côte à côte
// ─── CITY ZONE — une zone d'intrant sur la vue ville (SVG) ───────────────────
// Rend une zone stylisée + pin de priorité. Les animations sont des CSS
// transform/opacity (légères, OK sur mobile).
function CityZone({ zone, owned, pinned, onTogglePin, upgradeUnlocked, priceLabel, iconEmoji, zoneState, fillPct, offlineUntil, onRelaunch, relaunchCost, relaunchAffordable, canPayLabel, relaunchAnim }) {
  const { x, y, label } = zone;
  const locked = !upgradeUnlocked;
  const activeBuilding = !locked && owned > 0;
  // v24 : état visuel dérivé
  const isWarn      = activeBuilding && zoneState === 'warn';
  const isSaturated = activeBuilding && zoneState === 'saturated';
  const isOffline   = activeBuilding && zoneState === 'offline';
  // Couleurs de jauge selon l'état
  const gaugeColor = isOffline ? '#E05858'
                   : isSaturated ? '#E05858'
                   : isWarn ? '#E07820'
                   : fillPct > 0.5 ? '#E8A020'
                   : '#4A9EDB';
  // Countdown de panne (mm:ss restantes)
  const [nowTs, setNowTs] = useState(Date.now());
  useEffect(() => {
    if (!isOffline) return;
    const id = setInterval(() => setNowTs(Date.now()), 1000);
    return () => clearInterval(id);
  }, [isOffline]);
  const panneRemain = isOffline && offlineUntil ? Math.max(0, offlineUntil - nowTs) : 0;
  const mm = Math.floor(panneRemain / 60000);
  const ss = Math.floor((panneRemain % 60000) / 1000);
  const panneTimeStr = `${mm}:${String(ss).padStart(2, '0')}`;

  return (
    <g>
      {/* Socle / carré stylisé qui abrite la zone (couleur selon type) */}
      <g transform={`translate(${x} ${y})`} style={{opacity: locked ? 0.38 : (isOffline ? 0.55 : 1), transition:"opacity .4s"}}>
        <ZoneBuilding label={label} locked={locked} active={activeBuilding && !isOffline} icon={iconEmoji}/>
        {/* Label sous la zone */}
        <text y={24} textAnchor="middle" fontSize="7" fill={locked ? "rgba(232,160,32,.7)" : "rgba(255,255,255,.78)"} style={{letterSpacing:".04em",fontWeight:700,textTransform:"uppercase"}}>
          {locked ? `🔒 ${priceLabel}` : label}
        </text>
        {/* v24 : jauge de remplissage du gisement local (barre verticale à droite du bâtiment) */}
        {activeBuilding && (
          <g>
            {/* Cadre */}
            <rect x={29} y={-16} width={4} height={32} rx={1} fill="rgba(11,22,35,.78)" stroke="rgba(255,255,255,.18)" strokeWidth="0.5"/>
            {/* Remplissage */}
            <rect
              x={29.5}
              y={16 - Math.max(0, Math.min(1, fillPct)) * 31}
              width={3}
              height={Math.max(0, Math.min(1, fillPct)) * 31}
              fill={gaugeColor}
              style={isSaturated ? { animation: 'satPulse 1s ease-in-out infinite' } : {}}
            />
            {/* Halo rouge pulsant quand saturé */}
            {isSaturated && (
              <rect x={26} y={-19} width={10} height={38} rx={2} fill="none" stroke="#E05858" strokeWidth="1" opacity=".7" style={{animation:'satPulse 1s ease-in-out infinite'}}/>
            )}
          </g>
        )}
        {/* v25.1.27 — Overlay panne SIMPLIFIÉ : moins d'effets, plus lisible.
            · Une seule carte sobre (pas de glow externe + bordure + pulse simultanés)
            · Hiérarchie claire : "PANNE" en haut, coût au centre, bouton en bas
            · Bouton ambre pulse subtilement quand affordable (seul effet) */}
        {isOffline && (
          <g style={{pointerEvents:"all", cursor: relaunchAffordable ? "pointer" : "not-allowed"}}
             onClick={(e) => { e.stopPropagation(); if (relaunchAffordable) onRelaunch(zone.upgradeId); }}>
            {/* Carte unique : fond sombre + bordure rouge sobre */}
            <rect x={-38} y={-26} width={76} height={52} rx={6}
              fill="rgba(11,22,35,.92)" stroke="#E05858" strokeWidth="1.4"/>
            {/* Bandeau supérieur : "⚠ PANNE" + timer compact */}
            <text y={-15} textAnchor="middle" fontSize="6.5" fill="#E05858" fontWeight={800} letterSpacing=".4">⚠ PANNE · {panneTimeStr}</text>
            {/* Coût : info principale, gros et clair */}
            <text y={2} textAnchor="middle" fontSize="11"
              fill={relaunchAffordable ? "#F5BE50" : "rgba(255,255,255,.45)"}
              fontWeight={900}>
              {canPayLabel}
            </text>
            {/* Bouton RELANCER : seul élément qui pulse (signale qu'on peut cliquer) */}
            <rect x={-32} y={9} width={64} height={14} rx={4}
              fill={relaunchAffordable ? "#E8A020" : "rgba(255,255,255,.06)"}
              stroke="rgba(255,255,255,.2)"
              strokeWidth=".8"
              style={relaunchAffordable ? {animation:'satPulse 1.6s ease-in-out infinite'} : {}}/>
            <text y={19} textAnchor="middle" fontSize="7"
              fill={relaunchAffordable ? "#0a1628" : "rgba(255,255,255,.4)"}
              fontWeight={900} letterSpacing=".4">
              🔧 RELANCER
            </text>
          </g>
        )}
        {/* v25.1.25 — Animation de relance : flash vert + sparkles + texte volant */}
        {relaunchAnim && (
          <g style={{pointerEvents:"none"}}>
            {/* Flash circulaire qui pulse autour du bâtiment */}
            <circle cx={0} cy={0} r={28}
              fill="none" stroke="#27a85a" strokeWidth="3"
              style={{animation:"relaunchPulse 1.2s ease-out forwards", transformOrigin:"center"}}/>
            {/* Étoiles/sparkles autour du bâtiment */}
            {[0, 60, 120, 180, 240, 300].map((angle, i) => {
              const rad = (angle * Math.PI) / 180;
              const r = 22;
              return (
                <text key={i} x={Math.cos(rad)*r} y={Math.sin(rad)*r}
                  textAnchor="middle" dy="3" fontSize="9"
                  style={{
                    animation:`relaunchSparkle 1.2s ease-out ${i*0.05}s forwards`,
                    transformOrigin:`${Math.cos(rad)*r}px ${Math.sin(rad)*r}px`,
                    opacity:0
                  }}>
                  ✨
                </text>
              );
            })}
            {/* Texte "+RÉPARÉ !" qui flotte vers le haut */}
            <text y={-25} textAnchor="middle" fontSize="9" fontWeight="900"
              fill="#27a85a"
              style={{
                animation:"relaunchFloat 1.2s ease-out forwards",
                filter:"drop-shadow(0 0 4px rgba(39,168,90,.6))"
              }}>
              ✓ RÉPARÉ !
            </text>
          </g>
        )}
      </g>
      {/* Pin de priorité — visible UNIQUEMENT si zone possédée */}
      {activeBuilding && (
        <g
          className="zone-pin-interactive"
          transform={`translate(${x + 22} ${y - 18})`}
          style={{cursor:"pointer", pointerEvents:"all"}}
          onClick={(e)=>{ e.stopPropagation(); onTogglePin(zone.upgradeId); }}
        >
          <circle
            r="8"
            fill={pinned ? "#E8A020" : "#0B1623"}
            stroke={isSaturated ? "#E05858" : (pinned ? "#E8A020" : "rgba(232,160,32,.6)")}
            strokeWidth={isSaturated ? "2" : "1.4"}
            style={isSaturated ? {animation:'satPulse 1s ease-in-out infinite'} : {}}
          />
          <text textAnchor="middle" dy="3" fontSize="9">📌</text>
        </g>
      )}
    </g>
  );
}

// Rendu du "bâtiment" par type (via label)
function ZoneBuilding({ label, locked, active, icon }) {
  // Animations CSS appliquées uniquement si zone active (performances)
  const anim = active ? {animation:"zonePulse 2.8s ease-in-out infinite"} : {};
  const baseRect = { x:-26, y:-18, width:52, height:38, rx:5 };
  if (locked) {
    // Cadre pointillé grisé
    return (
      <>
        <rect {...baseRect} fill="rgba(30,40,55,.55)" stroke="rgba(255,255,255,.22)" strokeWidth="1.2" strokeDasharray="3 3"/>
        <text textAnchor="middle" dy="3" fontSize="17" opacity=".4">{icon}</text>
      </>
    );
  }
  // Style par type
  switch (label) {
    case "FERME": // 🐄
      return (
        <>
          <rect {...baseRect} fill="#1a2e1a" stroke="#4a7a4a" strokeWidth="1.2"/>
          {/* Grange */}
          <rect x="-20" y="-12" width="16" height="14" fill="#8b2e2e"/>

// ════════════════════════════════════════════════════════════════════════════
// ANCHOR SYSTEM (v25.1.20)
// ────────────────────────────────────────────────────────────────────────────
// Permet aux composants UI (Bac, Digesteur, Cuve...) d'exposer des "points de
// connexion" nommés. Le composant <Pipe> les lit dynamiquement via
// getBoundingClientRect() et se dessine entre eux. Plus besoin d'estimer les
// pixels manuellement à chaque modification.
//
// Usage :
//   <AnchorProvider>
//     <Anchor name="bac.bottom"><div ref>...le bac...</div></Anchor>
//     <Anchor name="digesteur.0.top"><div ref>...le digesteur...</div></Anchor>
//     <Pipe from="bac.bottom" to="digesteur.0.top" mode="L-down" />
//   </AnchorProvider>
//
// Modes de Pipe : "L-down" (coude vers le bas), "L-up" (coude vers le haut),
//                 "straight" (ligne droite), "off-left" (sort à gauche),
//                 "off-right" (sort à droite).
// ════════════════════════════════════════════════════════════════════════════

const AnchorContext = createContext(null);

function AnchorProvider({ children }) {
  // Wrapper transparent : display:contents ne crée pas de box, donc les enfants
  // s'inscrivent directement dans le layout du parent (flex VUE 1 dans notre cas).
  // MAIS pour avoir une coords-base pour getBoundingClientRect, on a besoin d'un
  // élément DOM. Solution : un wrapper position:absolute qui couvre tout le parent
  // et sert juste de référentiel pour les calculs (les pipes y sont dessinés).
  const containerRef = useRef(null);
  const registryRef = useRef(new Map());
  const [tick, setTick] = useState(0);

  const register = useCallback((name, ref, side) => {
    registryRef.current.set(name, { ref, side });
    setTick(t => t + 1);
    return () => {
      registryRef.current.delete(name);
      setTick(t => t + 1);
    };
  }, []);

  useEffect(() => {
    const onResize = () => setTick(t => t + 1);
    window.addEventListener('resize', onResize);
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(onResize) : null;
    if (ro && containerRef.current) ro.observe(containerRef.current);
    return () => {
      window.removeEventListener('resize', onResize);
      if (ro) ro.disconnect();
    };
  }, []);

  // Le containerRef pointe sur le PARENT du AnchorProvider (l'ancêtre flex).
  // On l'attache via un effet qui remonte le DOM.
  const sentinelRef = useRef(null);
  useEffect(() => {
    if (sentinelRef.current && sentinelRef.current.parentElement) {
      containerRef.current = sentinelRef.current.parentElement;
      setTick(t => t + 1);
    }
  }, []);

  const getAnchor = useCallback((name) => {
    const entry = registryRef.current.get(name);
    if (!entry || !entry.ref.current || !containerRef.current) return null;
    const elBox = entry.ref.current.getBoundingClientRect();
    const ctBox = containerRef.current.getBoundingClientRect();
    // Si l'élément n'a pas de taille (display:contents par exemple), elBox sera 0.
    if (elBox.width === 0 && elBox.height === 0) return null;
    const side = entry.side || 'center';
    let x, y;
    switch (side) {
      case 'top':         x = elBox.left + elBox.width/2; y = elBox.top; break;
      case 'bottom':      x = elBox.left + elBox.width/2; y = elBox.bottom; break;
      case 'left':        x = elBox.left;                 y = elBox.top + elBox.height/2; break;
      case 'right':       x = elBox.right;                y = elBox.top + elBox.height/2; break;
      case 'top-left':    x = elBox.left;                 y = elBox.top; break;
      case 'top-right':   x = elBox.right;                y = elBox.top; break;
      case 'bottom-left': x = elBox.left;                 y = elBox.bottom; break;
      case 'bottom-right':x = elBox.right;                y = elBox.bottom; break;
      default:            x = elBox.left + elBox.width/2; y = elBox.top + elBox.height/2;
    }
    return { x: x - ctBox.left, y: y - ctBox.top, side, _tick: tick };
  }, [tick]);

  return (
    <AnchorContext.Provider value={{ register, getAnchor, containerRef }}>
      {/* Sentinelle invisible : sert juste à attraper le parent pour containerRef.
          Pas de display:contents (qui casserait le sentinel itself). */}
      <span ref={sentinelRef} style={{display:"none"}}/>
      {children}
      {/* DEBUG : affiche un cercle + label sur chaque ancre quand ?debug=anchors */}
      {ANCHOR_DEBUG && (() => {
        const debugItems = [];
        registryRef.current.forEach((entry, name) => {
          const a = getAnchor(name);
          if (a) debugItems.push({ name, ...a });
        });
        return (
          <svg style={{
            position:"absolute", inset:0, width:"100%", height:"100%",
            pointerEvents:"none", zIndex:9999, overflow:"visible"
          }}>
            {debugItems.map(({name, x, y}) => (
              <g key={name}>
                <circle cx={x} cy={y} r={6}
                  fill="rgba(255,0,128,.85)" stroke="white" strokeWidth="2"/>
                <text x={x+10} y={y-6} fontSize="9" fill="white"
                  fontWeight="800"
                  style={{paintOrder:"stroke", stroke:"black", strokeWidth:"3px"}}>
                  {name}
                </text>
              </g>
            ))}
          </svg>
        );
      })()}
    </AnchorContext.Provider>
  );
}

// Hook pour qu'un composant expose une ancre
function useAnchor(name, side) {
  const ctx = useContext(AnchorContext);
  const ref = useRef(null);
  useEffect(() => {
    if (!ctx) return;
    return ctx.register(name, ref, side);
  }, [ctx, name, side]);
  return ref;
}

// Composant <Anchor> qui wrappe un enfant et l'enregistre comme point de connexion.
// IMPORTANT : display:contents fait que le wrapper lui-même n'a pas de bounding box.
// Donc on délègue toujours la mesure à un descendant DOM réel :
//   · Si `targetSelector` fourni : on prend le premier élément qui matche
//   · Sinon : on prend le premier descendant qui a une bbox non-vide
function Anchor({ name, side, targetSelector, debug, style, children }) {
  const wrapperRef = useRef(null);
  const ctx = useContext(AnchorContext);
  useEffect(() => {
    if (!ctx) return;
    const shimRef = {
      get current() {
        const w = wrapperRef.current;
        if (!w) return null;
        if (targetSelector) {
          return w.querySelector(targetSelector) || w.firstElementChild || w;
        }
        // Cherche le premier descendant avec une bbox non-vide
        let el = w.firstElementChild;
        while (el) {
          const r = el.getBoundingClientRect();
          if (r.width > 0 && r.height > 0) return el;
          el = el.nextElementSibling;
        }
        return w.firstElementChild || w;
      }
    };
    return ctx.register(name, shimRef, side);
  }, [ctx, name, side, targetSelector]);
  return (
    <div ref={wrapperRef} data-anchor={name} style={{display:"contents", ...style}}>
      {children}
    </div>
  );
}

// Mode debug global : ajouter ?debug=anchors à l'URL pour visualiser
const ANCHOR_DEBUG = typeof window !== 'undefined'
  && window.location.search.includes('debug=anchors');

// ─── PIPE — dessine un tube SVG entre deux ancres nommées ────────────────────
// Modes : "L-down"  : du A descend puis va vers B (A en haut, B en bas-droite/gauche)
//         "L-up"    : du A va horizontal puis monte vers B (A en bas, B en haut)
//         "U-down"  : du A descend, va horizontal sous, remonte à B
//         "straight": ligne droite (horiz/vert auto-détecté)
//         "off-left": part de A et sort hors champ à gauche (avec flèche)
function Pipe({ from, to, mode = "straight", color = "#4A9EDB", flowColor = "#27a85a",
                active = true, animate = "flow", animSpeed = "1.4s",
                strokeWidth = 12, label = null, labelOffset = -10, zIndex = 2 }) {
  const ctx = useContext(AnchorContext);
  if (!ctx) return null;
  const A = ctx.getAnchor(from);
  // "off-left"/"off-right" n'ont pas de B, on synthétise une cible hors champ
  let B = null;
  if (typeof to === 'string') B = ctx.getAnchor(to);
  else if (to) B = to;
  if (!A) return null;

  // Calcul du path selon le mode
  let pathD = "";
  let arrowAngle = 0;
  let arrowPos = null;
  let labelPos = null;

  if (mode === "off-left") {
    // Part de A et sort à gauche (x = -50)
    const xEnd = -50;
    pathD = `M ${A.x} ${A.y} L ${xEnd} ${A.y}`;
    arrowPos = { x: xEnd + 6, y: A.y };
    arrowAngle = 180;
    labelPos = { x: (A.x + xEnd) / 2, y: A.y + labelOffset };
  } else if (mode === "off-right") {
    const xEnd = (ctx.containerRef.current?.getBoundingClientRect().width || 400) + 50;
    pathD = `M ${A.x} ${A.y} L ${xEnd} ${A.y}`;
    arrowPos = { x: xEnd - 6, y: A.y };
    arrowAngle = 0;
    labelPos = { x: (A.x + xEnd) / 2, y: A.y + labelOffset };
  } else if (B) {
    if (mode === "straight") {
      pathD = `M ${A.x} ${A.y} L ${B.x} ${B.y}`;
      arrowPos = { x: B.x, y: B.y };
      arrowAngle = Math.atan2(B.y - A.y, B.x - A.x) * 180 / Math.PI;
      labelPos = { x: (A.x + B.x) / 2, y: (A.y + B.y) / 2 + labelOffset };
    } else if (mode === "L-down") {
      // A en haut → descend puis horizontal vers B
      pathD = `M ${A.x} ${A.y} L ${A.x} ${B.y} L ${B.x} ${B.y}`;
      arrowPos = { x: B.x, y: B.y };
      arrowAngle = B.x > A.x ? 0 : 180;
      labelPos = { x: A.x + (B.x - A.x) / 2, y: B.y + labelOffset };
    } else if (mode === "L-up") {
      // A en bas → horizontal vers B.x puis monte vers B
      pathD = `M ${A.x} ${A.y} L ${B.x} ${A.y} L ${B.x} ${B.y}`;
      arrowPos = { x: B.x, y: B.y };
      arrowAngle = -90;
      labelPos = { x: (A.x + B.x) / 2, y: A.y + labelOffset };
    }
  }
  if (!pathD) return null;

  const animationName = animate === "flow" ? "gasFlow"
                      : animate === "flow-reverse" ? "gasFlowReverse"
                      : animate === "auger" ? "augerSpin"
                      : "none";

  return (
    <svg style={{
      position:"absolute", inset:0, width:"100%", height:"100%",
      pointerEvents:"none", zIndex, overflow:"visible"
    }}>
      {/* Tube enveloppe */}
      <path d={pathD}
        fill="none" stroke="#1E3848" strokeWidth={strokeWidth}
        strokeLinecap="round" strokeLinejoin="round"/>
      <path d={pathD}
        fill="none" stroke={`${color}66`} strokeWidth={strokeWidth+1}
        strokeLinecap="round" strokeLinejoin="round" opacity=".4"/>
      {/* Flux animé */}
      <path d={pathD}
        fill="none"
        stroke={active ? flowColor : `${color}33`}
        strokeWidth={Math.max(3, strokeWidth - 7)}
        strokeDasharray="12 8" strokeLinecap="round"
        style={{animation: active && animationName !== "none" ? `${animationName} ${animSpeed} linear infinite` : "none"}}/>
      {/* Flèche d'arrivée */}
      {arrowPos && (
        <polygon points="0,-6 10,0 0,6"
          fill={active ? flowColor : `${color}66`}
          transform={`translate(${arrowPos.x},${arrowPos.y}) rotate(${arrowAngle})`}/>
      )}
      {/* Label */}
      {label && labelPos && (
        <text x={labelPos.x} y={labelPos.y} textAnchor="middle"
          fontSize="10" fontWeight="700" letterSpacing=".3"
          fill={active ? flowColor : `${color}99`}>
          {label}
        </text>
      )}
    </svg>
  );
}

// ─── DIGESTEUR SCENE — viewport 2 vues swipeable + ville ─────────────────────
function DigesteurScene({
  tractorAtGnvStationRef,
  digesteurs, sceneZoomAnim, bubbles, chargePct, chargeMaxEff, isDigesting,
  bmPerHour, fillRate, owned, stock, stockMax, stockPct, stockColor,
  binRotate, binTransX, pouring, handlePour,
  // v23 — flotte & ville
  tractorCount, tractorSpeedBoost, tractorTrailers, tractorGnvArr, pinnedZones, onTogglePin,
  cityView, setCityView, injected, epurateurOk, compresseurOk,
  // v24 — gisements
  zoneState, localStock, setLocalStock, setStock, stockMaxRef,
  offlineUntil, handleRelaunchZone, euros, buffer, reliability,
  // v25.0 — yield engine (mix pondéré stock/charge)
  stockRef, stockYieldRef, setStockYield, setStockComposition,
  // v25.0.9 — composition par intrant (popup pédago)
  stockComposition, stockYield,
  // v25.1.6 — Props pour chaîne d'injection migrée + placeholder réseau aval
  unlockAnim, bufferPct, bm, burnRate, gnvStations, gnvSplit, gnvBm, canConnect,
  // v25.1.25 — Animation paiement de relance par zone
  relaunchAnim,
}) {
  // v25.0.9 — popup détail composition BAC (pédagogie yield mix)
  const [bacPopupOpen, setBacPopupOpen] = useState(false);

  // Taille des digesteurs selon le nombre (inchangé)
  const dSize  = digesteurs === 1 ? 115 : digesteurs === 2 ? 90 : 72;
  const dEmoji = digesteurs === 1 ? "40px" : digesteurs === 2 ? "32px" : "26px";
  const dFSize = digesteurs === 1 ? "9px"  : digesteurs === 2 ? "8px"  : "7px";
  const digesteurZoneScale = digesteurs === 1 ? 1 : digesteurs === 2 ? 0.97 : 0.93;

  // ─── SWIPE LOGIC ──────────────────────────────────────────────────────────
  const viewportRef = useRef(null);
  const sceneRef    = useRef(null);
  const tractorOverlayRef = useRef(null);  // v23.9 : overlay pour particules de chargement
  const dragRef     = useRef(null); // { x0, y0, axis }

  const applyTransform = useCallback((v, withTransition) => {
    if (!sceneRef.current || !viewportRef.current) return;
    sceneRef.current.style.transition = withTransition ? "transform .35s cubic-bezier(.22,.68,0,1.12)" : "none";
    const vw = viewportRef.current.offsetWidth;
    sceneRef.current.style.transform = `translateX(${-v * vw}px)`;
  }, []);

  useEffect(() => { applyTransform(cityView, true); }, [cityView, applyTransform]);
  useEffect(() => {
    const onResize = () => applyTransform(cityView, false);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [cityView, applyTransform]);

  const onPointerDown = (e) => {
    // Ignore clicks on buttons/pins (éviter que le swipe vole un clic)
    const t = e.target;
    if (t.closest && (t.closest("button") || t.closest(".zone-pin-interactive"))) return;
    dragRef.current = { x0: e.clientX, y0: e.clientY, axis: null };
    if (sceneRef.current) sceneRef.current.style.transition = "none";
  };
  const onPointerMove = (e) => {
    const d = dragRef.current;
    if (!d || !viewportRef.current || !sceneRef.current) return;
    const dx = e.clientX - d.x0, dy = e.clientY - d.y0;
    if (!d.axis) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        d.axis = Math.abs(dx) > Math.abs(dy) * 1.3 ? "x" : "y";
      } else return;
    }
    if (d.axis !== "x") return;
    if (e.cancelable) e.preventDefault();
    const vw = viewportRef.current.offsetWidth;
    const base = -cityView * vw;
    let offset = dx;
    // Résistance aux bords
    if ((cityView === 0 && offset > 0) || (cityView === 2 && offset < 0)) offset *= 0.3;
    sceneRef.current.style.transform = `translateX(${base + offset}px)`;
  };
  const onPointerUp = (e) => {
    const d = dragRef.current;
    if (!d) return;
    const dx = e.clientX - d.x0;
    if (d.axis === "x" && viewportRef.current) {
      const vw = viewportRef.current.offsetWidth;
      const threshold = vw * 0.2;
      let target = cityView;
      if (dx < -threshold && cityView < 2) target = cityView + 1;
      else if (dx > threshold && cityView > 0) target = cityView - 1;
      if (target !== cityView) setCityView(target);
      else applyTransform(cityView, true);
    } else {
      applyTransform(cityView, true);
    }
    dragRef.current = null;
  };

  // Labels/icônes pour zones
  const zoneMeta = (z) => ({
    icon: UPGRADES[z.upgradeId].icon,
    price: fmt(UPGRADES[z.upgradeId].baseCost) + (injected ? " €" : " m³"),
    unlocked: (() => {
      const u = UPGRADES[z.upgradeId];
      if (!u.unlocksAt) return true;
      if (owned[z.upgradeId] > 0) return true;           // déjà possédé → toujours accessible
      if (u.unlocksAt === "epurateur")   return !!epurateurOk;
      if (u.unlocksAt === "compresseur") return !!compresseurOk;
      if (u.unlocksAt === "injected")    return !!injected;
      return true;
    })(),
  });

  return (
    <div style={{
      background:"rgba(11,22,35,.6)",
      border:"1px solid rgba(74,158,219,.14)",
      borderRadius:"20px",
      padding:"22px 14px 18px",
      position:"relative",
      minHeight:"370px",
      animation: sceneZoomAnim ? "dezoom 1.1s cubic-bezier(.22,.68,0,1.2), sceneFlash 1.1s ease" : "none",
    }}>
      {/* Viewport qui clip les 2 vues */}
      <div
        ref={viewportRef}
        style={{
          position:"relative",
          width:"100%",
          overflow:"hidden",
          touchAction:"pan-y",
          userSelect:"none",
          WebkitUserSelect:"none",
          minHeight:"600px",
        }}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}
      >
        {/* Scène monde (300% largeur — 3 vues) */}
        <div
          ref={sceneRef}
          style={{
            position:"relative",
            width:"300%",
            display:"flex",
            willChange:"transform",
          }}
        >
          {/* ════════ VUE 0 : CHAÎNE D'INJECTION ════════ */}
          <div style={{flex:"0 0 33.33%", position:"relative", minHeight:"600px", minWidth:0, overflow:"hidden", display:"flex", flexDirection:"column", background:"rgba(11,22,35,.6)"}}>
            {/* ─── CHAÎNE : hauteur fixe 350px ─── */}
            <div style={{height:"350px", flexShrink:0, display:"flex", alignItems:"stretch", justifyContent:"center", position:"relative"}}>
              <PipelineGraphicVertical injected={injected} epurateurOk={epurateurOk} compresseurOk={compresseurOk} unlockAnim={unlockAnim} bufferPct={bufferPct} buffer={buffer} digesteurs={digesteurs}/>
            </div>
          </div>

          {/* ════════ VUE 1 : DIGESTEUR + BAC ════════ */}
          <div style={{flex:"0 0 33.33%", position:"relative", minHeight:"600px", minWidth:0, overflow:"hidden", display:"flex", flexDirection:"column"}}>
          <AnchorProvider>

                    {/* Bande droite Vue 2 — zone monde uniquement */}
                    <path d={`M ${W} 280 L ${W} ${BOT_TOP_Y+10}`} strokeWidth="30"/>
                    {/* ── Circuit bas Vue 2 — routes étendues à V1_V2 pour rejoindre C-loop ── */}
                    {/* Bord droit Vue 2 descend de GNV_LANE à BOT_TOP_Y (virage tracteurs) */}
                    <path d={`M ${R_EDGE} ${GNV_LANE} L ${R_EDGE} ${BOT_TOP_Y}`}/>
                    {/* Route haut du bas : étendue de V1_V2 à R_EDGE */}
                    <path d={`M ${V1_V2} ${BOT_TOP_Y} L ${R_EDGE} ${BOT_TOP_Y}`}/>
                    {/* Route bas du bas : étendue de V1_V2 à R_EDGE */}
                    <path d={`M ${V1_V2} ${BOT_BOT_Y} L ${R_EDGE} ${BOT_BOT_Y}`}/>
                    {/* Bord gauche Vue 2 : remontée tracteurs (BOT_BOT_Y → GNV_LANE) */}
                    <path d={`M ${L_EDGE} ${BOT_BOT_Y} L ${L_EDGE} ${GNV_LANE}`}/>
                    {/* ── Circuit C-loop Vue 1 bas (coude à GNV_C_X) ── */}
                    <path d={`M ${GNV_C_X} ${BOT_TOP_Y} L ${V1_V2} ${BOT_TOP_Y}`}/>
                    <path d={`M ${GNV_C_X} ${BOT_BOT_Y} L ${V1_V2} ${BOT_BOT_Y}`}/>
                    <path d={`M ${GNV_C_X} ${BOT_TOP_Y} L ${GNV_C_X} ${BOT_BOT_Y}`}/>
                  </g>
                  {/* ── Couche 2 : BORDS roses ── */}
                  <g stroke="rgba(240,80,180,.45)" strokeWidth="2" fill="none" strokeLinecap="square">
                    {/* Bords gisement loop — outer continus, inner segmentés aux T-junctions */}
                    <path d={`M ${V1_V2} ${LANE_TOP-5} L ${W} ${LANE_TOP-5}`}/>
                    <path d={`M ${V1_V2} ${LANE_TOP+5} L ${L_EDGE-5} ${LANE_TOP+5}`}/>
                    <path d={`M ${L_EDGE+5} ${LANE_TOP+5} L ${V1_V2+170} ${LANE_TOP+5}`}/>
                    <path d={`M ${V1_V2+180} ${LANE_TOP+5} L ${V1_V2+340} ${LANE_TOP+5}`}/>
                    <path d={`M ${V1_V2+350} ${LANE_TOP+5} L ${W} ${LANE_TOP+5}`}/>
                    <path d={`M ${L_EDGE+5} ${GNV_LANE-5} L ${V1_V2+170} ${GNV_LANE-5}`}/>
                    <path d={`M ${V1_V2+180} ${GNV_LANE-5} L ${V1_V2+340} ${GNV_LANE-5}`}/>
                    <path d={`M ${V1_V2+350} ${GNV_LANE-5} L ${W} ${GNV_LANE-5}`}/>
                    <path d={`M ${L_EDGE+5} ${GNV_LANE+5} L ${R_EDGE-5} ${GNV_LANE+5}`}/>
                    <path d={`M ${R_EDGE+5} ${GNV_LANE+5} L ${W} ${GNV_LANE+5}`}/>
                    {/* Bords verticaux gisement loop — entre inner borders uniquement */}
                    <path d={`M ${V1_V2+170} ${LANE_TOP+5} L ${V1_V2+170} ${GNV_LANE-5}`}/>
                    <path d={`M ${V1_V2+180} ${LANE_TOP+5} L ${V1_V2+180} ${GNV_LANE-5}`}/>
                    <path d={`M ${V1_V2+340} ${LANE_TOP+5} L ${V1_V2+340} ${GNV_LANE-5}`}/>
                    <path d={`M ${V1_V2+350} ${LANE_TOP+5} L ${V1_V2+350} ${GNV_LANE-5}`}/>
                    {/* Circuit bas Vue 2 — T-junctions propres à R_EDGE (pas de virage fermant la route) */}
                    {/* BOT_TOP_Y : bords horizontaux ouverts, pas de virage à R_EDGE */}
                    <path d={`M ${V1_V2} ${BOT_TOP_Y-5} L ${L_EDGE-5} ${BOT_TOP_Y-5}`}/>
                    <path d={`M ${L_EDGE+5} ${BOT_TOP_Y-5} L ${R_EDGE-5} ${BOT_TOP_Y-5}`}/>
                    <path d={`M ${V1_V2} ${BOT_TOP_Y+5} L ${L_EDGE-5} ${BOT_TOP_Y+5}`}/>
                    <path d={`M ${L_EDGE+5} ${BOT_TOP_Y+5} L ${R_EDGE} ${BOT_TOP_Y+5}`}/>
                    {/* Bords verticaux R_EDGE (GNV_LANE→BOT_TOP_Y) — T-junction style, entre inner edges */}
                    <path d={`M ${R_EDGE+5} ${GNV_LANE+5} L ${R_EDGE+5} ${BOT_TOP_Y-5}`}/>
                    <path d={`M ${R_EDGE-5} ${GNV_LANE+5} L ${R_EDGE-5} ${BOT_TOP_Y-5}`}/>
                    {/* BOT_BOT_Y : bords horizontaux ouverts */}
                    <path d={`M ${V1_V2} ${BOT_BOT_Y+5} L ${R_EDGE} ${BOT_BOT_Y+5}`}/>
                    <path d={`M ${V1_V2} ${BOT_BOT_Y-5} L ${L_EDGE-5} ${BOT_BOT_Y-5}`}/>
                    <path d={`M ${L_EDGE+5} ${BOT_BOT_Y-5} L ${R_EDGE} ${BOT_BOT_Y-5}`}/>
                    <path d={`M ${L_EDGE-5} ${LANE_TOP+5} L ${L_EDGE-5} ${BOT_TOP_Y-5}`}/>
                    <path d={`M ${L_EDGE-5} ${BOT_TOP_Y+5} L ${L_EDGE-5} ${BOT_BOT_Y-5}`}/>
                    <path d={`M ${L_EDGE+5} ${LANE_TOP+5} L ${L_EDGE+5} ${GNV_LANE-5}`}/>
                    <path d={`M ${L_EDGE+5} ${GNV_LANE+5} L ${L_EDGE+5} ${BOT_TOP_Y-5}`}/>
                    <path d={`M ${L_EDGE+5} ${BOT_TOP_Y+5} L ${L_EDGE+5} ${BOT_BOT_Y-5}`}/>
                    {/* Bords C-loop Vue 1 bas — T-junctions en bas (pas de coin fermant BOT_BOT_Y) */}
                    {/* Outer : horizontal haut + vertical, puis BOT_BOT_Y outer séparé depuis inner face */}
                    <path d={`M ${V1_V2} ${BOT_TOP_Y-5} L ${GNV_C_X-5} ${BOT_TOP_Y-5} L ${GNV_C_X-5} ${BOT_BOT_Y+5}`}/>
                    <path d={`M ${GNV_C_X-5} ${BOT_BOT_Y+5} L ${V1_V2} ${BOT_BOT_Y+5}`}/>
                    {/* Inner : horizontal haut + vertical, puis BOT_BOT_Y inner séparé (T-junction gap) */}
                    <path d={`M ${V1_V2} ${BOT_TOP_Y+5} L ${GNV_C_X+5} ${BOT_TOP_Y+5} L ${GNV_C_X+5} ${BOT_BOT_Y-5}`}/>
                    <path d={`M ${GNV_C_X+5} ${BOT_BOT_Y-5} L ${V1_V2} ${BOT_BOT_Y-5}`}/>
                  </g>
                  {/* ── Couche 3 : MARQUAGE pointillé rose ── */}
                  <g stroke="rgba(240,80,180,.38)" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeDasharray="6 10">
                    <path d={`M ${V1_V2} ${LANE_TOP} L ${DUMP_X_RIGHT} ${LANE_TOP}`}/>
                    <path d={`M ${DUMP_X_RIGHT} ${LANE_TOP} L ${DUMP_X_RIGHT} ${GNV_LANE}`}/>
                    <path d={`M ${DUMP_X_RIGHT} ${DUMP_Y} L ${DUMP_X} ${DUMP_Y}`}/>
                    <path d={`M ${V1_V2} ${LANE_TOP} L ${W} ${LANE_TOP}`}/>
                    <path d={`M ${V1_V2} ${GNV_LANE} L ${W} ${GNV_LANE}`}/>
                    <path d={`M ${V1_V2+175} ${LANE_TOP} L ${V1_V2+175} ${GNV_LANE}`}/>
                    <path d={`M ${V1_V2+345} ${LANE_TOP} L ${V1_V2+345} ${GNV_LANE}`}/>
                    {/* Marquage circuit bas Vue 2 */}
                    <path d={`M ${V1_V2} ${BOT_TOP_Y} L ${R_EDGE} ${BOT_TOP_Y}`}/>
                    <path d={`M ${V1_V2} ${BOT_BOT_Y} L ${R_EDGE} ${BOT_BOT_Y}`}/>
                    <path d={`M ${R_EDGE} ${GNV_LANE} L ${R_EDGE} ${BOT_TOP_Y}`}/>
                    <path d={`M ${L_EDGE} ${BOT_BOT_Y} L ${L_EDGE} ${GNV_LANE}`}/>
                    {/* Marquage C-loop Vue 1 bas — tracé en C connecté */}
                    <path d={`M ${V1_V2} ${BOT_TOP_Y} L ${GNV_C_X} ${BOT_TOP_Y} L ${GNV_C_X} ${BOT_BOT_Y} L ${V1_V2} ${BOT_BOT_Y}`}/>
                  </g>

                  {/* ── Cadres de parcelle ── */}
                  <g fill="rgba(232,160,32,.04)" stroke="rgba(232,160,32,.18)" strokeWidth="1" strokeDasharray="2 3">
                    {PARCELLES.map(p => {
                      const padX = 30, padY = 18;
                      return (
                        <rect key={`parc-${p.level}`}
                          x={V1_V2 + p.x - padX}
                          y={p.y - padY}
                          width={p.w + padX + 12}
                          height={padY * 2}
                          rx={8}
                        />
                      );
                    })}
                  </g>

                  {/* ── TRACTEURS ── */}
                  <TractorWorld
                    tractorAtGnvStationRef={tractorAtGnvStationRef}
                    fillRate={fillRate}
                    owned={owned}
                    tractorCount={tractorCount}
                    speedBoost={tractorSpeedBoost}
                    tractorTrailers={tractorTrailers}
                    tractorGnvArr={tractorGnvArr}
                    pinnedZones={pinnedZones}
                    zoneState={zoneState}
                    localStock={localStock}
                    setLocalStock={setLocalStock}
                    setStock={setStock}
                    stockMaxRef={stockMaxRef}
                    overlayRef={tractorOverlayRef}
                    stockRef={stockRef}
                    stockYieldRef={stockYieldRef}
                    setStockYield={setStockYield}
                    setStockComposition={setStockComposition}
                    gnvStations={gnvStations}
                  />

                  {/* ── Zone GNV + GRDF (section basse, Vue 1 + Vue 2) ── */}
                  {injected && (() => {
                    return (
                      <>
                        {/* Label réseau aval */}
                        <text x={V1_V2+12} y={BOT_TOP_Y-10} fontSize="6" fill="rgba(74,158,219,.55)"
                          fontWeight="700" letterSpacing=".06em">DISTRIBUTION RÉSEAU AVAL GRDF</text>

                        {/* ── BÂTIMENTS RÉSIDENTIELS Vue 2 bas (entre BOT_TOP_Y et BOT_BOT_Y) ── */}
                        {[830,868,906,948,992,1034,1076,1116,1154].map((bx, bi) => {
                          const h = 10 + (bi % 3) * 5;
                          return (
                            <g key={bi} transform={`translate(${bx},${BOT_TOP_Y+50})`}>
                              <rect x="-7" y={0} width="14" height={h} rx="1.5"
                                fill="rgba(11,22,35,.8)" stroke="rgba(74,158,219,.18)" strokeWidth=".7"/>
                              <rect x="-4" y={1} width="3" height="3" rx=".5" fill="rgba(74,158,219,.22)"/>
                              <rect x="1" y={1} width="3" height="3" rx=".5" fill="rgba(74,158,219,.22)"/>
                            </g>
                          );
                        })}
                      </>
                    );
                  })()}

                  {/* ── VÉHICULES LAMBDA (circuit bas Vue 1+Vue 2) ── */}
                  {injected && <GnvVehicleWorld gnvStations={gnvStations} gnvSplit={gnvSplit} tractorAtGnvStationRef={tractorAtGnvStationRef}/>}
                </>
              );
            })()}
          </svg>

          {/* v25.11.27 — Tuyaux inter-vues (biogaz + réseau GRDF aval).
              Position:absolute dans le div scène (width:300%), non clippé. */}
          <CrossBoundaryPipesOverlay digesteurs={digesteurs} buffer={buffer} injected={injected} isDigesting={isDigesting}/>

          {/* v23.9 : Overlay HTML pour les particules de chargement (positionné
              sur toute la scène monde, les particules sont créées en JS pur avec
              des coordonnées pixels réelles via getBoundingClientRect). */}
          <TractorParticlesOverlay overlayRef={tractorOverlayRef} />
        </div>

        {/* ─── FLÈCHE HINT DE SWIPE ─── */}
        {cityView < 2 && (
          <div style={{
            position:"absolute", right:6, top:"50%", transform:"translateY(-50%)",
            fontSize:"22px", color:"#E8A020",
            animation:"hintRight 1.4s ease-in-out infinite",
            pointerEvents:"none", zIndex:20,
            filter:"drop-shadow(0 0 6px rgba(232,160,32,.5))",
          }}>›</div>
        )}
        {cityView > 0 && (
          <div style={{
            position:"absolute", left:6, top:"50%", transform:"translateY(-50%)",
            fontSize:"22px", color:"#E8A020",
            animation:"hintLeft 1.4s ease-in-out infinite",
            pointerEvents:"none", zIndex:20,
            filter:"drop-shadow(0 0 6px rgba(232,160,32,.5))",
          }}>‹</div>
        )}

        {/* ─── DOTS INDICATOR ─── */}
        <div style={{
          position:"absolute", left:0, right:0, bottom:6,
          display:"flex", justifyContent:"center", gap:6,
          zIndex:20, pointerEvents:"none",
        }}>
          {[0,1,2].map(i => (
            <div key={i}
              onClick={(e) => { e.stopPropagation(); setCityView(i); }}
              style={{
                width: cityView === i ? 20 : 7, height: 7,
                borderRadius: cityView === i ? 4 : 999,
                background: cityView === i ? "#4A9EDB" : "rgba(255,255,255,.22)",
                transition:"all .25s",
                cursor:"pointer",
                pointerEvents:"auto",
              }}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── DIGESTEUR MANIFOLD — spacer layout 38px + badge uniquement
// Branches et tube collecteur gérés par CrossBoundaryPipesOverlay (coordonnées scène).
function DigesteurManifold({ digesteurs }) {
  const UNIT_W = digesteurs === 1 ? 88 : digesteurs === 2 ? 74 : 60;
  const GAP    = digesteurs === 3 ? 4 : 8;
  const totalW = digesteurs * UNIT_W + (digesteurs - 1) * GAP;
  const svgH   = 38;
  const centers = Array.from({length:digesteurs}, (_,i) => i*(UNIT_W+GAP) + UNIT_W/2);
  const x1 = centers[0], xN = centers[digesteurs-1];

  return (
    <div style={{width:`${totalW}px`, height:`${svgH}px`}}>
      {digesteurs > 1 && (
        <svg width={totalW} height={svgH} viewBox={`0 0 ${totalW} ${svgH}`}
          style={{display:"block"}}>
          <rect x={(x1+xN)/2-19} y={1} width={38} height={12} rx={6}
            fill="rgba(11,22,35,.9)" stroke="rgba(74,158,219,.28)" strokeWidth="1"/>
          <text x={(x1+xN)/2} y={10} textAnchor="middle"
            fontSize="7" fill="rgba(74,158,219,.9)" fontWeight="700">Biogaz</text>
        </svg>
      )}
    </div>
  );
}

// ─── DIGESTEUR FEEDER — distributeur d'intrants avec vis sans fin ─────────────
// v25.1.18 — Symétrique du DigesteurManifold mais avec sémantique différente :
//   · Tube horizontal SOUS les dômes (au-dessus des cuves) qui distribue les intrants
//   · Branches MONTANTES vers chaque digesteur (les intrants entrent par le haut/dôme)
//   · Animation = vis sans fin (chevrons /// qui défilent de droite à gauche)
//   · Active uniquement quand `pouring=true` (le levier déclenche la vis)
//   · S'étend vers la DROITE (vers le bac) au lieu de gauche (collecteur biogaz)
//   · Couleur ambre/terre (intrants solides) plutôt que vert (gaz)
function DigesteurFeeder({ digesteurs, pouring }) {
  // v25.1.21 — Simplifié : seulement le tube horizontal SOUS les digesteurs avec
  // branches MONTANTES vers le bas de chaque digesteur. La connexion vers le bac
  // est désormais gérée par un <Pipe> ancré (cf. AnchorProvider de la VUE 1).
  const UNIT_W = digesteurs === 1 ? 88 : digesteurs === 2 ? 74 : 60;
  const GAP    = digesteurs === 3 ? 4 : 8;
  const totalW = digesteurs * UNIT_W + (digesteurs - 1) * GAP;
  const svgH   = 22;
  const cY     = 8;
  const centers = Array.from({length:digesteurs}, (_,i) => i*(UNIT_W+GAP) + UNIT_W/2);
  const x1 = centers[0], xN = centers[digesteurs-1];

  return (
    <div style={{position:"relative", width:`${totalW}px`, height:`${svgH}px`}}>
      <svg width={totalW} height={svgH} viewBox={`0 0 ${totalW} ${svgH}`}
        style={{display:"block", overflow:"visible"}}>

        {/* Branches MONTANTES vers chaque digesteur */}
        {centers.map((px,i) => (
          <React.Fragment key={i}>
            <rect x={px-4} y={0} width={8} height={cY} rx={3}
              fill="#3a2c10" stroke="rgba(232,160,32,.3)" strokeWidth=".8"/>
            <rect x={px-2} y={1} width={4} height={cY-2} rx={2}
              fill={pouring ? "rgba(232,160,32,.85)" : "rgba(232,160,32,.18)"}
              style={{animation: pouring ? "chargePulse 1.4s ease infinite" : "none"}}/>
          </React.Fragment>
        ))}

        {/* TUBE horizontal complet */}
        <rect x={x1-4} y={cY} width={(xN-x1)+8} height={9} rx={4}
          fill="#3a2c10" stroke="rgba(232,160,32,.42)" strokeWidth="1.5"/>

        {/* VIS SANS FIN : 2 brins défilants pour effet hélicoïdal */}
        <line x1={x1-2} y1={cY+4.5} x2={xN+2} y2={cY+4.5}
          stroke="rgba(245,190,80,.85)" strokeWidth="2.5"
          strokeDasharray="3 5" strokeLinecap="round"
          style={{animation: pouring ? "augerSpin .35s linear infinite" : "none"}}/>
        <line x1={x1-2} y1={cY+4.5} x2={xN+2} y2={cY+4.5}
          stroke="rgba(232,160,32,.6)" strokeWidth="1.5"
          strokeDasharray="2 6" strokeDashoffset="3" strokeLinecap="round"
          style={{animation: pouring ? "augerSpin .35s linear infinite" : "none"}}/>

        {/* Embout DROIT — point de raccordement vers le bac (sera ciblé par l'ancre feeder.right) */}
        <rect x={xN+2} y={cY-2} width={6} height={13} rx={2}
          fill="#5a4520" stroke="rgba(232,160,32,.6)" strokeWidth=".8"
          data-anchor-target="feeder-right-embout"/>

        {/* Badge "Intrants" centré sur le tube */}
        {digesteurs > 1 && (
          <React.Fragment>
            <rect x={(x1+xN)/2-22} y={cY+13} width={44} height={9} rx={4}
              fill="rgba(11,22,35,.9)" stroke="rgba(232,160,32,.28)" strokeWidth=".8"/>
            <text x={(x1+xN)/2} y={cY+19} textAnchor="middle"
              fontSize="6.5" fill="rgba(245,190,80,.85)" fontWeight="700">Intrants</text>
          </React.Fragment>
        )}
      </svg>
    </div>
  );
}

// ─── SINGLE DIGESTEUR — dôme CSS garanti ─────────────────────────────────────
function SingleDigesteur({ index, total, bubbles, chargePct, isDigesting, bmPerHour, isNew }) {
  const TW   = total===1 ? 80 : total===2 ? 66 : 52;   // largeur cuve
  const DW   = total===1 ? 88 : total===2 ? 74 : 60;   // largeur dôme
  const TH   = total===1 ? 76 : total===2 ? 68 : 58;   // hauteur cuve
  const PH   = total===1 ?  6 : total===2 ?  5 :  4;   // stub au-dessus du dôme plein
  const DMIN = total===1 ? 24 : total===2 ? 20 : 16;   // dôme vide
  const DMAX = total===1 ? 60 : total===2 ? 52 : 44;   // dôme plein
  const TOTAL_ABOVE = PH + DMAX;  // hauteur conteneur pipe+dôme — constante (pipe pleine hauteur)
  const domeH  = Math.round(DMIN + chargePct * (DMAX - DMIN));
  const liqH   = Math.round(chargePct * (TH - 4));
  const cx     = TW / 2;
  const b1Y    = Math.round(TH * 0.32);
  const b2Y    = Math.round(TH * 0.67);
  const bHalf  = Math.round(TW * 0.30);
  const oscDur = isDigesting ? `${(3.2 - chargePct * 1.8).toFixed(1)}s` : null;

  return (
    <div style={{
      display:"flex", flexDirection:"column", alignItems:"center",
      animation: isNew ? "digesteurAppear 0.8s cubic-bezier(.22,.68,0,1.2) forwards" : "none",
    }}>

      {/* Conteneur pipe+dôme — hauteur fixe TOTAL_ABOVE
          Pipe : ancré en haut (position absolute, longueur PH toujours constante)
          Dôme : ancré en bas, monte avec chargePct */}
      <div style={{position:"relative", width:`${DW}px`, height:`${TOTAL_ABOVE}px`}}>

        {/* Dôme — ancré en bas, gonfle vers le haut, derrière le pipe */}
        <div style={{
          position:"absolute", bottom:0, left:0, right:0,
          width:`${DW}px`, height:`${domeH}px`,
          borderRadius:"50% 50% 0 0 / 100% 100% 0 0",
          background: isDigesting
            ? "linear-gradient(180deg,#D8F0B0 0%,#7CC84C 42%,#2E7020 100%)"
            : "linear-gradient(180deg,#5A7A50 0%,#2A4A22 60%,#162A10 100%)",
          border:`3px solid ${isDigesting?"#9ADA60":"#3A5A30"}`,
          borderBottom:"none",
          overflow:"hidden",
          boxShadow: isDigesting
            ? `0 0 ${14+chargePct*22}px rgba(100,220,60,${.4+chargePct*.3}),0 -3px 16px rgba(100,220,60,.2)`
            : "none",
          transition:"height .35s cubic-bezier(.22,.68,0,1.2),box-shadow .6s,background .8s,border-color .8s",
          animation: isDigesting ? "domePulse 3.5s ease-in-out infinite" : "none",
          zIndex:1,
        }}>
          {/* Reflet gauche */}
          <div style={{
            position:"absolute", top:"10%", left:"12%",
            width:"18%", height:"62%",
            background:"rgba(255,255,255,.22)",
            borderRadius:"50%", filter:"blur(4px)",
          }}/>
          {/* Sangles */}
          {[30,63].map((top,i) => (
            <div key={i} style={{
              position:"absolute", left:0, right:0, top:`${top}%`,
              height:"3px", background:"rgba(15,50,10,.45)", borderRadius:"2px",
            }}/>
          ))}
        </div>

        {/* Pipe collecteur — pleine hauteur TOTAL_ABOVE, devant le dôme (zIndex:2)
            Descend du manifold jusqu'au haut de la cuve ; le dôme gonfle autour */}
        <div style={{
          position:"absolute", top:0, left:"50%", transform:"translateX(-50%)",
          width:"8px", height:`${TOTAL_ABOVE}px`,
          background:"#1E3848", border:"1px solid rgba(74,158,219,.32)",
          borderRadius:"4px 4px 0 0", overflow:"hidden",
          zIndex:2,
        }}>
          {isDigesting && (
            <div style={{
              position:"absolute", inset:"1px 1px 0",
              background:"repeating-linear-gradient(to bottom,rgba(102,238,136,.65) 0px,rgba(102,238,136,.65) 5px,transparent 5px,transparent 10px)",
              animation:"gasFlow .7s linear infinite",
            }}/>
          )}
        </div>
      </div>

      {/* Collier de jonction cuve ↔ dôme */}
      <div style={{
        width:`${TW+8}px`, height:"10px", flexShrink:0,
        background:"#1C3040", border:"1.5px solid rgba(100,170,220,.38)",
        borderRadius:"3px", display:"flex", alignItems:"center", justifyContent:"space-evenly",
      }}>
        {[0,1,2,3,4].map(i => (
          <div key={i} style={{
            width:"5px", height:"5px", borderRadius:"50%",
            background:"#0E1E2C", border:"1px solid rgba(74,158,219,.35)",
          }}/>
        ))}
      </div>

      {/* ── CUVE ── */}
      <div style={{
        width:`${TW}px`, height:`${TH}px`, flexShrink:0,
        background:"#182838", borderRadius:"0 0 6px 6px",
        position:"relative", overflow:"hidden",
      }}>
        {/* Face gauche éclairée */}
        <div style={{position:"absolute",top:0,left:0,bottom:0,width:"9px",background:"rgba(255,255,255,.04)"}}/>
        {/* Face droite ombrée */}
        <div style={{position:"absolute",top:0,right:0,bottom:0,width:"9px",background:"rgba(0,0,0,.2)"}}/>

        {/* Niveau digestat */}
        {liqH > 0 && (
          <div style={{
            position:"absolute", bottom:0, left:"1px", right:"1px",
            height:`${liqH}px`, background:"rgba(28,120,55,.5)",
            borderRadius:"0 0 5px 5px", transition:"height .35s ease",
          }}>
            {chargePct > 0.05 && (
              <div style={{
                position:"absolute", top:"-3px", left:0, right:0,
                height:"5px", background:"rgba(60,195,88,.35)",
                borderRadius:"50%", animation:"shimmer 2.5s ease infinite",
              }}/>
            )}
          </div>
        )}

        {/* Bandes de renfort */}
        {[22,52,80].map((p,i) => (
          <div key={i} style={{
            position:"absolute", left:0, right:0, top:`${p}%`,
            height:"2px", background:"rgba(74,130,190,.15)",
          }}/>
        ))}

        {/* Agitateur SVG */}
        <svg width={TW} height={TH} viewBox={`0 0 ${TW} ${TH}`}
          style={{position:"absolute",top:0,left:0,overflow:"visible"}}>

          {/* Axe */}
          <rect x={cx-3} y={2} width={6} height={TH-4} rx={3}
            fill="#1E3A50" stroke="rgba(74,158,219,.25)" strokeWidth=".8"/>

          {/* Carter moteur */}
          <rect x={cx-9} y={-1} width={18} height={11} rx={4}
            fill="#1A2E42" stroke="rgba(74,158,219,.3)" strokeWidth="1.2"/>

          {/* Pales niveau 1 */}
          <g style={{transformOrigin:`${cx}px ${b1Y}px`,
            animation:oscDur?`paddle-osc ${oscDur} ease-in-out infinite`:"none"}}>
            <rect x={cx-bHalf-3} y={b1Y-4} width={bHalf} height={7} rx={3.5}
              fill="#2B6A8A" stroke="rgba(74,158,219,.55)" strokeWidth="1"/>
            <rect x={cx+3} y={b1Y-4} width={bHalf} height={7} rx={3.5}
              fill="#2B6A8A" stroke="rgba(74,158,219,.55)" strokeWidth="1"/>
            <circle cx={cx} cy={b1Y} r={5}
              fill="#182E42" stroke="rgba(74,158,219,.4)" strokeWidth="1.5"/>
          </g>

          {/* Pales niveau 2 */}
          <g style={{transformOrigin:`${cx}px ${b2Y}px`,
            animation:oscDur?`paddle-osc-inv ${oscDur} ease-in-out infinite`:"none"}}>
            <rect x={cx-bHalf-3} y={b2Y-4} width={bHalf} height={7} rx={3.5}
              fill="#245A78" stroke="rgba(74,158,219,.45)" strokeWidth="1"/>
            <rect x={cx+3} y={b2Y-4} width={bHalf} height={7} rx={3.5}
              fill="#245A78" stroke="rgba(74,158,219,.45)" strokeWidth="1"/>
            <circle cx={cx} cy={b2Y} r={4.5}
              fill="#182E42" stroke="rgba(74,158,219,.35)" strokeWidth="1.5"/>
          </g>

          {/* Bulles */}
          {isDigesting && bubbles.slice(0,4).map(b => (
            <circle key={b.id}
              cx={cx+(b.x-50)/50*(TW/2-8)} cy={TH-8}
              r={b.size*0.42} fill="rgba(134,239,172,.5)"
              style={{animation:`gasBubbleSvg ${b.dur}s ease forwards`}}/>
          ))}
        </svg>

        {/* Tuyau entrée substrat (gauche) */}
        <div style={{position:"absolute",left:"-12px",top:"60%",width:"13px",height:"8px",
          background:"#1A2E40",borderRadius:"3px 0 0 3px"}}/>
        {/* Tuyau sortie digestat (droite) */}
        <div style={{position:"absolute",right:"-12px",top:"78%",width:"13px",height:"8px",
          background:"#1A2E40",borderRadius:"0 3px 3px 0"}}/>
      </div>

      {total > 1 && (
        <div style={{fontSize:"8px",color:"rgba(74,158,219,.65)",fontWeight:700,marginTop:"3px"}}>
          #{index+1}
        </div>
      )}
    </div>
  );
}

// ─── RANKING TAB — Phase 2 : national + régional ─────────────────────────────
function RankingTab({

              <div style={{
                width:"36px",height:"36px",borderRadius:"50%",
                background:myRank<=3&&injected?"linear-gradient(135deg,#C07800,#F5BE50)":"rgba(74,158,219,.2)",
                border:myRank<=3&&injected?"2px solid #F5D888":"2px solid rgba(74,158,219,.3)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:myRank<=3&&injected?"18px":"14px",
                fontWeight:900,color:myRank<=3&&injected?"#0B1623":"#6DB5EC",

              <div>

                <div style={{fontSize:"10px",color:"rgba(255,255,255,.45)"}}>{region}</div>

            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"22px",fontWeight:900,color:injected?"#4A9EDB":"rgba(255,255,255,.3)",letterSpacing:"-.5px"}}>
              {injected ? fmt(totalScore) : "—"}
            </div>
            <div style={{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"4px"}}>
              {injected && bm > 0 && (
                <span style={{fontSize:"9px",padding:"2px 7px",borderRadius:"10px",background:"rgba(74,158,219,.15)",color:"#6DB5EC",fontWeight:600}}>

              {injected && gnvBm > 0 && (
                <span style={{fontSize:"9px",padding:"2px 7px",borderRadius:"10px",background:"rgba(74,200,120,.15)",color:"#4ADB94",fontWeight:600}}>

                </span>

            </div>
          </div>
        </div>

        {/* Indicateur realtime */}
        <div style={{
          display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:"10px",
          padding:"5px 10px",borderRadius:"8px",background:rt.bg,

          <div style={{display:"flex",alignItems:"center",gap:"6px"}}>

            <span style={{fontSize:"10px",fontWeight:600,color:rtStatus==="connected"?"#22c55e":"rgba(255,255,255,.5)"}}>

          {[["national","🌍 National"],["regional","📍 Régional"]].map(([id,lbl]) => (
            <button key={id} onClick={() => setMyRankTab(id)} style={{
              flex:1,padding:"8px 10px",borderRadius:"10px",
              background:myRankTab===id?"rgba(74,158,219,.15)":"rgba(255,255,255,.03)",
              border:`1px solid ${myRankTab===id?"rgba(74,158,219,.4)":"rgba(255,255,255,.06)"}`,
              color:myRankTab===id?"#4A9EDB":"rgba(255,255,255,.5)",

              cursor:"pointer",transition:"all .3s"

      {/* ══ MON CLASSEMENT · NATIONAL · CUMUL LIFETIME (Hall of Fame) ══ */}
      {rankTab === "mine" && myRankMode === "cumulative" && cumulativeView === "lifetime" && myRankTab === "national" && (
        <div style={{flex:1,padding:"12px 14px 30px",animation:"riseIn .3s ease"}}>

          {/* Podium top 3 */}

            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:"6px",marginBottom:"16px",padding:"10px 0"}}>

                const entry = leaderboard[podiumIdx];

                const isMe = entry.name === username;

                const colors = ["#F5BE50","#C0C0C0","#CD7F32"];
                const bgColors = ["rgba(245,190,80,.15)","rgba(192,192,192,.1)","rgba(205,127,50,.1)"];
                const borderColors = ["rgba(245,190,80,.5)","rgba(192,192,192,.35)","rgba(205,127,50,.35)"];
                const rg = regionData[entry.region];
                return (

                  }}>
                    <div style={{
                      fontSize:"22px",marginBottom:"4px",
                      filter:isMe?"drop-shadow(0 0 12px rgba(245,190,80,.9))":"none"
                    }}>{MEDALS[podiumIdx]}</div>
                    <div style={{
                      fontSize:"11px",fontWeight:800,color:isMe?"#F5BE50":"#EDF4FF",
                      textAlign:"center",marginBottom:"4px",lineHeight:1.2,
