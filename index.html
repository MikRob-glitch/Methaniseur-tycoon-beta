  const zoneStateRef       = useRef(zoneState);       useEffect(()=>{zoneStateRef.current=zoneState;},[zoneState]);
  const satSinceRef        = useRef(saturatedSince);  useEffect(()=>{satSinceRef.current=saturatedSince;},[saturatedSince]);
  const offlineUntilRef    = useRef(offlineUntil);    useEffect(()=>{offlineUntilRef.current=offlineUntil;},[offlineUntil]);
  // Les refs gnvBonusRefV24 / injectedRefV24 sont déclarées APRÈS gnvBonus/injected (plus bas) pour éviter le TDZ.
  const gnvBonusRefV24     = useRef(1);
  const injectedRefV24     = useRef(false);

  const applyCatchUp = useCallback(() => {
    const fr  = fillRateRef.current;
    const sm  = stockMaxRef.current;
    const bre = burnRateEffRef.current;
    const cme = chargeMaxEffRef.current;
    const st  = stateRef.current;
    const now = Date.now();

    // 1+2) Tampons locaux + stock global (même delta : dernier tick effectif)
    if (fr > 0) {
      const dtStock = Math.min((now - stockTickRef.current) / 1000, 86400);
      if (dtStock >= 1) {
        stockTickRef.current = now;
        const ownedNow = ownedRefV24.current;
        const locNow   = localStockRef.current;
        const stNow    = zoneStateRef.current;
        const offNow   = offlineUntilRef.current;

        // Remplir tampons (sans escalation)
        const newLocal = [...locNow];
        const newZone  = [...stNow];
        const newOff   = [...offNow];
        const newSat   = [...satSinceRef.current];
        let zoneChanged = false;
        for (let i = 0; i < 7; i++) {
          if (ownedNow[i] === 0) { newLocal[i] = 0; continue; }
          // Une zone offline reste offline tant que le timer n'est pas écoulé
          if (newZone[i] === 'offline') {
            if (newOff[i] && now >= newOff[i]) {
              newZone[i] = 'ok'; newOff[i] = null; newSat[i] = null;
              zoneChanged = true;
            }
            continue;
          }
          // Reset toute zone saturée vers 'ok' (politique idle-friendly)
          if (newZone[i] === 'saturated' || newZone[i] === 'warn') {
            newZone[i] = 'ok'; newSat[i] = null;
            zoneChanged = true;
          }
          const cap = UPGRADES[i].bagCap * ownedNow[i] * LOCAL_CAP_MULT;
          const baseI = fillFor(i, ownedNow[i]);
          newLocal[i] = Math.min(cap, newLocal[i] + baseI * dtStock);
        }
        setLocalStock(newLocal);
        if (zoneChanged) {
          setZoneState(newZone);
          setOfflineUntil(newOff);
          setSaturatedSince(newSat);
        }

        // Stock global : production idéale clampée au stockMax
        // v25.0 — yield mix : le flux entrant (= "tracteur idéal" qui aurait roulé)
        // a un yield moyen pondéré par baseFill×qty×bonus. On l'intègre au stockYield.
        if (sm > 0) {
          const flowYield = fr > 0
            ? ownedNow.reduce((a,q,i) => a + fillFor(i, q) * UPGRADES[i].realYield, 0) / fr
            : 0;
          setStock(s => {
            if (s >= sm) return sm;
            const idealProd = fr * dtStock;
            const accepted  = Math.min(sm - s, idealProd);
            if (accepted > 0) {
              const sYield = stockYieldRef.current || 0;
              const newS = s + accepted;
              setStockYield((newS > 0) ? (s * sYield + accepted * flowYield) / newS : 0);
            }
            return s + accepted;
          });
        }
      }
    }

    // Digestion + production : delta depuis le dernier tick effectif
    if (bre > 0) {
      const dtCharge = Math.min((now - chargeTickRef.current) / 1000, 86400);
      if (dtCharge >= 1) {
        chargeTickRef.current = now;
        setCharge(f => {
          if (f <= 0.001) return 0;
          const pct    = cme > 0 ? f / cme : 1;
          const burn   = bre * dtCharge * pct;
          const actual = Math.min(f, burn);
          // v25.0 — production = masse digérée × yield moyen pondéré du digesteur
          // v25.6 — modulé par la fiabilité industrielle (qualité d'extraction CH₄)
          const relMult  = reliabilityMultFor(reliabilityRef.current ?? 100);
          const produced = actual * (chargeYieldRef.current || 0) * relMult;
          if (produced > 0) {
            if (st.injected) {
              const euroGain = produced * BM_TO_EUR;
              if (st.gnvStations > 0 && st.gnvSplit > 0) {
                const toGnv = produced * (st.gnvSplit / 100);
                setBm(b => b + (produced - toGnv));
                setGnvBm(b => b + toGnv);
              } else {
                setBm(b => b + produced);
              }
              setEuros(e => e + euroGain);
            } else {
              setBuffer(b => Math.min(INJECTION_THRESHOLD, b + produced));
            }
          }
          return f - actual;
        });
      }
    }
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  useEffect(() => {
    const onVisChange = () => {
      if (document.visibilityState === 'hidden') {
        saveGame();
        hiddenAtRef.current = Date.now();
      } else if (hiddenAtRef.current) {
        hiddenAtRef.current = null;
        // Pas besoin de calculer elapsed ici : applyCatchUp utilise les refs de ticks
        applyCatchUp();
      }
    };
    window.addEventListener('beforeunload', saveGame);
    document.addEventListener('visibilitychange', onVisChange);
    return () => {
      window.removeEventListener('beforeunload', saveGame);
      document.removeEventListener('visibilitychange', onVisChange);
    };
  }, [saveGame, applyCatchUp]);

  // ── Dérivés ────────────────────────────────────────────────────────────────
  // v25.7 — bonus +15 % de remplissage par tracteur converti GNV (max ×3 = +45 %)
  // On ne compte que les tracteurs réellement possédés (slice par tractorCount)
  const gnvConvertedCount = tractorGnvArr.slice(0, tractorCount).filter(Boolean).length;
  const gnvBonus      = 1 + 0.15 * gnvConvertedCount;
  gnvBonusRefV24.current = gnvBonus;       // sync immédiat — pas de TDZ
  injectedRefV24.current = injected;       // sync immédiat — pas de TDZ
  const fillRate      = owned.reduce((a,q,i) => a+fillFor(i, q), 0) * gnvBonus;
  const burnRate      = fillRate;
  // chargeMaxEff dynamique : cible ~90s de digestion à tout niveau d'intrant
  // → le niveau du digesteur reste lisible quelle que soit la vitesse de remplissage
  const TARGET_DRAIN_SEC  = 90;
  const dynamicChargeMax  = Math.max(CHARGE_MAX, Math.ceil(fillRate * TARGET_DRAIN_SEC));
  const chargeMaxEff      = dynamicChargeMax * digesteurs;   // capacité digesteur x nb digesteurs
  chargeMaxEffRef.current = chargeMaxEff;                       // sync immédiat — pas de TDZ
  const burnRateEff       = burnRate * digesteurs;           // débit de transformation x nb digesteurs
  // v25.0 — stockMax doit absorber le payload tracteur entier sans fuite.
  //   Avant : sum(bagCap × qty) → fuite garantie au dump si une zone sature.
  //   Maintenant : sum(bagCap × qty × LOCAL_CAP_MULT) → cohérent avec localCap total
  const stockMax    = owned.reduce((a,q,i) => a+UPGRADES[i].bagCap*q*LOCAL_CAP_MULT, 0);
  fillRateRef.current    = fillRate;     // sync pour catch-up
  stockMaxRef.current    = stockMax;     // sync pour catch-up
  burnRateEffRef.current = burnRateEff;  // sync pour catch-up
  const stockPct    = stockMax > 0 ? stock/stockMax : 0;
  const fillPenalty = stockPct>=1?0:stockPct>=.8?.4:1;
  const isDigesting = charge > 0.001;  // seuil : évite la queue asymptotique
  const chargePct     = charge/chargeMaxEff;
  const bufferPct   = Math.min(1, buffer/INJECTION_THRESHOLD);

  const canUnlockEpurateur   = !epurateurOk  && buffer>=EPURATEUR_THRESHOLD;
  const canUnlockCompresseur = !compresseurOk && epurateurOk && buffer>=COMPRESSEUR_THRESHOLD;
  const canConnect           = !injected && compresseurOk && epurateurOk && buffer>=INJECTION_THRESHOLD && owned[4]>=1;

  const stockColor = stockPct>=1?"#E05858":stockPct>=.8?"#E07820":stockPct>=.5?"#eab308":"#4A9EDB";
  const isUpgradeAvailable = i => {
    const u=UPGRADES[i];
    if (u.unlocksAt===null)          return true;
    if (u.unlocksAt==="epurateur")   return epurateurOk;
    if (u.unlocksAt==="compresseur") return compresseurOk;
    if (u.unlocksAt==="injected")    return injected;
    return false;
  };
  const totalScore      = computeScore(bm, gnvBm);   // v25.0.5 — pondéré GNV
  const wallet          = injected ? euros : buffer;
  const walletLabel     = injected ? "€" : "m³";
  const fmtWallet       = injected ? fmtEuro : fmt;
  const canBuySomething = UPGRADES.some((u,i)=>wallet>=getCost(u,owned[i])&&isUpgradeAvailable(i));

  // bmPerSecond reflète le taux RÉEL au niveau de charge actuel
  // v25.0 : production = burn × chargeYield (m³ CH₄ par tonne digérée, mix pondéré)
  //         Si digesteur vide, pas de production. Si yield=0 (init), idem.
  // v25.6 : production effective × multiplicateur fiabilité (qualité extraction CH₄)
  const reliabilityMult = reliabilityMultFor(reliability);
  const bmPerSecond = isDigesting ? chargePct * burnRateEff * (chargeYield || 0) * reliabilityMult : 0;
  const bmPerHour   = bmPerSecond*3600;

  const fmtETA = (current, target, perHour) => {
    if (perHour<=0) return "∞";
    const hours = (target-current)/perHour;
    if (hours<1/60) return "< 1 min";
    if (hours<1)    return `${Math.ceil(hours*60)} min`;
    if (hours<24)   return `${hours.toFixed(1).replace(".",",")}h`;
    return `${Math.floor(hours/24)}j ${Math.round(hours%24)}h`;
  };

  // type: 'success' | 'info' | 'warning'
  const showNotif = (msg, type='info', subtitle=null) => {
    setNotif({ msg, type, subtitle });
    setTimeout(() => setNotif(null), type==='success' ? 5000 : 4000);
  };
  const showCinematic = (key, data={}) => setCinematic({ key, data });

  // ── TICKS (timestamp-based for sleep/background catch-up) ────────────────
  //
  // v24 : GISEMENTS LOCAUX — machine à états + remplissage par zone.
  // Le stock GLOBAL n'est plus alimenté par fillRate direct : ce sont les
  // tracteurs qui transfèrent localStock[i] → stock lors de leur dumping
  // (cf. TractorWorld). La boucle ci-dessous fait 3 choses :
  //   1) Remplit les tampons locaux (baseFill × qty × dt) → clamp localCap
  //   2) Gère les transitions d'état ok → warn → saturated → offline
  //   3) Déclenche pannes (pénalité €, reliability--, notif)
  //
  // Les refs miroirs (ownedRefV24, localStockRef, etc.) sont déclarées plus haut,
  // avant applyCatchUp, pour respecter l'ordre lexical.

  // ── TICK gisements (50ms) ──
  useEffect(()=>{
    stockTickRef.current = Date.now();
    const id=setInterval(()=>{
      const now = Date.now();
      const dt = Math.min((now - stockTickRef.current) / 1000, 2);
      stockTickRef.current = now;

      const ownedNow   = ownedRefV24.current;
      const locNow     = localStockRef.current;
      const stNow      = zoneStateRef.current;
      const satSinceNow= satSinceRef.current;
      const offNow     = offlineUntilRef.current;
      const gnvBonusNow= gnvBonusRefV24.current;

      // 1) Remplissage des tampons locaux — v25.0.7 : fillFor inclut le bonus étoile par intrant
      const newLocal = [...locNow];
      for (let i = 0; i < 7; i++) {
        if (ownedNow[i] === 0) { newLocal[i] = 0; continue; }
        const st = stNow[i];
        if (st === 'offline' || st === 'saturated') continue;
        const localCap = UPGRADES[i].bagCap * ownedNow[i] * LOCAL_CAP_MULT;
        const baseFill = fillFor(i, ownedNow[i]) * gnvBonusNow;
        newLocal[i] = Math.min(localCap, newLocal[i] + baseFill * dt);
      }

      // 2) Machine à états
      let newZoneState   = stNow;
      let newSatSince    = satSinceNow;
      let newOfflineUntil= offNow;
      let stateChanged   = false;
      const ensureCopy = () => {
        if (!stateChanged) {
          newZoneState    = [...stNow];
          newSatSince     = [...satSinceNow];
          newOfflineUntil = [...offNow];
          stateChanged = true;
        }
      };
      const panneTriggered = [];

      for (let i = 0; i < 7; i++) {
        const cur = stNow[i];

        if (ownedNow[i] === 0) {
          if (cur !== 'ok' || satSinceNow[i] !== null || offNow[i] !== null) {
            ensureCopy();
            newZoneState[i]    = 'ok';
            newSatSince[i]     = null;
            newOfflineUntil[i] = null;
          }
          continue;
        }

        const localCap  = UPGRADES[i].bagCap * ownedNow[i] * LOCAL_CAP_MULT;
        const fillRatio = localCap > 0 ? newLocal[i] / localCap : 0;

        // Zone offline : vérifier expiration de la panne
        if (cur === 'offline') {
          if (offNow[i] && now >= offNow[i]) {
            ensureCopy();
            newZoneState[i]    = 'ok';
            newSatSince[i]     = null;
            newOfflineUntil[i] = null;
          }
          continue;
        }

        // Zone saturée
        if (fillRatio >= 1) {
          if (cur !== 'saturated') {
            ensureCopy();
            newZoneState[i] = 'saturated';
            newSatSince[i]  = now;
          } else {
            const sTs = satSinceNow[i] || now;
            if (now - sTs >= SAT_PANNE_MS) {
              ensureCopy();
              newZoneState[i]    = 'offline';
              newSatSince[i]     = null;
              newOfflineUntil[i] = now + PANNE_DURATION_MS;
              newLocal[i]        = 0;
              panneTriggered.push(i);
            }
          }
          continue;
        }

        // Zone en warn (≥ 80 %)
        if (fillRatio >= WARN_THRESHOLD) {
          if (cur !== 'warn') {
            ensureCopy();
            newZoneState[i] = 'warn';
            newSatSince[i]  = null;
          }
          continue;
        }

        // Zone OK
        if (cur !== 'ok') {
          ensureCopy();
          newZoneState[i] = 'ok';
          newSatSince[i]  = null;
        }
      }

      // 3) Application
      setLocalStock(newLocal);
      if (stateChanged) {
        setZoneState(newZoneState);
        setSaturatedSince(newSatSince);
        setOfflineUntil(newOfflineUntil);
      }

      // 4) Traitement des pannes déclenchées : pénalité + notif + fiabilité
      if (panneTriggered.length > 0) {
        panneTriggered.forEach(i => {
          const cost = getRelaunchCost(i, ownedNow[i]);
          if (injectedRefV24.current) {
            setEuros(e => Math.max(0, e - cost));
          } else {
            setBuffer(b => Math.max(0, b - cost));
          }
          setReliability(r => Math.max(0, r - RELIABILITY_DROP_ON_PANNE));
          const u = UPGRADES[i];
          const costStr = injectedRefV24.current ? fmtEuro(cost) : fmt(cost);
          showNotif(
            `⚠ PANNE : ${u.name}`,
            'warning',
            `Gisement saturé trop longtemps — ${costStr} de frais d'urgence. Relance manuelle requise.`
          );
        });
      }

      // 5) Fiabilité en continu
      const hasSatNow = (stateChanged ? newZoneState : stNow).some(s => s === 'saturated');
      if (hasSatNow) {
        setReliability(r => Math.max(0, r - RELIABILITY_DROP_PER_SEC_SAT * dt));
      } else {
        setReliability(r => Math.min(100, r + RELIABILITY_RECOVER_PER_SEC * dt));
      }
    },50);
    return ()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    if (burnRateEff<=0) return;
    chargeTickRef.current = Date.now();
    const id=setInterval(()=>{
      const now = Date.now();
      const dt = Math.min((now - chargeTickRef.current) / 1000, 2);
      chargeTickRef.current = now;
      setCharge(f=>{
        if (f<=0.001) {
          // v25.0 — purge : digesteur vide → reset yield (rien à propager)
          if (chargeYieldRef.current !== 0) setChargeYield(0);
          // v25.0.9 — purge composition aussi
          setChargeComposition([0,0,0,0,0,0,0]);
          return 0;
        }
        const cme    = chargeMaxEffRef.current;
        const pct    = cme > 0 ? f / cme : 1;              // fraction de charge actuelle
        const burn   = burnRateEff * dt * pct;              // débit ∝ niveau du digesteur
        const actual = Math.min(f, burn);
        // v25.0 — production = masse × yield moyen pondéré du digesteur
        // Le yield reste invariant pendant la digestion (consommation proportionnelle)
        // v25.6 — modulé par la fiabilité industrielle (qualité d'extraction CH₄)
        const relMult  = reliabilityMultFor(reliabilityRef.current ?? 100);
        const produced = actual * (chargeYieldRef.current || 0) * relMult;
        // v25.0.9 — décrément composition proportionnel à la consommation
        if (actual > 0 && f > 0) {
          const ratio = actual / f;
          setChargeComposition(prev => prev.map(m => Math.max(0, (m || 0) * (1 - ratio))));
        }
        if (produced > 0) {
          if (injected) {
            const euroGain = produced * BM_TO_EUR;
            if (gnvStations>0 && gnvSplit>0) {
              const toGnv = produced*(gnvSplit/100);
              setBm(b=>b+(produced-toGnv));
              setGnvBm(b=>b+toGnv);
            } else {
              setBm(b=>b+produced);
            }
            setEuros(e=>e+euroGain);
          } else {
            setBuffer(b=>Math.min(INJECTION_THRESHOLD,b+produced));
          }
        }
        return f-actual;
      });
    },50);
    return ()=>clearInterval(id);
  },[burnRateEff,injected,gnvStations,gnvSplit]);

  // ── AUTO-DUMP — déverseur automatique ─────────────────────────────────────
  // v25.0.8 — seuil de déclenchement : ne déverse que si stock ≥ X% de stockMax.
  //   Permet au joueur d'accumuler dans le BAC avant déversement automatique.
  //   Cas d'usage : éviter saturation digesteur, gameplay anti-AFK plus tactique.
  useEffect(()=>{
    if (!autoDump) return;
    const id=setInterval(()=>{
      setStock(s=>{
        if (s<1) return s;
        // v25.0.8 — Vérification du seuil de déclenchement
        const sm = stockMaxRef.current;
        const threshold = autoDumpThresholdRef.current || 0;
        if (sm > 0 && (s / sm) * 100 < threshold) return s;  // seuil pas atteint → on attend
        const cme   = chargeMaxEffRef.current;
        const cNow  = chargeRef.current;
        const space = cme - cNow;
        if (space <= 0) return s;                     // digesteur plein → stock préservé
        const poured = Math.min(s, space);
        // v25.0 — propagation yield : stock → charge (moyenne pondérée)
        const sYield = stockYieldRef.current || 0;
        const cYield = chargeYieldRef.current || 0;
        const newCharge = cNow + poured;
        const newChargeYield = newCharge > 0
          ? (cNow * cYield + poured * sYield) / newCharge
          : 0;
        setChargeYield(newChargeYield);
        setCharge(f => Math.min(cme, f + poured));
        // v25.0.9 — propagation composition proportionnelle stock → charge
        // On retire `poured/s` de chaque intrant du BAC et on l'ajoute au digesteur
        const sComp = stockCompRef.current || [0,0,0,0,0,0,0];
        const ratio = s > 0 ? poured / s : 0;
        if (ratio > 0) {
          const transfer = sComp.map(m => (m || 0) * ratio);
          setStockComposition(prev => prev.map((m, i) => Math.max(0, (m || 0) - transfer[i])));
          setChargeComposition(prev => prev.map((m, i) => (m || 0) + transfer[i]));
        }
        // Si le BAC se vide, reset stockYield + composition
        if (s - poured < 0.001) {
          if (sYield !== 0) setStockYield(0);
          setStockComposition([0,0,0,0,0,0,0]);
        }
        return s - poured;                            // surplus conservé dans le bac
      });
    }, 2000); // toutes les 2s
    return ()=>clearInterval(id);
  },[autoDump]);

  useEffect(()=>{
    const rate=isDigesting?Math.max(150,900-chargePct*700):1200;
    const id=setInterval(()=>{
      const b={id:uid++,x:15+Math.random()*70,dur:.9+Math.random()*1.4,size:5+Math.random()*9};
      setBubbles(p=>[...p.slice(-18),b]);
      setTimeout(()=>setBubbles(p=>p.filter(x=>x.id!==b.id)),(b.dur+.2)*1000);
    },rate);
    return ()=>clearInterval(id);
  },[isDigesting,chargePct]);

  // ── REWARD DETECTION — cinématiques récompenses ────────────────────────────
  const REWARD_DEFS = [
    { id:"go_mwh",   label:"PREMIÈRE GARANTIE D'ORIGINE",  check: () => injected && totalScore >= 100 },
    { id:"cpb",      label:"CERTIFICAT DE PRODUCTION",     check: () => injected && totalScore >= 10000 },
    { id:"quali",    label:"LABEL QUALIMÉTHA",             check: () => injected && digesteurs >= 2 },
    { id:"foyers100",label:"100 FOYERS ALIMENTÉS",          check: () => totalScore >= 1000000 },
    { id:"foyers1k", label:"1 000 FOYERS ALIMENTÉS",        check: () => totalScore >= 10000000 },
    { id:"vert",     label:"TERRITOIRE VERT",               check: () => totalScore >= 100000000 },
  ];
  useEffect(() => {
    if (!injected || !cloudSynced) return;
    for (const r of REWARD_DEFS) {
      if (seenRewards.includes(r.id)) continue;
      if (!r.check()) continue;
      // Nouveau reward débloqué — cinématique + persist
      setSeenRewards(prev => {
        if (prev.includes(r.id)) return prev;
        const next = [...prev, r.id];
        return next;
      });
      // Délai léger pour une transition fluide
      setTimeout(() => showCinematic(r.id, {}), 400);
      break; // un seul à la fois
    }
  }, [injected, totalScore, digesteurs, cloudSynced, seenRewards]); // eslint-disable-line react-hooks/exhaustive-deps

  // ── Moteur de déclenchement du tutoriel spotlight ─────────────────────────
  useEffect(() => {
    if (activeTuto) return; // ne pas interrompre un tuto actif
    const gs = {
      seenTutos,
      tab,
      stock,
      bm,
      buffer,
      owned,
      injected,
      epurateurOk,
      compresseurOk,
      gnvStations,
      canUnlockEpurateur,
      canUnlockCompresseur,
      canConnect,
      ownedCount: owned.filter(q => q > 0).length,
    };
    const next = TUTORIAL_STEPS.find(s => s.trigger(gs));
    if (next) setActiveTuto(next);
  }, [seenTutos, tab, stock, bm, buffer, owned, injected, epurateurOk, compresseurOk, gnvStations, canUnlockEpurateur, canUnlockCompresseur, canConnect, activeTuto]); // eslint-disable-line react-hooks/exhaustive-deps
  // ─────────────────────────────────────────────────────────────────────────

  // Mise à jour position locale dans le lb sans fetch réseau
  // bufferQ : quantifié pour éviter 20 re-renders/s pré-raccordement
  const bufferQ = Math.floor(buffer);
  useEffect(() => {
    setLb(prev => {
      const without = prev.filter(e => e.name !== username);
      // v25.0.5 — tri composite : score → euros → chainLevel
      const me = {
        name: username, region,
        score: totalScore, scoreNet: bm, scoreGnv: gnvBm,
        connected: injected, buffer: bufferQ,
        epurateur: epurateurOk, compresseur: compresseurOk,
        digesteurs, euros,
        chainLevel: computeChainLevel(epurateurOk, compresseurOk, injected),
        isMe: true,
      };
      return [...without, me]
        .sort((a, b) => {
          if (b.score      !== a.score)      return b.score      - a.score;
          if ((b.euros||0) !== (a.euros||0)) return (b.euros||0) - (a.euros||0);
          return (b.chainLevel||0) - (a.chainLevel||0);
        })
        .slice(0, 15);
    });
  }, [totalScore, bufferQ, injected, epurateurOk, compresseurOk, digesteurs, euros, username, region]);

  // ── DÉVERSER ───────────────────────────────────────────────────────────────
  const handlePour = useCallback(()=>{
    if (pouring || stock < 1) return;
    const cme   = chargeMaxEffRef.current;
    const cNow  = chargeRef.current;
    const space = cme - cNow;
    if (space <= 0) return;                   // digesteur déjà plein
    const dumped = Math.min(stock, space);    // on ne verse que ce qui rentre

    // ── v24.2 FIX : vidage immédiat (logique métier découplée de l'animation) ──
    // Avant : setStock/setCharge à T+1100ms (fin d'anim) → race condition avec
    //         les dumps de tracteur pendant l'anim. Le `s` lu était déjà ré-augmenté
    //         par le tracteur, donnant l'impression que le vidage n'avait pas eu lieu.
    // Maintenant : transfert stock→charge instantané, animation purement cosmétique.
    // v25.0 — propagation yield BAC→charge (moyenne pondérée)
    const sYield = stockYieldRef.current || 0;
    const cYield = chargeYieldRef.current || 0;
    const newCharge = cNow + dumped;
    const newChargeYield = newCharge > 0
      ? (cNow * cYield + dumped * sYield) / newCharge
      : 0;
    setChargeYield(newChargeYield);
    // v25.0.9 — propagation composition BAC→charge proportionnelle
    const sComp = stockCompRef.current || [0,0,0,0,0,0,0];
    const ratio = stock > 0 ? dumped / stock : 0;
    if (ratio > 0) {
      const transfer = sComp.map(m => (m || 0) * ratio);
      setStockComposition(prev => prev.map((m, i) => Math.max(0, (m || 0) - transfer[i])));
      setChargeComposition(prev => prev.map((m, i) => (m || 0) + transfer[i]));
    }
    setStock(s  => {
      const next = Math.max(0, s - dumped);
      if (next < 0.001) {
        if (sYield !== 0) setStockYield(0);
        setStockComposition([0,0,0,0,0,0,0]);
      }
      return next;
    });
    setCharge(f => Math.min(cme, f + dumped));

    setPouring(true);
    let start = null;
    const DUR = 1100;
    const tick = ts => {
      if (!start) start = ts;
      const t = Math.min(1, (ts - start) / DUR);
      setPourProg(t);
      if (t < 1) { requestAnimationFrame(tick); }
      else {
        setPouring(false); setPourProg(0);
        const sf = {id:uid++, val:`+${fmtT(dumped)} dans le digesteur !`};
        setScoreF(p => [...p, sf]);
        setTimeout(() => setScoreF(p => p.filter(x => x.id !== sf.id)), 2200);
        if (tutStep === 2) setTutStep(3);
      }
    };
    requestAnimationFrame(tick);
  },[pouring, stock, tutStep]);

  // ── DÉBLOCAGE ──────────────────────────────────────────────────────────────
  const triggerAnim = (id, cb) => { setUnlockAnim(id); setTimeout(()=>{ setUnlockAnim(null); cb(); },900); };

  const handleUnlockEpurateur = () => {
    if (!canUnlockEpurateur) return;
    // v25.0.3 — fix : déblocage consomme le buffer (cohérence avec le raccordement)
    //                  Avant : épurateur débloqué gratuitement, le seuil n'avait aucun coût.
    triggerAnim("epurateur",()=>{
      setEpurateurOk(true);
      setBuffer(b => Math.max(0, b - EPURATEUR_THRESHOLD));
      showNotif("Épurateur activé","success","Biodéchets et boues de STEP débloqués");
    });
  };
  const handleUnlockCompresseur = () => {
    if (!canUnlockCompresseur) return;
    // v25.0.3 — fix : idem, consomme le seuil
    triggerAnim("compresseur",()=>{
      setCompresseurOk(true);
      setBuffer(b => Math.max(0, b - COMPRESSEUR_THRESHOLD));
      showNotif("Compresseur activé","success","Déchets industriels débloqués");
    });
  };
  const handleConnect = () => {
    if (!canConnect) return;
    triggerAnim("injection",()=>{
      setInjected(true);
      // Buffer consommé comme coût de qualification — bm repart à 0
      setBuffer(0);
      // v25.1 — Prime de raccordement (avance contractuelle GRDF) : 5 000 €
      //         Permet au joueur d'acheter immédiatement 1-2 nouveautés post-raccordement
      //         (CIVE à 2 500 € accessible dès le clic) → big bang ressenti
      setEuros(e => e + RACCORDEMENT_BONUS);
      showCinematic("raccordement", { volume: buffer, bonus: RACCORDEMENT_BONUS });
      // Upsert immédiat au raccordement
      supabaseUpsert({
        id:`${username}_${region}`.toLowerCase().replace(/\s+/g,'_'),
        username, region,
        score_network: 0,
        score_gnv: 0,
        is_connected: true,
        buffer: 0,
        epurateur: true,
        compresseur: true,
        digesteurs,
        connected_at: new Date().toISOString(),

    });
  };

  // ── DIGESTEUR HANDLERS ────────────────────────────────────────────────────────
  const handleBuyDigesteur = () => {
    if (digesteurs >= 3) return;
    const cost = DIGESTEUR_COSTS[digesteurs - 1];
    if (euros < cost) return;
    setEuros(e => e - cost);
    setDigesteurs(d => d + 1);
    setSceneZoomAnim(true);
    setTimeout(() => setSceneZoomAnim(false), 1200);
    const sf = {id:uid++, val:<><MiniDigesterIcon size={18}/> Digesteur {digesteurs+1} opérationnel !</>};
    setScoreF(p => [...p, sf]);
    setTimeout(() => setScoreF(p => p.filter(x => x.id !== sf.id)), 2200);
    showNotif(`Digesteur ${digesteurs+1} activé`,"success",`Capacité ×${digesteurs+1} — production boostée`);
  };

  // ── GNV HANDLERS ──────────────────────────────────────────────────────────────
  const handleBuyGnvStation = () => {
    if (gnvStations>=3) return;
    const cost=GNV_STATION_COSTS[gnvStations];
    if (euros<cost) return;
    setEuros(e=>e-cost);
    setGnvStations(s=>s+1);
    const sf={id:uid++,val:`⛽ Station GNV ${gnvStations+1} opérationnelle !`};

  // v25.7 — handleBuyTractorGnv (legacy global) supprimé.

    // v25.1.25 — Déclenche l'animation visuelle de relance (1.2s)
    setRelaunchAnim(prev => { const n = [...prev]; n[upgradeId] = Date.now(); return n; });
    setTimeout(() => {
      setRelaunchAnim(prev => { const n = [...prev]; n[upgradeId] = null; return n; });
    }, 1200);
    showNotif(`✓ ${UPGRADES[upgradeId].name} relancé`, 'success', `Production reprise · Fiabilité restaurée`);
  };

  // ── ACHATS ─────────────────────────────────────────────────────────────────
  const buyUpgrade = i => {
    if (!isUpgradeAvailable(i)) return;

    setOwned(p=>{ const n=[...p]; n[i]++; return n; });

    setTimeout(()=>setScoreF(p=>p.filter(x=>x.id!==sf.id)),1800);
    if (tutStep===1) { setTutStep(2); setTab("game"); }
  };

  const buyMulti = (i, count) => {

    const actual = count === "max" ? getMaxBuy(UPGRADES[i], owned[i], wallet) : Math.min(count, getMaxBuy(UPGRADES[i], owned[i], wallet));
    if (actual <= 0) return;
    const totalCost = getMultiCost(UPGRADES[i], owned[i], actual);
    if (wallet < totalCost) return;
    if (injected) { setEuros(e => e - totalCost); } else { setBuffer(b => b - totalCost); }
    setOwned(p => { const n = [...p]; n[i] += actual; return n; });
    const sf = { id: uid++, val: `×${actual} — ${injected?fmtEuro(totalCost):fmt(totalCost)}` };
    setScoreF(p => [...p, sf]);
    setTimeout(() => setScoreF(p => p.filter(x => x.id !== sf.id)), 1800);
    if (tutStep === 1 && i === 0) { setTutStep(2); setTab("game"); }
  };

  const binRotate = pouring?35*pourProg:0;
  const binTransX = pouring?18*pourProg:0;

                <div style={{fontSize:"20px",fontWeight:800,color:"#4A9EDB",letterSpacing:"-.5px"}}>{fmt(totalScore)}</div>
                <div style={{display:"flex",alignItems:"center",gap:"6px",justifyContent:"flex-end",marginTop:"3px"}}>
                  <span style={{fontSize:"10px",color:"#E8A020",fontWeight:700,display:"inline-flex",alignItems:"center",gap:"4px"}}><BankIcon size={12}/> {fmtEuro(euros)}</span>
                  <span style={{fontSize:"8px",color:"rgba(255,255,255,.25)"}}>· Tarif GRDF : {BM_TO_EUR.toFixed(2)} €/m³</span>
                </div>
              </>
            ) : (
              <>
                <div style={{fontSize:"10px",color:"rgba(255,255,255,.45)",textTransform:"uppercase",letterSpacing:".05em"}}>En attente injection</div>
                <div style={{fontSize:"20px",fontWeight:800,color:"rgba(255,255,255,.45)",letterSpacing:"-.5px"}}>—</div>
              </>
            )}
          </div>
        </div>
      </div>

      {/* Tabs */}
      {/* v25.0.6 — Récompenses promu au niveau principal (sortie de Classement)
                   pour améliorer la découvrabilité. Libellés raccourcis
                   pour rester lisibles avec 4 onglets en portrait mobile. */}
      <div style={{display:"flex",background:"rgba(11,22,35,.55)",borderBottom:"1px solid rgba(74,158,219,.09)"}}>
        {[["game",<><MiniDigesterIcon size={13}/> Digesteur</>],["upgrades","⬆️ Achats"],["ranking","🏆 Classement"],["rewards","🎖️ Récomp."]].map(([id,lbl])=>{
          const highlight=id==="upgrades"&&canBuySomething&&tab!=="upgrades";
          return (
            <button key={id} {...(id==="upgrades"?{"data-tut":"tab-upgrades"}:{})} onClick={()=>{ setTab(id); if(id==="upgrades"&&tutStep===0) setTutStep(1); }} style={{
              flex:1,padding:"11px 2px",border:"none",
              background:highlight?"rgba(74,158,219,.14)":"transparent",
              color:tab===id?"#4A9EDB":highlight?"#6DB5EC":"rgba(255,255,255,.35)",
              fontSize:"11px",fontWeight:tab===id||highlight?700:400,
              borderBottom:tab===id?"2px solid #4A9EDB":highlight?"2px solid rgba(74,158,219,.5)":"2px solid transparent",
              cursor:"pointer",position:"relative",transition:"all .3s",whiteSpace:"nowrap"}}>
              {lbl}
              {highlight&&<span style={{position:"absolute",top:"6px",right:"6px",width:"7px",height:"7px",borderRadius:"50%",background:"#4A9EDB",boxShadow:"0 0 6px rgba(74,158,219,.95)"}}/>}
            </button>
          );
        })}
      </div>

      {/* ══ TAB DIGESTEUR ══ */}
      {/* v25.0.4 — fix : display:none au lieu de unmount conditionnel.
                   Avant : tab≠"game" démontait DigesteurScene → TractorWorld
                   se détruisait → ses rAF/useEffect cleanup → AUCUN tracteur ne
                   travaillait quand on était sur Achats/Classement. Le BAC ne
                   recevait plus rien tant qu'on n'était pas sur l'onglet jeu.
                   Maintenant : composant monté en permanence, juste caché. */}
      <div style={{padding:"16px 16px 30px",display: tab==="game" ? "block" : "none"}}>

          {/* Flux */}
          <div style={{marginBottom:"16px",padding:"10px 12px",borderRadius:"12px",background:"rgba(74,158,219,.05)",border:"1px solid rgba(74,158,219,.09)"}}>
            <div style={{fontSize:"9px",color:"rgba(255,255,255,.45)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"7px"}}>🔄 Flux de production</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"5px"}}>
              {[
                {label:"Upgrades",    icon:"⬆️",color:"#AA7700",dim:fillRate===0},
                {label:"Bac",         icon:"🗑️",color:"#4A9EDB",dim:stock<1},
                {label:"Digesteur",   icon:<MiniDigesterIcon/>,color:"#6DB5EC",dim:charge<1},
                {label:"Biogaz",     icon:"♻️",color:"#A8CCEC",dim:charge<1},
                {label:"Cuve tampon", icon:"🫙",color:"#3AACCC",dim:buffer<1&&!injected},
                {label:"Réseau GRDF", icon:"🔌",color:"#4A9EDB",dim:!injected},
              ].map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:"4px",padding:"4px 7px",borderRadius:"8px",background:`${s.color}${s.dim?"0a":"18"}`,border:`1px solid ${s.color}${s.dim?"18":"40"}`,transition:"all .5s"}}>
                  <span style={{fontSize:"11px"}}>{s.icon}</span>
                  <span style={{fontSize:"9px",fontWeight:600,color:s.dim?"rgba(255,255,255,.3)":s.color,transition:"color .5s",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.label}</span>
                  {!s.dim&&<span style={{marginLeft:"auto",width:"5px",height:"5px",borderRadius:"50%",background:s.color,flexShrink:0,boxShadow:`0 0 4px ${s.color}`}}/>}
                </div>
              ))}
            </div>
          </div>

          {/* Stats */}
          <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
            {[
              {icon:"🐄",label:"Remplissage",val:fillRate>0?fmtT(fillRate*fillPenalty)+"/s":"—"},
              {icon:<MiniDigesterIcon size={18}/>,label:"m³/heure",   val:isDigesting?fmt(bmPerHour):"—"},
              {icon: injected ? <BankIcon size={18}/> : <CH4Icon size={18}/>, label:injected?"€ dispos":"m³ dispos",  val:injected?fmtEuro(euros):fmt(wallet)},
              // v24 : Fiabilité (affichée dès qu'on possède au moins une zone)
              // v25.6 : affiche le multiplicateur prod + signale la zone Qualimétha (≥95%)
              ...(owned.some(q=>q>0) ? [{
                icon: reliability >= 95 ? "💎" : reliability >= 80 ? "🟢" : reliability >= 50 ? "🟡" : "🔴",
                label: reliability >= 95 ? "Qualimétha" : "Fiabilité",
                val: `${Math.round(reliability)}% · ×${reliabilityMult.toFixed(2)}`,
                customColor: reliability >= 95 ? "#FFD55A" : reliability >= 80 ? "#6DB5EC" : reliability >= 50 ? "#E8A020" : "#E05858"
              }] : []),
            ].map(s=>(
              <div key={s.label} style={{flex:1,background:"rgba(74,158,219,.06)",border:"1px solid rgba(74,158,219,.12)",borderRadius:"10px",padding:"8px 6px",textAlign:"center"}}>
                <div style={{fontSize:"16px"}}>{s.icon}</div>
                <div style={{fontSize:"11px",fontWeight:700,color:s.customColor||"#6DB5EC",marginTop:"2px"}}>{s.val}</div>
                <div style={{fontSize:"9px",color:"rgba(255,255,255,.45)",marginTop:"1px"}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Scene */}
          <DigesteurScene
            tractorAtGnvStationRef={tractorAtGnvStationRef}
            digesteurs={digesteurs}
            sceneZoomAnim={sceneZoomAnim}
            bubbles={bubbles}
            chargePct={chargePct}
            chargeMaxEff={chargeMaxEff}
            isDigesting={isDigesting}
            bmPerHour={bmPerHour}
            fillRate={fillRate}
            owned={owned}
            stock={stock}
            stockMax={stockMax}
            stockPct={stockPct}
            stockColor={stockColor}
            binRotate={binRotate}
            binTransX={binTransX}
            pouring={pouring}
            handlePour={handlePour}
            tractorCount={tractorCount}
            tractorSpeedBoost={tractorSpeedBoost}
            tractorTrailers={tractorTrailers}
            tractorGnvArr={tractorGnvArr}
            pinnedZones={pinnedZones}
            onTogglePin={togglePinZone}
            cityView={cityView}
            setCityView={setCityView}
            injected={injected}
            epurateurOk={epurateurOk}
            compresseurOk={compresseurOk}
            zoneState={zoneState}
            localStock={localStock}
            setLocalStock={setLocalStock}
            setStock={setStock}
            stockMaxRef={stockMaxRef}
            offlineUntil={offlineUntil}
            handleRelaunchZone={handleRelaunchZone}
            euros={euros}
            buffer={buffer}
            reliability={reliability}
            stockRef={stockRef}
            stockYieldRef={stockYieldRef}
            setStockYield={setStockYield}
            setStockComposition={setStockComposition}
            stockComposition={stockComposition}
            stockYield={stockYield}
            // v25.1.6 — Props nécessaires pour la chaîne d'injection migrée en VUE 1 bottom
            // et le placeholder réseau aval en VUE 2 bottom (chantier C pré-câblé).
            unlockAnim={unlockAnim}
            bufferPct={bufferPct}
            bm={bm}
            burnRate={burnRate}
            gnvStations={gnvStations}
            gnvSplit={gnvSplit}
            gnvBm={gnvBm}
            canConnect={canConnect}
            relaunchAnim={relaunchAnim}
          />

          {/* v25.1.5 — Compteur biométhane retiré (cf. demande Mika : info pas globale,
              libère ~110px verticaux). Si besoin de réintroduction future, voir composant
              GasMeter (toujours défini, juste plus instancié ici). */}

          {/* Progression raccordement */}
          {!injected&&(
            <div style={{marginTop:"14px",padding:"14px 16px",borderRadius:"16px",background:"rgba(11,22,35,.55)",border:`1px solid ${canConnect?"rgba(232,160,32,.45)":"rgba(74,158,219,.14)"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                <div>
                  <div style={{fontSize:"12px",fontWeight:700,color:canConnect?"#F5BE50":"rgba(255,255,255,.72)"}}>{canConnect?"🔓 Raccordement possible !":"🎯 Objectif raccordement"}</div>
                  <div style={{fontSize:"10px",color:"rgba(255,255,255,.35)",marginTop:"2px"}}>{fmt(buffer)} / {fmt(INJECTION_THRESHOLD)} accumulés</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:"20px",fontWeight:800,color:canConnect?"#F5BE50":"#4A9EDB"}}>{Math.round(bufferPct*100)}%</div>
                  {isDigesting&&!canConnect&&bmPerHour>0&&<div style={{fontSize:"9px",color:"rgba(255,255,255,.35)",marginTop:"1px"}}>~{fmtETA(buffer,INJECTION_THRESHOLD,bmPerHour)}</div>}
                </div>
              </div>
              <div style={{height:"14px",borderRadius:"7px",background:"rgba(74,158,219,.09)",overflow:"hidden",position:"relative"}}>
                <div style={{height:"100%",borderRadius:"7px",width:`${bufferPct*100}%`,background:canConnect?"linear-gradient(90deg,#C07800,#E8A020,#F5D888)":"linear-gradient(90deg,#0A1828,#3A8ECB,#6DB5EC)",transition:"width .5s ease,background .5s",animation:canConnect?"bufferPulse 1s ease infinite":"none",boxShadow:canConnect?"0 0 12px rgba(232,160,32,.55)":"none"}}/>
                {[25,50,75].map(pct=>(<div key={pct} style={{position:"absolute",top:0,bottom:0,left:`${pct}%`,width:"1px",background:"rgba(11,22,35,.55)"}}/>))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:"6px"}}>
                <span style={{fontSize:"9px",color:"rgba(255,255,255,.32)"}}>0 m³</span>
                <span style={{fontSize:"9px",color:"rgba(255,255,255,.32)"}}>{fmt(INJECTION_THRESHOLD/2)}</span>
                <span style={{fontSize:"9px",color:"rgba(255,255,255,.32)"}}>{fmt(INJECTION_THRESHOLD)}</span>
              </div>
              {isDigesting&&(
                <div style={{marginTop:"8px",display:"flex",alignItems:"center",gap:"6px",fontSize:"11px",color:"rgba(255,255,255,.55)"}}>
                  <div style={{width:"6px",height:"6px",borderRadius:"50%",background:"#4A9EDB",animation:"chargePulse 1s ease infinite"}}/>
                  Alimentation cuve : <strong style={{color:"#6DB5EC"}}>{fmt(bmPerHour)}/h</strong>
                  {bmPerHour>0&&!canConnect&&<span style={{color:"rgba(255,255,255,.35)"}}>· encore {fmtETA(buffer,INJECTION_THRESHOLD,bmPerHour)}</span>}
                </div>
              )}
            </div>
          )}

          {/* v25.1.6 — Bloc "Chaîne d'injection" RETIRÉ d'ici (migré dans la VUE 1 bottom).
              Le rendu inline en VUE 1 utilise PipelineGraphic. Les "ÉTAPES 1/2/3" détaillées
              (épurateur/compresseur/raccordement) restent ci-dessous SI !injected, car ce sont
              des éléments d'action utilisateur (boutons, progress bars), pas du décor. */}
          {!injected && (
          <div style={{marginTop:"14px",borderRadius:"18px",overflow:"hidden",border:"1px solid rgba(74,158,219,.14)",background:"rgba(11,22,35,.55)"}}>
            <div style={{padding:"12px 16px 8px",borderBottom:"1px solid rgba(74,158,219,.09)"}}>
              <div style={{fontSize:"12px",fontWeight:700,color:"rgba(255,255,255,.82)"}}>📋 Étapes vers le raccordement</div>
              <div style={{fontSize:"10px",color:"rgba(255,255,255,.35)",marginTop:"2px"}}>Seuil : {fmt(INJECTION_THRESHOLD)}</div>
            </div>
              <div style={{padding:"4px 12px 14px",display:"flex",flexDirection:"column",gap:"10px"}}>
                {/* ÉTAPE 1 — Épurateur */}
                {(() => {
                  const done = epurateurOk;
                  const pct = done ? 100 : Math.min(100, buffer/EPURATEUR_THRESHOLD*100);
                  const ready = canUnlockEpurateur;
                  return (
                    <div style={{padding:"12px 14px",borderRadius:"12px",
                      background:done?"rgba(85,68,204,.12)":ready?"rgba(85,68,204,.08)":"rgba(255,255,255,.03)",
                      border:`1px solid ${done?"rgba(85,68,204,.4)":ready?"rgba(85,68,204,.5)":"rgba(255,255,255,.08)"}`,
                      animation:ready&&!done?"pulse 2s ease infinite":"none",
                    }}>
                      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
                        <span style={{fontSize:"8px",fontWeight:900,color:done?"#a78bfa":"rgba(255,255,255,.35)",background:done?"rgba(85,68,204,.3)":"rgba(255,255,255,.08)",padding:"2px 7px",borderRadius:"10px"}}>ÉTAPE 1</span>
                        <span style={{fontSize:"12px",fontWeight:800,color:done?"#a78bfa":"rgba(255,255,255,.7)"}}>🧪 Épurateur</span>
                        {done && <span style={{fontSize:"10px",marginLeft:"auto"}}>✅</span>}
                      </div>
                      {!done && (
                        <>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
                            <span style={{fontSize:"10px",color:"rgba(255,255,255,.45)"}}>Condition : <strong style={{color:"#a78bfa"}}>{fmt(EPURATEUR_THRESHOLD)}</strong> dans la cuve</span>
                            <span style={{fontSize:"11px",fontWeight:800,color:ready?"#a78bfa":"rgba(255,255,255,.5)"}}>{Math.round(pct)}%</span>
                          </div>
                          <div style={{height:"8px",borderRadius:"4px",background:"rgba(255,255,255,.06)",overflow:"hidden"}}>
                            <div style={{height:"100%",borderRadius:"4px",width:`${pct}%`,background:ready?"linear-gradient(90deg,#5544CC,#a78bfa)":"linear-gradient(90deg,#5544CC55,#5544CC)",transition:"width .5s",boxShadow:ready?"0 0 8px rgba(85,68,204,.5)":"none"}}/>
                          </div>
                          <div style={{fontSize:"9px",color:"rgba(255,255,255,.35)",marginTop:"4px"}}>🎁 Débloque : Biodéchets restauration + Boues de STEP</div>
                          {ready && <button data-tut="epurateur-btn" onClick={handleUnlockEpurateur} style={{width:"100%",marginTop:"8px",padding:"10px",borderRadius:"10px",border:"none",background:"linear-gradient(135deg,#5544CC,#7c3aed)",color:"white",fontSize:"13px",fontWeight:800,cursor:"pointer",boxShadow:"0 4px 16px rgba(85,68,204,.5)",animation:"pulse 1.5s ease infinite"}}>🧪 Débloquer l'Épurateur !</button>}
                        </>
                      )}
                      {done && <div style={{fontSize:"10px",color:"rgba(167,139,250,.6)"}}>Biodéchets restauration + Boues de STEP débloqués</div>}
                    </div>
                  );
                })()}

                {/* ÉTAPE 2 — Compresseur */}
                {(() => {
                  const done = compresseurOk;
                  const blocked = !epurateurOk;
                  const pct = done ? 100 : blocked ? 0 : Math.min(100, buffer/COMPRESSEUR_THRESHOLD*100);
                  const ready = canUnlockCompresseur;
                  return (
                    <div style={{padding:"12px 14px",borderRadius:"12px",
                      background:done?"rgba(204,119,0,.1)":ready?"rgba(204,119,0,.08)":"rgba(255,255,255,.03)",
                      border:`1px solid ${done?"rgba(204,119,0,.4)":ready?"rgba(204,119,0,.5)":"rgba(255,255,255,.08)"}`,
                      opacity:blocked?.45:1,
                      animation:ready&&!done?"pulse 2s ease infinite":"none",
                    }}>
                      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
                        <span style={{fontSize:"8px",fontWeight:900,color:done?"#E8A020":"rgba(255,255,255,.35)",background:done?"rgba(204,119,0,.3)":"rgba(255,255,255,.08)",padding:"2px 7px",borderRadius:"10px"}}>ÉTAPE 2</span>
                        <span style={{fontSize:"12px",fontWeight:800,color:done?"#E8A020":"rgba(255,255,255,.7)"}}>🔩 Compresseur</span>
                        {done && <span style={{fontSize:"10px",marginLeft:"auto"}}>✅</span>}
                      </div>
                      {!done && (
                        <>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"6px"}}>
                            <span style={{fontSize:"9px",padding:"2px 8px",borderRadius:"8px",background:epurateurOk?"rgba(85,68,204,.2)":"rgba(255,68,68,.1)",color:epurateurOk?"#a78bfa":"#E05858",fontWeight:700}}>{epurateurOk?"✅":"❌"} Épurateur</span>
                            <span style={{fontSize:"9px",padding:"2px 8px",borderRadius:"8px",background:buffer>=COMPRESSEUR_THRESHOLD?"rgba(204,119,0,.2)":"rgba(255,255,255,.06)",color:buffer>=COMPRESSEUR_THRESHOLD?"#E8A020":"rgba(255,255,255,.4)",fontWeight:700}}>{buffer>=COMPRESSEUR_THRESHOLD?"✅":"⏳"} {fmt(COMPRESSEUR_THRESHOLD)} dans la cuve</span>
                          </div>
                          {!blocked && (
                            <div style={{height:"8px",borderRadius:"4px",background:"rgba(255,255,255,.06)",overflow:"hidden",marginBottom:"4px"}}>
                              <div style={{height:"100%",borderRadius:"4px",width:`${pct}%`,background:ready?"linear-gradient(90deg,#CC7700,#E8A020)":"linear-gradient(90deg,#CC770055,#CC7700)",transition:"width .5s",boxShadow:ready?"0 0 8px rgba(204,119,0,.5)":"none"}}/>
                            </div>
                          )}
                          <div style={{fontSize:"9px",color:"rgba(255,255,255,.35)"}}>🎁 Débloque : Déchets industriels</div>
                          {ready && <button data-tut="compresseur-btn" onClick={handleUnlockCompresseur} style={{width:"100%",marginTop:"8px",padding:"10px",borderRadius:"10px",border:"none",background:"linear-gradient(135deg,#CC7700,#E8A020)",color:"white",fontSize:"13px",fontWeight:800,cursor:"pointer",boxShadow:"0 4px 16px rgba(204,119,0,.5)",animation:"pulse 1.5s ease infinite"}}>🔩 Débloquer le Compresseur !</button>}
                        </>
                      )}
                      {done && <div style={{fontSize:"10px",color:"rgba(232,160,32,.6)"}}>Déchets industriels débloqués</div>}
                    </div>
                  );
                })()}

                {/* ÉTAPE 3 — Raccordement */}
                {(() => {
                  const blocked = !compresseurOk;
                  const hasIndus = owned[4] >= 1;
                  const pct = blocked ? 0 : Math.min(100, buffer/INJECTION_THRESHOLD*100);
                  const ready = canConnect;
                  return (
                    <div style={{padding:"12px 14px",borderRadius:"12px",
                      background:ready?"rgba(42,125,187,.1)":"rgba(255,255,255,.03)",
                      border:`1px solid ${ready?"rgba(42,125,187,.55)":"rgba(255,255,255,.08)"}`,
                      opacity:blocked?.45:1,
                      animation:ready?"pulse 2s ease infinite":"none",
                    }}>
                      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
                        <span style={{fontSize:"8px",fontWeight:900,color:"rgba(255,255,255,.35)",background:ready?"rgba(42,125,187,.3)":"rgba(255,255,255,.08)",padding:"2px 7px",borderRadius:"10px"}}>ÉTAPE 3</span>
                        <span style={{fontSize:"12px",fontWeight:800,color:ready?"#F5BE50":"rgba(255,255,255,.7)"}}>🏗️ Raccordement GRDF</span>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"6px"}}>
                        <span style={{fontSize:"9px",padding:"2px 8px",borderRadius:"8px",background:epurateurOk?"rgba(85,68,204,.2)":"rgba(255,68,68,.1)",color:epurateurOk?"#a78bfa":"#E05858",fontWeight:700}}>{epurateurOk?"✅":"❌"} Épurateur</span>
                        <span style={{fontSize:"9px",padding:"2px 8px",borderRadius:"8px",background:compresseurOk?"rgba(204,119,0,.2)":"rgba(255,68,68,.1)",color:compresseurOk?"#E8A020":"#E05858",fontWeight:700}}>{compresseurOk?"✅":"❌"} Compresseur</span>
                        <span style={{fontSize:"9px",padding:"2px 8px",borderRadius:"8px",background:hasIndus?"rgba(74,158,219,.2)":"rgba(255,68,68,.1)",color:hasIndus?"#6DB5EC":"#E05858",fontWeight:700}}>{hasIndus?"✅":"❌"} ⚙️ Déchets indus.</span>
                        <span style={{fontSize:"9px",padding:"2px 8px",borderRadius:"8px",background:buffer>=INJECTION_THRESHOLD?"rgba(245,190,80,.2)":"rgba(255,255,255,.06)",color:buffer>=INJECTION_THRESHOLD?"#F5BE50":"rgba(255,255,255,.4)",fontWeight:700}}>{buffer>=INJECTION_THRESHOLD?"✅":"⏳"} {fmt(INJECTION_THRESHOLD)}</span>
                      </div>
                      {!blocked && (
                        <div style={{height:"8px",borderRadius:"4px",background:"rgba(255,255,255,.06)",overflow:"hidden",marginBottom:"4px"}}>
                          <div style={{height:"100%",borderRadius:"4px",width:`${pct}%`,background:ready?"linear-gradient(90deg,#C07800,#E8A020,#F5D888)":"linear-gradient(90deg,#2A7DBB55,#2A7DBB)",transition:"width .5s",boxShadow:ready?"0 0 12px rgba(232,160,32,.5)":"none",animation:ready?"bufferPulse 1s ease infinite":"none"}}/>
                        </div>
                      )}
                      <div style={{fontSize:"9px",color:"rgba(255,255,255,.35)"}}>🎁 Débloque : CIVE + Parc biogaz+ et injection réseau</div>

      {/* ══ TAB RÉCOMPENSES (v25.0.6) ══ */}

        step={activeTuto}
        onNext={() => activeTuto && markTutoSeen(activeTuto.id)}

    </div>

// ─── UNLOCK BUTTON ────────────────────────────────────────────────────────────
function UnlockButton({ label, sublabel, condition, done, animating, locked, reqLabel, onClick, color, highlight }) {
  if (done) return (
    <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",borderRadius:"11px",background:`${color}15`,border:`1px solid ${color}40`}}>
      <div style={{fontSize:"16px"}}>✅</div>
      <div><div style={{fontSize:"12px",fontWeight:700,color}}>{label}</div><div style={{fontSize:"10px",color:"rgba(255,255,255,.45)",marginTop:"1px"}}>{sublabel}</div></div>
    </div>
  );
  const active = condition && !animating;
  return (
    <button onClick={onClick} disabled={!active} style={{width:"100%",padding:"12px 14px",borderRadius:"11px",border:"none",background:animating?`${color}30`:active?`linear-gradient(135deg,${color}cc,${color})`:`rgba(255,255,255,.09)`,border:`1px solid ${active||animating?color+"60":"rgba(255,255,255,.10)"}`,color:active?"white":"rgba(255,255,255,.3)",cursor:active?"pointer":"not-allowed",textAlign:"left",transition:"all .3s",boxShadow:active&&highlight?`0 4px 20px ${color}50`:"none",animation:active&&highlight?"connectGlow 2s ease infinite":"none",opacity:locked?.4:1}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:800,fontSize:"13px"}}>{animating?"⚙️ Mise en service...":active?label:`🔒 ${label}`}</span>
        {reqLabel&&!active&&!animating&&<span style={{fontSize:"10px",color:`${color}80`,background:`${color}15`,padding:"2px 8px",borderRadius:"10px",whiteSpace:"nowrap",marginLeft:"8px"}}>{reqLabel}</span>}
      </div>
      <div style={{fontSize:"10px",color:active?"rgba(255,255,255,.6)":"rgba(255,255,255,.3)",marginTop:"3px"}}>{sublabel}</div>
    </button>
  );
}

// ─── CROSS-BOUNDARY PIPES OVERLAY ────────────────────────────────────────────
// SVG absolu dans le div scène (position:relative, width:300%) — même technique
// que le SVG monde des routes. Gère deux tuyaux qui franchissent les frontières
// entre vues sans être clippés par le overflow:hidden des containers de vue.
//
//  · Biogaz  : collecteur horizontal digesteurs (Vue1) → cuve tampon (Vue0)
//              traverse la frontière Vue0/Vue1 — DigesteurManifold ne gère plus que les branches
//  · GRDF aval : du poste d'injection (Vue0) vers le réseau aval (230 px en Vue1)
//
// Calcul des positions :
//   Vue0 SVG = viewBox 160×350 rendu 1:1 (350 px de haut), ancré à droite dans Vue0.
//   → cx=90 en SVG  ≡  scene x = (vw-160)+90 = vw-70
//   → frontière Vue0/Vue1 = vw
//   Les y SVG sont des coordonnées scène directes (ratio 1:1).
function CrossBoundaryPipesOverlay({ digesteurs, buffer, injected, isDigesting }) {
  const divRef = useRef(null);
  const [vw, setVw] = useState(0);

  useEffect(() => {
    if (!divRef.current) return;
    const measure = () => setVw(divRef.current.offsetWidth / 3);
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(divRef.current);
    return () => ro.disconnect();
  }, []);

  const yOffset = digesteurs===1 ? 28 : digesteurs===2 ? 52 : 80;

  const pipeX    = vw - 70;   // aligne sur cx=90 du SVG Vue0 (right-aligned 160px)

  // Biogaz : digesteurs (Vue1) → cuve tampon (Vue0) — traverse la frontière
  const biogazY    = 3 + yOffset;
  const digesteurZoneScale = digesteurs===1?1:digesteurs===2?0.97:0.93;
  const UNIT_W_D   = digesteurs===1?88:digesteurs===2?74:60;
  const GAP_D      = digesteurs===3?4:8;
  const totalW_D   = digesteurs*UNIT_W_D+(digesteurs-1)*GAP_D;
  const colCenter  = 1.5*vw - 56;  // vw+4 (padding) + (vw-120)/2 : row-reverse bac78+gap6+pipe22+gap6=116
  const xN_off     = (digesteurs-1)*(UNIT_W_D+GAP_D)+UNIT_W_D/2 - totalW_D/2;
  const biogazEndX = colCenter + xN_off*digesteurZoneScale + 4;

  // GRDF aval : connecteur L depuis poste injection → tuyau GRDF du SVG monde
  // SVG monde : GRDF_PIPE_Y=375, rendu height=600px pour viewBox 480px → yScale=1.25
  // V0_V1=400 en SVG monde → scene x=vw ; V0_V1+10 → scene x=410*vw/400
  const grdfWorldY  = Math.round(375 * 600 / 480);  // 469 px (scene y du tuyau GRDF monde)
  const grdfWorldX  = Math.round(410 * vw / 400);   // scene x du début du pipe GRDF monde

  const grdfOn = injected;

  if (vw === 0) return (
    <div ref={divRef} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none"}}/>
  );

  return (
    <div ref={divRef} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none"}}>
      <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",display:"block",overflow:"visible"}}>

        {/* ── BIOGAZ : branches verticales (sortie haute digesteurs → collecteur) ── */}
        {/* Dessinées EN PREMIER pour que le tube horizontal les coiffe proprement */}
        {/* branchBot = biogazY + 32*scale : correspond au top de la rangée de digesteurs en scène */}
        {Array.from({length:digesteurs}, (_,i) => {
          const bx = colCenter + (i*(UNIT_W_D+GAP_D) + UNIT_W_D/2 - totalW_D/2) * digesteurZoneScale;
          const branchBot = biogazY + 32*digesteurZoneScale + 2;
          return (
            <React.Fragment key={i}>
              <rect x={bx-4} y={biogazY} width={8} height={branchBot-biogazY} rx={3}
                fill="#1E3848" stroke="rgba(74,158,219,.42)" strokeWidth="1.5"/>
              <rect x={bx-2} y={biogazY+8} width={4} height={Math.max(0, branchBot-biogazY-8)} rx={2}
                fill={isDigesting ? "rgba(102,238,136,.4)" : "rgba(74,158,219,.15)"}
                style={{animation: isDigesting ? "chargePulse 1.4s ease infinite" : "none"}}/>
            </React.Fragment>
          );
        })}
        {/* Coude vertical : jonction cuve tampon */}
        <rect x={pipeX-4} y={biogazY} width={8} height={14} rx={2}
          fill={isDigesting?"#1E3848":"rgba(74,158,219,.08)"}
          stroke={isDigesting?"rgba(74,158,219,.42)":"rgba(74,158,219,.2)"}
          strokeWidth="1.5"/>
        {/* Tuyau horizontal : cuve tampon ← digesteurs (coiffe les tops de branches) */}
        <rect x={pipeX} y={biogazY} width={biogazEndX-pipeX} height={8} rx={4}
          fill={isDigesting?"#1E3848":"rgba(74,158,219,.08)"}
          stroke={isDigesting?"rgba(74,158,219,.42)":"rgba(74,158,219,.2)"}
          strokeWidth="1.5"/>
        <line x1={biogazEndX} y1={biogazY+4} x2={pipeX} y2={biogazY+4}
          stroke="rgba(102,238,136,.6)" strokeWidth="4"
          strokeDasharray="10 8" strokeLinecap="round"
          style={{animation: isDigesting ? "gasFlow 1s linear infinite" : "none"}}/>
        <text x={vw+10} y={biogazY-4} textAnchor="start" fontSize="8"
          fill={isDigesting?"rgba(102,238,136,.95)":"rgba(74,158,219,.6)"}
          fontWeight="700" letterSpacing=".3">Biogaz ◀ cuve</text>

        {/* ── GRDF AVAL : connecteur L — poste injection ↓ → tuyau GRDF SVG monde ── */}
        {/* Vertical : cx (vw-70), depuis sortie poste injection (y=322+yOffset) jusqu'à GRDF_PIPE_Y scène */}
        <rect x={pipeX-4} y={322+yOffset} width={8} height={grdfWorldY-(322+yOffset)} rx={3}
          fill={grdfOn?"rgba(42,125,187,.5)":"rgba(74,158,219,.08)"}
          stroke={grdfOn?"rgba(74,158,219,.45)":"rgba(74,158,219,.15)"}
          strokeWidth="1"/>
        {/* Horizontal bas : rejoint le début du tuyau GRDF dans le SVG monde (V0_V1+10) */}
        <rect x={pipeX-4} y={grdfWorldY} width={grdfWorldX-(pipeX-4)} height={5} rx={2}
          fill={grdfOn?"rgba(42,125,187,.5)":"rgba(74,158,219,.08)"}
          stroke={grdfOn?"rgba(74,158,219,.45)":"rgba(74,158,219,.15)"}
          strokeWidth="1"/>
        <text x={pipeX+4} y={322+yOffset-3} textAnchor="start" fontSize="5.5" fontWeight="800"
          fill={grdfOn?"#6DB5EC":"rgba(255,255,255,.25)"}>Réseau GRDF aval ↓</text>

      </svg>
    </div>
  );
}
