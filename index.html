// SHA-256 via Web Crypto API (disponible dans tous les navigateurs modernes)
const hashPassword = async (password) => {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
};

const fetchRegionalStats = () => {
  if (!SUPABASE_KEY || SUPABASE_URL.includes("VOTRE_PROJECT_ID")) return Promise.resolve(null);
  return fetch(
    SUPABASE_URL + "/rest/v1/players?select=region,score_network,score_gnv,is_connected",
    { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
  ).then(function(res) { return res.json(); })
  .then(function(rows) {
    var map = {};
    rows.forEach(function(r) {
      if (!map[r.region]) map[r.region] = { region: r.region, sites: 0, volume: 0 };
      if (r.is_connected) map[r.region].sites++;
      // v25.0.5 รขโฌโ volume pondรยฉrรยฉ GNV pour cohรยฉrence avec le score individuel
      map[r.region].volume += computeScore(r.score_network, r.score_gnv);
    });
    // v25.0.5 รขโฌโ tri composite : volume DESC รขโ โ sites raccordรยฉs DESC
    //   Avant : tri uniquement sur volume รขโ โ rรยฉgions รย  0 mรยณ rangรยฉes arbitrairement
    //           (Sud-Est avec 1 site raccordรยฉ pouvait passer aprรยจs Nord-Ouest sans aucun)
    return Object.values(map).sort(function(a, b) {
      if (b.volume !== a.volume) return b.volume - a.volume;
      return b.sites - a.sites;
    });
  }).catch(function() { return null; });
};

// รฐลธโล SUPABASE REALTIME รขโฌโ WebSocket Phoenix + fallback polling
// รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
function useSupabaseRealtime(onPlayerChange, active) {
  const [rtStatus, setRtStatus] = useState("disconnected");
  const onChangeRef = useRef(onPlayerChange);
  const wsRef = useRef(null);
  const refCounter = useRef(1);
  const heartbeatRef = useRef(null);
  const reconnectRef = useRef(null);
  const pollRef = useRef(null);
  const prevSigRef = useRef(null);
  const wsFailedRef = useRef(false);
  useEffect(() => { onChangeRef.current = onPlayerChange; }, [onPlayerChange]);

  // รขโโฌรขโโฌ Polling fallback รขโโฌรขโโฌ
  const startPolling = useCallback(() => {
    if (pollRef.current) return;
    const poll = () => {
      fetch(
        SUPABASE_URL + "/rest/v1/players?select=id,score_network,score_gnv,is_connected&order=updated_at.desc&limit=30",
        { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
      ).then(r => r.json()).then(rows => {
        setRtStatus("connected");
        const sig = JSON.stringify(rows.map(r => r.id + ":" + r.score_network + ":" + r.score_gnv));
        if (prevSigRef.current && sig !== prevSigRef.current && onChangeRef.current) {
          onChangeRef.current(rows);
        }
        prevSigRef.current = sig;
      }).catch(() => { setRtStatus("error"); });
    };
    poll();
    pollRef.current = setInterval(poll, 8000);
  }, []);

  const stopPolling = useCallback(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
  }, []);

  // รขโโฌรขโโฌ WebSocket รขโโฌรขโโฌ
  const connectWs = useCallback(() => {
    if (!SUPABASE_KEY || SUPABASE_URL.includes("VOTRE_PROJECT_ID")) return;
    if (wsRef.current && wsRef.current.readyState < 2) return;

    setRtStatus("connecting");
    const projectRef = SUPABASE_URL.replace("https://","").replace(".supabase.co","");
    const url = `wss://${projectRef}.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`;

    let ws;
    try { ws = new WebSocket(url); } catch { wsFailedRef.current = true; startPolling(); return; }
    wsRef.current = ws;

    const timeout = setTimeout(() => {
      if (ws.readyState !== 1) { ws.close(); wsFailedRef.current = true; startPolling(); }
    }, 5000);

    ws.onopen = () => {
      clearTimeout(timeout);
      stopPolling();
      const joinRef = String(refCounter.current++);
      const msgRef  = String(refCounter.current++);
      ws.send(JSON.stringify({
        topic: "realtime:public:players",
        event: "phx_join",
        payload: {
          config: {
            broadcast: { self: false },
            presence: { key: "" },
            postgres_changes: [{ event: "*", schema: "public", table: "players" }]
          }
        },
        ref: msgRef, join_ref: joinRef
      }));
      heartbeatRef.current = setInterval(() => {
        if (ws.readyState === 1) {
          ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:String(refCounter.current++), join_ref:null }));
        }
      }, 29000);
    };

    ws.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.event === "phx_reply" && msg.payload?.status === "ok" && msg.topic !== "phoenix") {
          setRtStatus("connected");
        }
        if (msg.event === "postgres_changes") {
          const data = msg.payload?.data;
          if (data && onChangeRef.current) onChangeRef.current(data);
        }
      } catch {}
    };

    ws.onerror = () => {
      clearTimeout(timeout);
      wsFailedRef.current = true;
      startPolling();
    };

    ws.onclose = () => {
      if (heartbeatRef.current) clearInterval(heartbeatRef.current);
      if (wsFailedRef.current) {
        startPolling();
      } else {
        setRtStatus("disconnected");
        reconnectRef.current = setTimeout(connectWs, 3000);
      }
    };
  }, [startPolling, stopPolling]);

  // รขโโฌรขโโฌ Lifecycle รขโโฌรขโโฌ
  useEffect(() => {
    if (!active || !SUPABASE_KEY || SUPABASE_URL.includes("VOTRE_PROJECT_ID")) {
      setRtStatus("disconnected");
      return;
    }
    wsFailedRef.current = false;
    connectWs();
    return () => {
      if (heartbeatRef.current) clearInterval(heartbeatRef.current);
      if (reconnectRef.current) clearTimeout(reconnectRef.current);
      stopPolling();
      if (wsRef.current) { wsRef.current.onclose = null; wsRef.current.close(); wsRef.current = null; }
    };
  }, [active, connectWs, stopPolling]);

  return rtStatus;
}

// v25.0.7 รขโฌโ Systรยจme d'รยฉtoiles par intrant (maรยฎtrise opรยฉrationnelle)
//   Chaque intrant peut accumuler 0 รย  5 รยฉtoiles selon le qty achetรยฉ.
//   Chaque palier dรยฉbloque un bonus multiplicatif sur baseFill de cet intrant.
//   Pรยฉdagogie : simule le gain d'efficacitรยฉ opรยฉrationnelle qu'un site obtient
//   en exploitant durablement le mรยชme type d'intrant (procรยฉdรยฉs, รยฉquipes, logistique).
const STAR_THRESHOLDS = [5, 10, 20, 50, 100];                 // qty seuils 1รขหโฆรขโ โ5รขหโฆ
const STAR_BONUSES    = [1.05, 1.10, 1.20, 1.35, 1.50];     // multiplicateurs cumulatifs (PAS additifs)
const getIntrantStars = (qty) => {
  if (qty <= 0) return 0;
  let stars = 0;
  for (let i = 0; i < STAR_THRESHOLDS.length; i++) {
    if (qty >= STAR_THRESHOLDS[i]) stars = i + 1; else break;
  }
  return stars;
};
const getIntrantBonus = (qty) => {
  const stars = getIntrantStars(qty);
  return stars === 0 ? 1 : STAR_BONUSES[stars - 1];
};
const getNextStarThreshold = (qty) => {
  for (let i = 0; i < STAR_THRESHOLDS.length; i++) {
    if (qty < STAR_THRESHOLDS[i]) return STAR_THRESHOLDS[i];
  }
  return null; // 5รขหโฆ atteinte
};

//   = baseFill รโ qty รโ bonus_รยฉtoile (sans bonus GNV รขโฌโ appliquรยฉ globalement par ailleurs)

// v25.0.9 รขโฌโ Helper : yield moyen pondรยฉrรยฉ (mรยณ CHรขโโ/t) รย  partir d'une composition par intrant
//   composition = [t_lisier, t_verts, t_restau, t_step, t_indus, t_cive, t_biogazplus]
//   Retourne 0 si masse totale nulle (rรยฉservoir vide).
const yieldFromComposition = (composition) => {
  if (!Array.isArray(composition)) return 0;
  let totalMass = 0, totalGas = 0;
  for (let i = 0; i < 7; i++) {
    const m = composition[i] || 0;
    if (m > 0) {
      totalMass += m;
      totalGas  += m * UPGRADES[i].realYield;
    }
  }
  return totalMass > 0 ? totalGas / totalMass : 0;
};
// v25.0.9 รขโฌโ Helper : masse totale d'une composition (somme des intrants)
const massFromComposition = (composition) => {
  if (!Array.isArray(composition)) return 0;
  let total = 0;
  for (let i = 0; i < 7; i++) total += composition[i] || 0;
  return total;
};

const RELIABILITY_PROD_FLOOR    = 0.40; // plancher : รขโฐยค40% fiab รขโ โ mult prod = 0.40 (anti-spirale)
const QUALIMETHA_THRESHOLD      = 95;   // seuil bonus fiabilitรยฉ industrielle

// Mapping fiabilitรยฉ รขโ โ multiplicateur sur la production CHรขโโ effective.
// Trois zones : plateau premium (รขโฐยฅ95), linรยฉaire (40-95), plancher (รขโฐยค40).
// Cliff de +0.05 รย  exactement 95% : matรยฉrialise l'entrรยฉe en zone Qualimรยฉtha (rรยฉcompense visible).
const reliabilityMultFor = (r) => {
  if (typeof r !== 'number' || isNaN(r)) return 1;        // fail-safe : pas de pรยฉnalitรยฉ si state invalide
  if (r >= QUALIMETHA_THRESHOLD) {
    // Rampe premium : 95รขโ โ1.00, 100รขโ โ1.10
    const t = (Math.min(100, r) - QUALIMETHA_THRESHOLD) / (100 - QUALIMETHA_THRESHOLD);

};

const MAITRISE_COLORS = ["#8B6F47","#22a86a","#E8A020","#5544CC","#BB6600","#F5BE50","#4A9EDB"];
const DIVERSITY_META = [
  { icon:"รฐลธลยฑ", name:"Premiers pas",        color:"#6DB5EC" },
  { icon:"รฐลธยฦ", name:"Polyvalent",          color:"#22a86a" },
  { icon:"รขยญย", name:"รโฐtoiles รโ5",          color:"#F5BE50" },
  { icon:"รขโขยปรฏยธย", name:"รโฐconomie Circulaire", color:"#4ADB94" },
];
const DIVERSITY_THRESHOLDS = [2, 4, 5, 7];

function computeBadges({ owned, digesteurs, gnvStations, tractorGnv, autoDump }) {
  const diversityCount = owned.filter(q => q > 0).length;

  const progression = [
    { id:"prog-gnv-pioneer", category:"progression", icon:"รขโบยฝ", name:"Pionnier GNV",     desc:"Premier tracteur GNV",           done: !!tractorGnv,       color:"#4ADB94" },
    { id:"prog-megasite",    category:"progression", icon:<MiniDigesterIcon/>, name:"Mรยฉga-site",        desc:"3 digesteurs actifs",            done: digesteurs >= 3,    color:"#6DB5EC" },
    { id:"prog-autodump",    category:"progression", icon:"รฐลธยคโ", name:"Full Automatique", desc:"Dรยฉverseur automatique installรยฉ", done: !!autoDump,         color:"#E8A020" },
    { id:"prog-gnv-network", category:"progression", icon:"รขโบยฝ", name:"Rรยฉseau GNV",       desc:"3 stations GNV opรยฉrationnelles", done: gnvStations >= 3,   color:"#4ADB94" },
  ];

  const diversity = DIVERSITY_THRESHOLDS.map((threshold, idx) => ({
    id: `div-${threshold}`,
    category: "diversite",
    ...DIVERSITY_META[idx],
    desc: `${threshold} types d'intrants diffรยฉrents`,
    done: diversityCount >= threshold,
    pct: Math.min(100, (diversityCount / threshold) * 100),
    detail: `${Math.min(diversityCount, threshold)}/${threshold}`,
  }));

  // v25.0.7 รขโฌโ Maรยฎtrise multi-paliers (5 รยฉtoiles par intrant)
  // Chaque seuil 5/10/20/50/100 gรยฉnรยจre un badge sรยฉparรยฉ, dรยฉbloquable progressivement.
  // Pรยฉdagogie : montre la courbe d'apprentissage opรยฉrationnel sur la durรยฉe.
  const STAR_LABELS = ["Initiation", "Pratique", "Expertise", "Excellence", "Maรยฎtrise totale"];
  const mastery = [];
  UPGRADES.forEach((u, i) => {
    const qty = owned[i] || 0;
    STAR_THRESHOLDS.forEach((threshold, sIdx) => {
      const stars = sIdx + 1;
      const bonusPct = Math.round((STAR_BONUSES[sIdx] - 1) * 100);
      mastery.push({
        id: `mast-${i}-s${stars}`,
        category: "maitrise",
        icon: u.icon,
        name: `${u.name} ${"รขหโฆ".repeat(stars)}`,
        desc: `${threshold} achats รขโฌโ bonus +${bonusPct}% dรยฉbit`,
        done: qty >= threshold,
        color: MAITRISE_COLORS[i] || "#4A9EDB",
        pct: Math.min(100, (qty / threshold) * 100),
        detail: `${Math.min(qty, threshold)}/${threshold} รยท ${STAR_LABELS[sIdx]}`,
        intrantIdx: i,
        starLevel: stars,
      });
    });
  });

  return [...progression, ...diversity, ...mastery];
}

// รขโโฌรขโโฌรขโโฌ OVERLAY DรโฐBLOCAGE รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ

// รขโโฌรขโโฌรขโโฌ GAME รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
function Game({ username, region, maia }) {
  const {mode: themeMode, T} = useTheme();
  const isL = themeMode === 'light';

  const SAVE_KEY = `mt_save_v2_${username}`;
  const loadLocalSave = () => { try { const r=localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):null; } catch{return null;} };
  const saved = loadLocalSave();

  // รขโโฌรขโโฌ CLOUD LOAD : rรยฉconciliation Supabase vs localStorage รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
  // On mount : on charge depuis Supabase. Si plus rรยฉcent รขโ โ on remplace le state.
  const [cloudSynced, setCloudSynced] = useState(false);

  const calcOffline = (sv) => {
    if (!sv?.lastSaved) return null;
    const elapsedSec = Math.min((Date.now() - sv.lastSaved) / 1000, 86400);
    if (elapsedSec < 5) return null;

    const ownedArr   = sv.owned || [0,0,0,0,0,0,0];
    const fr         = ownedArr.reduce((a,q,i) => a + fillFor(i, q), 0);
    if (fr <= 0) return null;

    const stockMaxOff    = ownedArr.reduce((a,q,i) => a + UPGRADES[i].bagCap * q * LOCAL_CAP_MULT, 0);
    const nDig           = sv.digesteurs || 1;
    const burnRateEff    = fr * nDig;

    // รขโโฌรขโโฌ v24 : REMPLISSAGE DES TAMPONS LOCAUX รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
    // Rรยจgle idle-friendly : offline, les tampons se remplissent jusqu'รย  100 %
    // mais NE DรโฐCLENCHENT PAS les pannes. Aucune escalation, aucune pรยฉnalitรยฉ.
    // L'รยฉtat zone est forcรยฉ รย  'ok' au retour pour repartir d'une base propre.
    const savedLocal = Array.isArray(sv.localStock) && sv.localStock.length === 7
                       ? sv.localStock : [0,0,0,0,0,0,0];
    const newLocal   = [...savedLocal];
    const newZoneState     = ['ok','ok','ok','ok','ok','ok','ok'];
    const newSatSince      = [null,null,null,null,null,null,null];
    const newOfflineUntil  = [null,null,null,null,null,null,null];
    let totalLocalStockGained = 0;
    for (let i = 0; i < 7; i++) {
      if (ownedArr[i] === 0) { newLocal[i] = 0; continue; }
      const cap   = UPGRADES[i].bagCap * ownedArr[i] * LOCAL_CAP_MULT;
      const baseI = fillFor(i, ownedArr[i]);
      const wasOffline = (Array.isArray(sv.zoneState) && sv.zoneState[i] === 'offline');
      // Si la zone รยฉtait offline ET que le timer n'est pas รยฉcoulรยฉ, on garde la panne
      const offUntil = Array.isArray(sv.offlineUntil) ? sv.offlineUntil[i] : null;
      if (wasOffline && offUntil && Date.now() < offUntil) {
        newZoneState[i]    = 'offline';
        newOfflineUntil[i] = offUntil;
        newLocal[i]        = 0; // zone arrรยชtรยฉe
        continue;
      }
      // Sinon remplissage standard, plafonnรยฉ รย  100 %
      const target = Math.min(cap, savedLocal[i] + baseI * elapsedSec);
      const gain   = Math.max(0, target - savedLocal[i]);
      newLocal[i]  = target;
      totalLocalStockGained += gain;
    }

    // รขโโฌรขโโฌ v24 : STOCK GLOBAL VIA "TRACTEURS IDรโฐAUX" รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
    // Hypothรยจse simplificatrice : pendant l'absence, les tracteurs vidaient
    // les tampons en continu. Au retour, le stock global a donc absorbรยฉ tout
    // ce qui aurait รยฉtรยฉ produit (clamp stockMax). รโกa respecte la promesse idle :
    // "rentrer = trouver le stock plein, prรยชt รย  digรยฉrer".
    const savedStock     = sv.stock || 0;
    // Production thรยฉorique pendant l'absence = somme des baseFill รโ dt, plafonnรยฉe
    // par la capacitรยฉ globale (stockMax) ET par ce qui se trouvait dรยฉjรย  dans les
    // tampons locaux (on ne crรยฉe pas de matiรยจre รย  partir de rien).
    const idealProduction = fr * elapsedSec;
    const totalAvailable  = idealProduction + savedLocal.reduce((a,v,i) => a + (ownedArr[i]>0?v:0), 0);
    const stockGained     = Math.max(0, Math.min(stockMaxOff - savedStock, idealProduction));
    const stockAfterFill  = savedStock + stockGained;

    // รขโโฌรขโโฌ v25.0 : YIELD MIX รขโฌโ mรยณ CHรขโโ/t moyen pondรยฉrรยฉ รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
    // Apports gisement pendant offline : yield = moyenne pondรยฉrรยฉe par baseFillรโqtyรโbonus
    // v25.0.7 รขโฌโ pondรยฉration via fillFor pour cohรยฉrence avec les bonus รยฉtoile
    const newFlowYield = fr > 0
      ? ownedArr.reduce((a,q,i) => a + fillFor(i, q) * UPGRADES[i].realYield, 0) / fr
      : 0;
    // Migration : si save < v25 (pas de yield persistรยฉs) et stock/charge prรยฉsents
    //             รขโ โ seed avec newFlowYield (best-effort, รยฉvite produced=0)
    const savedStockYield  = (sv.stockYield  != null) ? sv.stockYield  : ((sv.stock  > 0) ? newFlowYield : 0);
    const savedChargeYield = (sv.chargeYield != null) ? sv.chargeYield : ((sv.charge > 0) ? newFlowYield : 0);
    // Stock aprรยจs remplissage = mix savedStock + stockGained (chacun avec leur yield)
    const stockMixYield = stockAfterFill > 0
      ? (savedStock * savedStockYield + stockGained * newFlowYield) / stockAfterFill
      : 0;

    // รขโโฌรขโโฌ Digesteur : matiรยจre brรยปlable (logique prรยฉservรยฉe) รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
    let savedCharge = sv.charge || 0;
    let availableToDigest, stockConsumed = 0;

    if (sv.autoDump && stockAfterFill > 0) {
      const maxBurnable = Math.min(burnRateEff * elapsedSec, savedCharge + stockAfterFill);
      availableToDigest = maxBurnable;
      const fromCharge  = Math.min(savedCharge, maxBurnable);
      stockConsumed     = Math.max(0, maxBurnable - fromCharge);
    } else {
      availableToDigest = Math.min(savedCharge, burnRateEff * elapsedSec);
    }

    // Production = part de charge (yield charge) + part de stock (yield mix)
    const fromCharge = Math.min(savedCharge, availableToDigest);
    // v25.6 รขโฌโ la fiabilitรยฉ sauvegardรยฉe module le yield d'extraction CHรขโโ pendant l'offline
    //         (cohรยฉrent avec le tick temps rรยฉel : mรยชmes intrants, qualitรยฉ d'extraction variable)
    const offlineRelMult = reliabilityMultFor(typeof sv.reliability === 'number' ? sv.reliability : 100);
    const produced = (fromCharge * savedChargeYield + stockConsumed * stockMixYield) * offlineRelMult;
    if (produced < 0.01 && stockGained < 1 && totalLocalStockGained < 1) return null;

    // รขโโฌรขโโฌ Gains par filiรยจre รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
    const inj        = sv.injected || false;
    const gnvSplit   = sv.gnvSplit || 20;
    const gnvStations= sv.gnvStations || 0;
    let bmGained = 0, gnvBmGained = 0, eurosGained = 0;

    if (inj) {
      if (gnvStations > 0 && gnvSplit > 0) {
        const toGnv  = produced * (gnvSplit / 100);
        bmGained     = produced - toGnv;
        gnvBmGained  = toGnv;
      } else {
        bmGained = produced;
      }
      eurosGained = produced * BM_TO_EUR;
    }

    // รขโโฌรขโโฌ รโฐtats rรยฉsiduels (pour corriger le state au retour) รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
    const remainingCharge = Math.max(0, savedCharge - Math.min(savedCharge, availableToDigest));
    const remainingStock  = Math.max(0, stockAfterFill - stockConsumed);
    // v25.0 รขโฌโ yields rรยฉsiduels :
    //  รยท charge restante conserve son yield d'origine (on n'a fait que retirer)
    //  รยท stock restant conserve le yield mix (mรยฉlange savedStock + apports gisement)
    const remainingChargeYield = remainingCharge > 0 ? savedChargeYield : 0;
    const remainingStockYield  = remainingStock  > 0 ? stockMixYield    : 0;

  // v25.2.3 รขโฌโ gate sur cloudSynced : on ne snapshot la rรยฉfรยฉrence qu'APRรหS

  useEffect(() => {

  const chargeRef       = useRef(charge);
  const chargeMaxEffRef = useRef(0);
  const fillRateRef     = useRef(0);
  const stockMaxRef     = useRef(0);
  const burnRateEffRef  = useRef(0);

  const stockRef         = useRef(stock);
  const stockYieldRef    = useRef(stockYield);

  useEffect(() => { chargeYieldRef.current = chargeYield; }, [chargeYield]);
  // v25.6 รขโฌโ ref miroir fiabilitรยฉ (lu dans tick digestion + applyCatchUp pour
  //         calculer le multiplicateur sans dรยฉpendance React qui recrรยฉerait l'interval)
  const reliabilityRef = useRef(100);

  // v25.0.8 รขโฌโ ref miroir seuil auto-dump (lu dans tick 2s sans recrรยฉer l'interval)
  const autoDumpThresholdRef = useRef(autoDumpThreshold);

  // v25.0.9 รขโฌโ refs miroirs composition (lus en tick auto-dump, tracteur, etc.)

  // รขโโฌรขโโฌ CATCH-UP : appliquรยฉ au retour d'arriรยจre-plan รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
  // v24 : on n'utilise PLUS fillRate รขโ โ stock direct. รโฌ la place :
  //   1) On remplit les tampons locaux jusqu'รย  100 % (pas d'escalation offline)
  //   2) On dรยฉverse au stock global ce qui aurait รยฉtรยฉ produit (logique tracteur idรยฉal)
  //   3) On reset zoneState aux zones non offline รขโ โ 'ok'
  //   4) Digestion classique (inchangรยฉe)
  // Refs miroirs v24 (dรยฉclarรยฉes AVANT applyCatchUp pour respecter l'ordre lexical)
  const ownedRefV24        = useRef(owned);           useEffect(()=>{ownedRefV24.current=owned;},[owned]);
  const localStockRef      = useRef(localStock);      useEffect(()=>{localStockRef.current=localStock;},[localStock]);
  const zoneStateRef       = useRef(zoneState);       useEffect(()=>{zoneStateRef.current=zoneState;},[zoneState]);
  const satSinceRef        = useRef(saturatedSince);  useEffect(()=>{satSinceRef.current=saturatedSince;},[saturatedSince]);
  const offlineUntilRef    = useRef(offlineUntil);    useEffect(()=>{offlineUntilRef.current=offlineUntil;},[offlineUntil]);
  // Les refs gnvBonusRefV24 / injectedRefV24 sont dรยฉclarรยฉes APRรหS gnvBonus/injected (plus bas) pour รยฉviter le TDZ.
  const gnvBonusRefV24     = useRef(1);
  const injectedRefV24     = useRef(false);

  const applyCatchUp = useCallback(() => {
    const fr  = fillRateRef.current;
    const sm  = stockMaxRef.current;
    const bre = burnRateEffRef.current;
    const cme = chargeMaxEffRef.current;
    const st  = stateRef.current;
    const now = Date.now();

    // 1+2) Tampons locaux + stock global (mรยชme delta : dernier tick effectif)
    if (fr > 0) {
      const dtStock = Math.min((now - stockTickRef.current) / 1000, 86400);
      if (dtStock >= 1) {
        stockTickRef.current = now;
        const ownedNow = ownedRefV24.current;
        const locNow   = localStockRef.current;
        const stNow    = zoneStateRef.current;
        const offNow   = offlineUntilRef.current;

        // Remplir tampons (sans escalation)
        const newLocal = [...locNow];
        const newZone  = [...stNow];
        const newOff   = [...offNow];
        const newSat   = [...satSinceRef.current];
        let zoneChanged = false;
        for (let i = 0; i < 7; i++) {
          if (ownedNow[i] === 0) { newLocal[i] = 0; continue; }
          // Une zone offline reste offline tant que le timer n'est pas รยฉcoulรยฉ
          if (newZone[i] === 'offline') {
            if (newOff[i] && now >= newOff[i]) {
              newZone[i] = 'ok'; newOff[i] = null; newSat[i] = null;
              zoneChanged = true;
            }
            continue;
          }
          // Reset toute zone saturรยฉe vers 'ok' (politique idle-friendly)
          if (newZone[i] === 'saturated' || newZone[i] === 'warn') {
            newZone[i] = 'ok'; newSat[i] = null;
            zoneChanged = true;
          }
          const cap = UPGRADES[i].bagCap * ownedNow[i] * LOCAL_CAP_MULT;
          const baseI = fillFor(i, ownedNow[i]);
          newLocal[i] = Math.min(cap, newLocal[i] + baseI * dtStock);
        }
        setLocalStock(newLocal);
        if (zoneChanged) {
          setZoneState(newZone);
          setOfflineUntil(newOff);
          setSaturatedSince(newSat);
        }

        // Stock global : production idรยฉale clampรยฉe au stockMax
        // v25.0 รขโฌโ yield mix : le flux entrant (= "tracteur idรยฉal" qui aurait roulรยฉ)
        // a un yield moyen pondรยฉrรยฉ par baseFillรโqtyรโbonus. On l'intรยจgre au stockYield.
        if (sm > 0) {
          const flowYield = fr > 0
            ? ownedNow.reduce((a,q,i) => a + fillFor(i, q) * UPGRADES[i].realYield, 0) / fr
            : 0;
          setStock(s => {
            if (s >= sm) return sm;
            const idealProd = fr * dtStock;
            const accepted  = Math.min(sm - s, idealProd);
            if (accepted > 0) {
              const sYield = stockYieldRef.current || 0;
              const newS = s + accepted;
              setStockYield((newS > 0) ? (s * sYield + accepted * flowYield) / newS : 0);
            }
            return s + accepted;
          });
        }
      }
    }

    // Digestion + production : delta depuis le dernier tick effectif
    if (bre > 0) {
      const dtCharge = Math.min((now - chargeTickRef.current) / 1000, 86400);
      if (dtCharge >= 1) {
        chargeTickRef.current = now;
        setCharge(f => {
          if (f <= 0.001) return 0;
          const pct    = cme > 0 ? f / cme : 1;
          const burn   = bre * dtCharge * pct;
          const actual = Math.min(f, burn);
          // v25.0 รขโฌโ production = masse digรยฉrรยฉe รโ yield moyen pondรยฉrรยฉ du digesteur
          // v25.6 รขโฌโ modulรยฉ par la fiabilitรยฉ industrielle (qualitรยฉ d'extraction CHรขโโ)
          const relMult  = reliabilityMultFor(reliabilityRef.current ?? 100);
          const produced = actual * (chargeYieldRef.current || 0) * relMult;
          if (produced > 0) {
            if (st.injected) {
              const euroGain = produced * BM_TO_EUR;
              if (st.gnvStations > 0 && st.gnvSplit > 0) {
                const toGnv = produced * (st.gnvSplit / 100);
                setBm(b => b + (produced - toGnv));
                setGnvBm(b => b + toGnv);
              } else {
                setBm(b => b + produced);
              }
              setEuros(e => e + euroGain);
            } else {
              setBuffer(b => Math.min(INJECTION_THRESHOLD, b + produced));
            }
          }
          return f - actual;
        });
      }
    }
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // รขโโฌรขโโฌ Dรยฉrivรยฉs รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
  // v25.7 รขโฌโ bonus +15 % de remplissage par tracteur converti GNV (max รโ3 = +45 %)
  // On ne compte que les tracteurs rรยฉellement possรยฉdรยฉs (slice par tractorCount)
  const gnvConvertedCount = tractorGnvArr.slice(0, tractorCount).filter(Boolean).length;
  const gnvBonus      = 1 + 0.15 * gnvConvertedCount;
  gnvBonusRefV24.current = gnvBonus;       // sync immรยฉdiat รขโฌโ pas de TDZ
  injectedRefV24.current = injected;       // sync immรยฉdiat รขโฌโ pas de TDZ
  const fillRate      = owned.reduce((a,q,i) => a+fillFor(i, q), 0) * gnvBonus;
  const burnRate      = fillRate;
  // chargeMaxEff dynamique : cible ~90s de digestion รย  tout niveau d'intrant

  const TARGET_DRAIN_SEC  = 90;

  chargeMaxEffRef.current = chargeMaxEff;                       // sync immรยฉdiat รขโฌโ pas de TDZ

  //   Maintenant : sum(bagCap รโ qty รโ LOCAL_CAP_MULT) รขโ โ cohรยฉrent avec localCap total
  const stockMax    = owned.reduce((a,q,i) => a+UPGRADES[i].bagCap*q*LOCAL_CAP_MULT, 0);
  fillRateRef.current    = fillRate;     // sync pour catch-up
  stockMaxRef.current    = stockMax;     // sync pour catch-up
  burnRateEffRef.current = burnRateEff;  // sync pour catch-up
  const stockPct    = stockMax > 0 ? stock/stockMax : 0;
  const fillPenalty = stockPct>=1?0:stockPct>=.8?.4:1;
  const isDigesting = charge > 0.001;  // seuil : รยฉvite la queue asymptotique
  const chargePct     = charge/chargeMaxEff;
  const bufferPct   = Math.min(1, buffer/INJECTION_THRESHOLD);

  const canUnlockEpurateur   = !epurateurOk  && buffer>=EPURATEUR_THRESHOLD;
  const canUnlockCompresseur = !compresseurOk && epurateurOk && buffer>=COMPRESSEUR_THRESHOLD;
  const canConnect           = !injected && compresseurOk && epurateurOk && buffer>=INJECTION_THRESHOLD && owned[4]>=1;

  const stockColor = stockPct>=1?"#E05858":stockPct>=.8?"#E07820":stockPct>=.5?"#eab308":"#4A9EDB";
  const isUpgradeAvailable = i => {
    const u=UPGRADES[i];
    if (u.unlocksAt===null)          return true;
    if (u.unlocksAt==="epurateur")   return epurateurOk;
    if (u.unlocksAt==="compresseur") return compresseurOk;
    if (u.unlocksAt==="injected")    return injected;
    return false;
  };
  const totalScore      = computeScore(bm, gnvBm);   // v25.0.5 รขโฌโ pondรยฉrรยฉ GNV
  const wallet          = injected ? euros : buffer;
  const walletLabel     = injected ? "รขโยฌ" : "mรยณ";
  const fmtWallet       = injected ? fmtEuro : fmt;
  const canBuySomething = UPGRADES.some((u,i)=>wallet>=getCost(u,owned[i])&&isUpgradeAvailable(i));

  // bmPerSecond reflรยจte le taux RรโฐEL au niveau de charge actuel
  // v25.0 : production = burn รโ chargeYield (mรยณ CHรขโโ par tonne digรยฉrรยฉe, mix pondรยฉrรยฉ)
  //         Si digesteur vide, pas de production. Si yield=0 (init), idem.
  // v25.6 : production effective รโ multiplicateur fiabilitรยฉ (qualitรยฉ extraction CHรขโโ)
  const reliabilityMult = reliabilityMultFor(reliability);
  const bmPerSecond = isDigesting ? chargePct * burnRateEff * (chargeYield || 0) * reliabilityMult : 0;
  const bmPerHour   = bmPerSecond*3600;

  const fmtETA = (current, target, perHour) => {
    if (perHour<=0) return "รขหลพ";
    const hours = (target-current)/perHour;
    if (hours<1/60) return "< 1 min";
    if (hours<1)    return `${Math.ceil(hours*60)} min`;
    if (hours<24)   return `${hours.toFixed(1).replace(".",",")}h`;
    return `${Math.floor(hours/24)}j ${Math.round(hours%24)}h`;
  };

  // type: 'success' | 'info' | 'warning'
  const showNotif = (msg, type='info', subtitle=null) => {
    setNotif({ msg, type, subtitle });
    setTimeout(() => setNotif(null), type==='success' ? 5000 : 4000);
  };
  const showCinematic = (key, data={}) => setCinematic({ key, data });

  // รขโโฌรขโโฌ TICKS (timestamp-based for sleep/background catch-up) รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
  //
  // v24 : GISEMENTS LOCAUX รขโฌโ machine รย  รยฉtats + remplissage par zone.
  // Le stock GLOBAL n'est plus alimentรยฉ par fillRate direct : ce sont les
  // tracteurs qui transfรยจrent localStock[i] รขโ โ stock lors de leur dumping
  // (cf. TractorWorld). La boucle ci-dessous fait 3 choses :
  //   1) Remplit les tampons locaux (baseFill รโ qty รโ dt) รขโ โ clamp localCap
  //   2) Gรยจre les transitions d'รยฉtat ok รขโ โ warn รขโ โ saturated รขโ โ offline
  //   3) Dรยฉclenche pannes (pรยฉnalitรยฉ รขโยฌ, reliability--, notif)
  //
  // Les refs miroirs (ownedRefV24, localStockRef, etc.) sont dรยฉclarรยฉes plus haut,
  // avant applyCatchUp, pour respecter l'ordre lexical.

  // รขโโฌรขโโฌ TICK gisements (50ms) รขโโฌรขโโฌ
  useEffect(()=>{
    stockTickRef.current = Date.now();
    const id=setInterval(()=>{
      const now = Date.now();
      const dt = Math.min((now - stockTickRef.current) / 1000, 2);
      stockTickRef.current = now;

      const ownedNow   = ownedRefV24.current;
      const locNow     = localStockRef.current;
      const stNow      = zoneStateRef.current;
      const satSinceNow= satSinceRef.current;
      const offNow     = offlineUntilRef.current;
      const gnvBonusNow= gnvBonusRefV24.current;

      // 1) Remplissage des tampons locaux รขโฌโ v25.0.7 : fillFor inclut le bonus รยฉtoile par intrant
      const newLocal = [...locNow];
      for (let i = 0; i < 7; i++) {
        if (ownedNow[i] === 0) { newLocal[i] = 0; continue; }
        const st = stNow[i];
        if (st === 'offline' || st === 'saturated') continue;
        const localCap = UPGRADES[i].bagCap * ownedNow[i] * LOCAL_CAP_MULT;
        const baseFill = fillFor(i, ownedNow[i]) * gnvBonusNow;
        newLocal[i] = Math.min(localCap, newLocal[i] + baseFill * dt);
      }

      // 2) Machine รย  รยฉtats
      let newZoneState   = stNow;
      let newSatSince    = satSinceNow;
      let newOfflineUntil= offNow;
      let stateChanged   = false;
      const ensureCopy = () => {
        if (!stateChanged) {
          newZoneState    = [...stNow];
          newSatSince     = [...satSinceNow];
          newOfflineUntil = [...offNow];
          stateChanged = true;
        }
      };
      const panneTriggered = [];

      for (let i = 0; i < 7; i++) {
        const cur = stNow[i];

        if (ownedNow[i] === 0) {
          if (cur !== 'ok' || satSinceNow[i] !== null || offNow[i] !== null) {
            ensureCopy();
            newZoneState[i]    = 'ok';
            newSatSince[i]     = null;
            newOfflineUntil[i] = null;
          }
          continue;
        }

        const localCap  = UPGRADES[i].bagCap * ownedNow[i] * LOCAL_CAP_MULT;
        const fillRatio = localCap > 0 ? newLocal[i] / localCap : 0;

        // Zone offline : vรยฉrifier expiration de la panne
        if (cur === 'offline') {
          if (offNow[i] && now >= offNow[i]) {
            ensureCopy();
            newZoneState[i]    = 'ok';
            newSatSince[i]     = null;
            newOfflineUntil[i] = null;
          }
          continue;
        }

        // Zone saturรยฉe
        if (fillRatio >= 1) {
          if (cur !== 'saturated') {
            ensureCopy();
            newZoneState[i] = 'saturated';
            newSatSince[i]  = now;
          } else {
            const sTs = satSinceNow[i] || now;
            if (now - sTs >= SAT_PANNE_MS) {
              ensureCopy();
              newZoneState[i]    = 'offline';
              newSatSince[i]     = null;
              newOfflineUntil[i] = now + PANNE_DURATION_MS;
              newLocal[i]        = 0;
              panneTriggered.push(i);
            }
          }
          continue;
        }

        // Zone en warn (รขโฐยฅ 80 %)
        if (fillRatio >= WARN_THRESHOLD) {
          if (cur !== 'warn') {
            ensureCopy();
            newZoneState[i] = 'warn';
            newSatSince[i]  = null;
          }
          continue;
        }

        // Zone OK
        if (cur !== 'ok') {
          ensureCopy();
          newZoneState[i] = 'ok';
          newSatSince[i]  = null;
        }
      }

      // 3) Application
      setLocalStock(newLocal);
      if (stateChanged) {
        setZoneState(newZoneState);
        setSaturatedSince(newSatSince);
        setOfflineUntil(newOfflineUntil);
      }

      // 4) Traitement des pannes dรยฉclenchรยฉes : pรยฉnalitรยฉ + notif + fiabilitรยฉ
      if (panneTriggered.length > 0) {
        panneTriggered.forEach(i => {
          const cost = getRelaunchCost(i, ownedNow[i]);
          if (injectedRefV24.current) {
            setEuros(e => Math.max(0, e - cost));
          } else {
            setBuffer(b => Math.max(0, b - cost));
          }
          setReliability(r => Math.max(0, r - RELIABILITY_DROP_ON_PANNE));
          const u = UPGRADES[i];
          const costStr = injectedRefV24.current ? fmtEuro(cost) : fmt(cost);
          showNotif(
            `รขลกย  PANNE : ${u.name}`,
            'warning',
            `Gisement saturรยฉ trop longtemps รขโฌโ ${costStr} de frais d'urgence. Relance manuelle requise.`
          );
        });
      }

      // 5) Fiabilitรยฉ en continu
      const hasSatNow = (stateChanged ? newZoneState : stNow).some(s => s === 'saturated');
      if (hasSatNow) {
        setReliability(r => Math.max(0, r - RELIABILITY_DROP_PER_SEC_SAT * dt));
      } else {
        setReliability(r => Math.min(100, r + RELIABILITY_RECOVER_PER_SEC * dt));
      }
    },50);
    return ()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    if (burnRateEff<=0) return;
    chargeTickRef.current = Date.now();
    const id=setInterval(()=>{
      const now = Date.now();
      const dt = Math.min((now - chargeTickRef.current) / 1000, 2);
      chargeTickRef.current = now;
      setCharge(f=>{
        if (f<=0.001) {
          // v25.0 รขโฌโ purge : digesteur vide รขโ โ reset yield (rien รย  propager)
          if (chargeYieldRef.current !== 0) setChargeYield(0);
          // v25.0.9 รขโฌโ purge composition aussi
          setChargeComposition([0,0,0,0,0,0,0]);
          return 0;
        }
        const cme    = chargeMaxEffRef.current;
        const pct    = cme > 0 ? f / cme : 1;              // fraction de charge actuelle
        const burn   = burnRateEff * dt * pct;              // dรยฉbit รขหย niveau du digesteur
        const actual = Math.min(f, burn);
        // v25.0 รขโฌโ production = masse รโ yield moyen pondรยฉrรยฉ du digesteur
        // Le yield reste invariant pendant la digestion (consommation proportionnelle)
        // v25.6 รขโฌโ modulรยฉ par la fiabilitรยฉ industrielle (qualitรยฉ d'extraction CHรขโโ)
        const relMult  = reliabilityMultFor(reliabilityRef.current ?? 100);
        const produced = actual * (chargeYieldRef.current || 0) * relMult;
        // v25.0.9 รขโฌโ dรยฉcrรยฉment composition proportionnel รย  la consommation
        if (actual > 0 && f > 0) {
          const ratio = actual / f;
          setChargeComposition(prev => prev.map(m => Math.max(0, (m || 0) * (1 - ratio))));
        }
        if (produced > 0) {
          if (injected) {
            const euroGain = produced * BM_TO_EUR;
            if (gnvStations>0 && gnvSplit>0) {
              const toGnv = produced*(gnvSplit/100);
              setBm(b=>b+(produced-toGnv));
              setGnvBm(b=>b+toGnv);
            } else {
              setBm(b=>b+produced);
            }
            setEuros(e=>e+euroGain);
          } else {
            setBuffer(b=>Math.min(INJECTION_THRESHOLD,b+produced));
          }
        }
        return f-actual;
      });
    },50);
    return ()=>clearInterval(id);
  },[burnRateEff,injected,gnvStations,gnvSplit]);

  // รขโโฌรขโโฌ AUTO-DUMP รขโฌโ dรยฉverseur automatique รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
  // v25.0.8 รขโฌโ seuil de dรยฉclenchement : ne dรยฉverse que si stock รขโฐยฅ X% de stockMax.
  //   Permet au joueur d'accumuler dans le BAC avant dรยฉversement automatique.
  //   Cas d'usage : รยฉviter saturation digesteur, gameplay anti-AFK plus tactique.
  useEffect(()=>{
    if (!autoDump) return;
    const id=setInterval(()=>{
      setStock(s=>{
        if (s<1) return s;
        // v25.0.8 รขโฌโ Vรยฉrification du seuil de dรยฉclenchement
        const sm = stockMaxRef.current;
        const threshold = autoDumpThresholdRef.current || 0;
        if (sm > 0 && (s / sm) * 100 < threshold) return s;  // seuil pas atteint รขโ โ on attend
        const cme   = chargeMaxEffRef.current;
        const cNow  = chargeRef.current;
        const space = cme - cNow;
        if (space <= 0) return s;                     // digesteur plein รขโ โ stock prรยฉservรยฉ
        const poured = Math.min(s, space);
        // v25.0 รขโฌโ propagation yield : stock รขโ โ charge (moyenne pondรยฉrรยฉe)
        const sYield = stockYieldRef.current || 0;
        const cYield = chargeYieldRef.current || 0;
        const newCharge = cNow + poured;
        const newChargeYield = newCharge > 0
          ? (cNow * cYield + poured * sYield) / newCharge
          : 0;
        setChargeYield(newChargeYield);
        setCharge(f => Math.min(cme, f + poured));
        // v25.0.9 รขโฌโ propagation composition proportionnelle stock รขโ โ charge
        // On retire `poured/s` de chaque intrant du BAC et on l'ajoute au digesteur
        const sComp = stockCompRef.current || [0,0,0,0,0,0,0];
        const ratio = s > 0 ? poured / s : 0;
        if (ratio > 0) {
          const transfer = sComp.map(m => (m || 0) * ratio);
          setStockComposition(prev => prev.map((m, i) => Math.max(0, (m || 0) - transfer[i])));
          setChargeComposition(prev => prev.map((m, i) => (m || 0) + transfer[i]));
        }
        // Si le BAC se vide, reset stockYield + composition
        if (s - poured < 0.001) {
          if (sYield !== 0) setStockYield(0);
          setStockComposition([0,0,0,0,0,0,0]);
        }
        return s - poured;                            // surplus conservรยฉ dans le bac
      });
    }, 2000); // toutes les 2s
    return ()=>clearInterval(id);
  },[autoDump]);

  useEffect(()=>{
    const rate=isDigesting?Math.max(150,900-chargePct*700):1200;
    const id=setInterval(()=>{
      const b={id:uid++,x:15+Math.random()*70,dur:.9+Math.random()*1.4,size:5+Math.random()*9};
      setBubbles(p=>[...p.slice(-18),b]);
      setTimeout(()=>setBubbles(p=>p.filter(x=>x.id!==b.id)),(b.dur+.2)*1000);
    },rate);
    return ()=>clearInterval(id);
  },[isDigesting,chargePct]);

  // รขโโฌรขโโฌ REWARD DETECTION รขโฌโ cinรยฉmatiques rรยฉcompenses รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
  const REWARD_DEFS = [
    { id:"go_mwh",   label:"PREMIรหRE GARANTIE D'ORIGINE",  check: () => injected && totalScore >= 100 },
    { id:"cpb",      label:"CERTIFICAT DE PRODUCTION",     check: () => injected && totalScore >= 10000 },
    { id:"quali",    label:"LABEL QUALIMรโฐTHA",             check: () => injected && digesteurs >= 2 },
    { id:"foyers100",label:"100 FOYERS ALIMENTรโฐS",          check: () => totalScore >= 1000000 },
    { id:"foyers1k", label:"1 000 FOYERS ALIMENTรโฐS",        check: () => totalScore >= 10000000 },
    { id:"vert",     label:"TERRITOIRE VERT",               check: () => totalScore >= 100000000 },
  ];
  useEffect(() => {
    if (!injected || !cloudSynced) return;
    for (const r of REWARD_DEFS) {
      if (seenRewards.includes(r.id)) continue;
      if (!r.check()) continue;
      // Nouveau reward dรยฉbloquรยฉ รขโฌโ cinรยฉmatique + persist
      setSeenRewards(prev => {
        if (prev.includes(r.id)) return prev;
        const next = [...prev, r.id];
        return next;
      });
      // Dรยฉlai lรยฉger pour une transition fluide
      setTimeout(() => showCinematic(r.id, {}), 400);
      break; // un seul รย  la fois
    }
  }, [injected, totalScore, digesteurs, cloudSynced, seenRewards]); // eslint-disable-line react-hooks/exhaustive-deps

  // Mise รย  jour position locale dans le lb sans fetch rรยฉseau
  // bufferQ : quantifiรยฉ pour รยฉviter 20 re-renders/s prรยฉ-raccordement
  const bufferQ = Math.floor(buffer);
  useEffect(() => {
    setLb(prev => {
      const without = prev.filter(e => e.name !== username);
      // v25.0.5 รขโฌโ tri composite : score รขโ โ euros รขโ โ chainLevel
      const me = {
        name: username, region,
        score: totalScore, scoreNet: bm, scoreGnv: gnvBm,
        connected: injected, buffer: bufferQ,
        epurateur: epurateurOk, compresseur: compresseurOk,
        digesteurs, euros,
        chainLevel: computeChainLevel(epurateurOk, compresseurOk, injected),
        isMe: true,
      };
      return [...without, me]
        .sort((a, b) => {
          if (b.score      !== a.score)      return b.score      - a.score;
          if ((b.euros||0) !== (a.euros||0)) return (b.euros||0) - (a.euros||0);
          return (b.chainLevel||0) - (a.chainLevel||0);
        })
        .slice(0, 15);
    });
  }, [totalScore, bufferQ, injected, epurateurOk, compresseurOk, digesteurs, euros, username, region]);

  // รขโโฌรขโโฌ DรโฐVERSER รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
  const handlePour = useCallback(()=>{
    if (pouring || stock < 1) return;
    const cme   = chargeMaxEffRef.current;
    const cNow  = chargeRef.current;
    const space = cme - cNow;
    if (space <= 0) return;                   // digesteur dรยฉjรย  plein
    const dumped = Math.min(stock, space);    // on ne verse que ce qui rentre

    // รขโโฌรขโโฌ v24.2 FIX : vidage immรยฉdiat (logique mรยฉtier dรยฉcouplรยฉe de l'animation) รขโโฌรขโโฌ
    // Avant : setStock/setCharge รย  T+1100ms (fin d'anim) รขโ โ race condition avec
    //         les dumps de tracteur pendant l'anim. Le `s` lu รยฉtait dรยฉjรย  rรยฉ-augmentรยฉ
    //         par le tracteur, donnant l'impression que le vidage n'avait pas eu lieu.
    // Maintenant : transfert stockรขโ โcharge instantanรยฉ, animation purement cosmรยฉtique.
    // v25.0 รขโฌโ propagation yield BACรขโ โcharge (moyenne pondรยฉrรยฉe)
    const sYield = stockYieldRef.current || 0;
    const cYield = chargeYieldRef.current || 0;
    const newCharge = cNow + dumped;
    const newChargeYield = newCharge > 0
      ? (cNow * cYield + dumped * sYield) / newCharge
      : 0;
    setChargeYield(newChargeYield);
    // v25.0.9 รขโฌโ propagation composition BACรขโ โcharge proportionnelle
    const sComp = stockCompRef.current || [0,0,0,0,0,0,0];
    const ratio = stock > 0 ? dumped / stock : 0;
    if (ratio > 0) {
      const transfer = sComp.map(m => (m || 0) * ratio);
      setStockComposition(prev => prev.map((m, i) => Math.max(0, (m || 0) - transfer[i])));
      setChargeComposition(prev => prev.map((m, i) => (m || 0) + transfer[i]));
    }
    setStock(s  => {
      const next = Math.max(0, s - dumped);
      if (next < 0.001) {
        if (sYield !== 0) setStockYield(0);
        setStockComposition([0,0,0,0,0,0,0]);
      }
      return next;
    });
    setCharge(f => Math.min(cme, f + dumped));

    setPouring(true);
    let start = null;
    const DUR = 1100;
    const tick = ts => {
      if (!start) start = ts;
      const t = Math.min(1, (ts - start) / DUR);
      setPourProg(t);
      if (t < 1) { requestAnimationFrame(tick); }
      else {
        setPouring(false); setPourProg(0);
        const sf = {id:uid++, val:`+${fmtT(dumped)} dans le digesteur !`};
        setScoreF(p => [...p, sf]);
        setTimeout(() => setScoreF(p => p.filter(x => x.id !== sf.id)), 2200);
        if (tutStep === 2) setTutStep(3);
      }
    };
    requestAnimationFrame(tick);
