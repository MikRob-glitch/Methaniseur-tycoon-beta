                    }}>{entry.name}</div>
                    {rg && (
                      <div style={{
                        fontSize:"8px",padding:"1px 6px",borderRadius:"8px",marginBottom:"4px",
                        background:`${rg.color}25`,color:rg.light,border:`1px solid ${rg.color}40`,
                        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"
                      }}>{entry.region}</div>
                    )}
                    <div style={{
                      width:"100%",height:`${h}px`,borderRadius:"8px 8px 0 0",
                      background:bgColors[podiumIdx],
                      border:`1px solid ${borderColors[podiumIdx]}`,
                      borderBottom:"none",
                      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                      position:"relative",overflow:"hidden"
                    }}>
                      <div style={{
                        position:"absolute",bottom:0,left:0,right:0,
                        height:`${Math.min(100, (entry.score || 0) / Math.max(1, leaderboard[0]?.score || 1) * 100)}%`,
                        background:`linear-gradient(180deg,${colors[podiumIdx]}22,${colors[podiumIdx]}08)`,
                        transition:"height 1s ease"
                      }}/>
                      <div style={{fontSize:"13px",fontWeight:900,color:colors[podiumIdx],zIndex:1}}>
                        {fmt(entry.score || 0)}
                      </div>
                      {(entry.scoreNet > 0 || entry.scoreGnv > 0) && (
                        <div style={{display:"flex",gap:"3px",marginTop:"3px",zIndex:1}}>
                          {entry.scoreNet > 0 && <span style={{fontSize:"7px",color:"rgba(74,158,219,.7)"}}>🔌{fmt(entry.scoreNet)}</span>}
                          {entry.scoreGnv > 0 && <span style={{fontSize:"7px",color:"rgba(74,200,120,.7)"}}>⛽{fmt(entry.scoreGnv)}</span>}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Liste complète */}
          <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
            {leaderboard.map((entry, idx) => {
              const rank   = idx + 1;
              const isMe   = entry.name === username;
              const prevRk = lbPrevRanks[entry.name];
              const delta  = prevRk !== undefined ? prevRk - idx : 0; // positive = montée
              const rg     = regionData[entry.region];
              const maxScore = leaderboard[0]?.score || 1;
              const pct    = (entry.score || 0) / maxScore * 100;
              const netPct = entry.score > 0 ? ((entry.scoreNet || 0) / entry.score * 100) : 100;

              return (
                <div key={entry.name} style={{
                  display:"flex",alignItems:"center",gap:"8px",
                  padding:"10px 12px",borderRadius:"12px",
                  background:isMe?"rgba(74,158,219,.12)":"rgba(255,255,255,.03)",
                  border:isMe?"1px solid rgba(74,158,219,.35)":"1px solid rgba(255,255,255,.05)",
                  animation:isMe?"meterGlow 3s ease infinite":"none",
                  transition:"all .3s",
                  position:"relative",overflow:"hidden"
                }}>
                  {/* Barre de score en fond */}
                  <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct}%`,
                    background:"linear-gradient(90deg,rgba(74,158,219,.06),rgba(74,158,219,.02))",
                    transition:"width .8s ease",borderRadius:"12px"}}/>

                  {/* Rang */}
                  <div style={{
                    width:"28px",height:"28px",borderRadius:"50%",flexShrink:0,
                    background:rank<=3?`${["#F5BE50","#C0C0C0","#CD7F32"][rank-1]}20`:"rgba(255,255,255,.06)",
                    border:`1.5px solid ${rank<=3?["#F5BE50","#C0C0C0","#CD7F32"][rank-1]+"60":"rgba(255,255,255,.1)"}`,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:"11px",fontWeight:900,
                    color:rank<=3?["#F5BE50","#C0C0C0","#CD7F32"][rank-1]:"rgba(255,255,255,.45)",
                    zIndex:1
                  }}>
                    {rank <= 3 ? MEDALS[rank-1] : rank}
                  </div>

                  {/* Nom + région */}
                  <div style={{flex:1,minWidth:0,zIndex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                      <span style={{
                        fontSize:"12px",fontWeight:isMe?800:600,
                        color:isMe?"#EDF4FF":"rgba(255,255,255,.75)",
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"
                      }}>{entry.name}</span>
                      {isMe && <span style={{fontSize:"8px",background:"rgba(74,158,219,.2)",color:"#6DB5EC",padding:"1px 5px",borderRadius:"6px",fontWeight:700,flexShrink:0}}>MOI</span>}
                      {delta > 0 && <span style={{fontSize:"10px",color:"#22c55e",fontWeight:800,flexShrink:0}}>▲{delta}</span>}
                      {delta < 0 && <span style={{fontSize:"10px",color:"#ef4444",fontWeight:800,flexShrink:0}}>▼{Math.abs(delta)}</span>}
                    </div>
                    {rg && (
                      <div style={{
                        display:"inline-block",fontSize:"8px",padding:"1px 6px",borderRadius:"6px",marginTop:"2px",
                        background:`${rg.color}18`,color:`${rg.light}cc`,
                        border:`1px solid ${rg.color}30`
                      }}>{entry.region}</div>
                    )}
                  </div>

                  {/* Score ou progression */}
                  <div style={{textAlign:"right",flexShrink:0,zIndex:1,minWidth:"80px"}}>
                    {entry.connected ? (<>
                      <div style={{fontSize:"13px",fontWeight:800,color:isMe?"#4A9EDB":"rgba(255,255,255,.7)"}}>
                        {fmt(entry.score || 0)}
                      </div>
                      {/* Mini barre bicolore réseau / GNV */}
                      <div style={{width:"48px",height:"4px",borderRadius:"2px",background:"rgba(255,255,255,.08)",marginTop:"3px",overflow:"hidden",display:"flex",marginLeft:"auto"}}>
                        <div style={{height:"100%",width:`${netPct}%`,background:"#4A9EDB",borderRadius:"2px 0 0 2px"}}/>
                        <div style={{height:"100%",flex:1,background:"#4ADB94",borderRadius:"0 2px 2px 0"}}/>
                      </div>
                      <div style={{display:"flex",gap:"4px",justifyContent:"flex-end",marginTop:"2px"}}>
                        <span style={{fontSize:"7px",color:"rgba(74,158,219,.6)"}}>🔌{fmt(entry.scoreNet || 0)}</span>
                        <span style={{fontSize:"7px",color:"rgba(74,200,120,.6)"}}>⛽{fmt(entry.scoreGnv || 0)}</span>
                      </div>
                    </>) : (<>
                      {/* v25.0.5 — Progression steps : étapes débloquées avant injection */}
                      <div style={{display:"flex",gap:"3px",justifyContent:"flex-end",marginBottom:"4px"}}>
                        {[
                          {icon:"🫙",label:"Cuve",ok:true},
                          {icon:"🧪",label:"Épur.",ok:entry.epurateur},
                          {icon:"🔩",label:"Comp.",ok:entry.compresseur},
                          {icon:"🏗️",label:"Inject.",ok:false},
                        ].map((s,si) => (
                          <div key={si} style={{
                            width:"18px",height:"18px",borderRadius:"5px",
                            display:"flex",alignItems:"center",justifyContent:"center",
                            fontSize:"10px",
                            background:s.ok?"rgba(74,158,219,.2)":"rgba(255,255,255,.05)",
                            border:s.ok?"1px solid rgba(74,158,219,.4)":"1px solid rgba(255,255,255,.1)",
                            opacity:s.ok?1:0.35,
                          }} title={s.label}>{s.icon}</div>
                        ))}
                      </div>
                      {/* v25.0.5 — Badge "En attente d'injection" remplace la barre buffer */}
                      <div style={{
                        display:"inline-flex",alignItems:"center",gap:"4px",
                        padding:"3px 8px",borderRadius:"10px",marginLeft:"auto",
                        background:"rgba(255,160,32,.12)",border:"1px solid rgba(255,160,32,.3)",
                        fontSize:"9px",fontWeight:600,color:"#E8A020",letterSpacing:".02em"
                      }}>
                        <span style={{width:"5px",height:"5px",borderRadius:"50%",background:"#E8A020",animation:"meterGlow 1.5s ease infinite"}}/>
                        En attente injection
                      </div>
                    </>)}
                  </div>
                </div>
              );
            })}
          </div>

          {leaderboard.length === 0 && !lbLoading && (
            <div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,.35)",fontSize:"13px"}}>
              Aucun joueur enregistré pour le moment.
            </div>
          )}
          {lbLoading && leaderboard.length === 0 && (
            <div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,.35)",fontSize:"12px",animation:"shimmer 1.5s ease infinite"}}>
              ⏳ Chargement du classement…
            </div>
          )}

          {/* Légende */}
          <div style={{
            marginTop:"14px",padding:"8px 12px",borderRadius:"10px",
            background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",
            display:"flex",gap:"12px",justifyContent:"center"
          }}>
            <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
              <div style={{width:"14px",height:"4px",borderRadius:"2px",background:"#4A9EDB"}}/>
              <span style={{fontSize:"9px",color:"rgba(255,255,255,.4)"}}>Réseau GRDF</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
              <div style={{width:"14px",height:"4px",borderRadius:"2px",background:"#4ADB94"}}/>
              <span style={{fontSize:"9px",color:"rgba(255,255,255,.4)"}}>GNV</span>
            </div>
          </div>
        </div>
      )}

      {/* ══ MON CLASSEMENT · RÉGIONAL ══ */}
      {rankTab === "mine" && myRankMode === "cumulative" && cumulativeView === "lifetime" && myRankTab === "regional" && (
        <div style={{flex:1,padding:"12px 14px 30px",animation:"riseIn .3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <div style={{fontSize:"12px",fontWeight:700,color:"rgba(255,255,255,.5)",letterSpacing:".06em",textTransform:"uppercase"}}>
              Classement · {region}
            </div>
            <button onClick={onRefreshRegionalLb} disabled={regionalLbLoading} style={{
              background:"rgba(74,158,219,.15)",border:"1px solid rgba(74,158,219,.3)",
              borderRadius:"8px",color:"#4A9EDB",fontSize:"11px",padding:"4px 10px",cursor:"pointer"
            }}>{regionalLbLoading ? "⏳" : "↻"}</button>
          </div>

          {regionalLb.length === 0 && !regionalLbLoading && (
            <div style={{textAlign:"center",padding:"40px 0",color:"rgba(255,255,255,.25)",fontSize:"13px"}}>
              Aucun joueur dans votre région pour l'instant.
            </div>
          )}
          {regionalLbLoading && regionalLb.length === 0 && (
            <div style={{textAlign:"center",padding:"40px 0",color:"rgba(255,255,255,.25)",fontSize:"13px"}}>⏳ Chargement…</div>
          )}

          <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
            {regionalLb.map((entry, idx) => {
              const isMe = entry.name === username;
              const medal = idx < 3 ? ["🥇","🥈","🥉"][idx] : null;
              return (
                <div key={entry.name} style={{
                  display:"flex",alignItems:"center",gap:"10px",
                  padding:"12px 14px",borderRadius:"12px",
                  background:isMe?"rgba(74,158,219,.12)":"rgba(255,255,255,.03)",
                  border:`1px solid ${isMe?"rgba(74,158,219,.4)":"rgba(255,255,255,.06)"}`,
                  position:"relative",
                }}>
                  <div style={{width:"28px",textAlign:"center",fontSize:medal?"18px":"12px",fontWeight:700,color:isMe?"#4A9EDB":"rgba(255,255,255,.3)",flexShrink:0}}>
                    {medal || `#${entry.rank}`}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"13px",fontWeight:isMe?700:500,color:isMe?"#fff":"rgba(255,255,255,.8)",display:"flex",alignItems:"center",gap:"6px"}}>
                      {entry.name}
                      {isMe && <span style={{fontSize:"9px",background:"rgba(74,158,219,.25)",color:"#4A9EDB",padding:"1px 6px",borderRadius:"8px",fontWeight:700,letterSpacing:".04em"}}>VOUS</span>}
                      {entry.connected && <span style={{fontSize:"9px",color:"#22c55e"}}>● GRDF</span>}
                    </div>
                    <div style={{fontSize:"10px",color:"rgba(255,255,255,.35)",marginTop:"2px"}}>
                      {entry.digesteurs > 1 ? `${entry.digesteurs} digesteurs` : "1 digesteur"}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:"14px",fontWeight:700,color:isMe?"#4A9EDB":"rgba(255,255,255,.75)"}}>
                      {(entry.score/1000).toFixed(1)}<span style={{fontSize:"10px",fontWeight:400,color:"rgba(255,255,255,.4)"}}> km³</span>
                    </div>
                    {entry.scoreGnv > 0 && (
                      <div style={{fontSize:"9px",color:"rgba(232,160,32,.6)",marginTop:"1px"}}>
                        +{(entry.scoreGnv/1000).toFixed(1)} GNV
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ══ MA RÉGION (vue inter-régions) ══ */}
      {rankTab === "regions" && (
        <div style={{flex:1,padding:"12px 14px 30px",animation:"riseIn .3s ease"}}>

          {regionalStats && regionalStats.length > 0 ? (
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {regionalStats.map((rs, idx) => {
                const rg    = regionData[rs.region];
                const isMyR = rs.region === region;
                const maxVol = regionalStats[0]?.volume || 1;
                const pct   = (rs.volume / maxVol) * 100;
                const medal = idx < 3 ? MEDALS[idx] : null;

                return (
                  <div key={rs.region} style={{
                    padding:"14px 16px",borderRadius:"14px",
                    background:isMyR?"rgba(74,158,219,.1)":"rgba(255,255,255,.03)",
                    border:`1px solid ${isMyR?(rg?.color||"#4A9EDB")+"55":"rgba(255,255,255,.07)"}`,
                    position:"relative",overflow:"hidden",
                    animation:isMyR?"meterGlow 3s ease infinite":"none",
                    transition:"all .4s"
                  }}>
                    {/* Barre en fond */}
                    <div style={{
                      position:"absolute",left:0,top:0,bottom:0,width:`${pct}%`,
                      background:`linear-gradient(90deg,${rg?.color||"#4A9EDB"}12,${rg?.color||"#4A9EDB"}04)`,
                      transition:"width 1s ease",borderRadius:"14px"
                    }}/>

                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"relative",zIndex:1}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px"}}>
                          {medal && <span style={{fontSize:"16px"}}>{medal}</span>}
                          <span style={{
                            fontSize:"14px",fontWeight:800,
                            color:rg?.light||"#EDF4FF"
                          }}>{rs.region}</span>
                          {isMyR && <span style={{fontSize:"8px",background:"rgba(74,158,219,.2)",color:"#6DB5EC",padding:"1px 5px",borderRadius:"6px",fontWeight:700}}>MA RÉGION</span>}
                        </div>
                        <div style={{fontSize:"10px",color:"rgba(255,255,255,.4)",marginBottom:"8px"}}>
                          {rg?.label || rs.region}
                        </div>

                        {/* Stats */}
                        <div style={{display:"flex",gap:"12px"}}>
                          <div>
                            <div style={{fontSize:"18px",fontWeight:900,color:rg?.light||"#6DB5EC"}}>
                              {rs.sites}
                            </div>
                            <div style={{fontSize:"8px",color:"rgba(255,255,255,.4)",marginTop:"1px"}}>
                              site{rs.sites>1?"s":""} raccordé{rs.sites>1?"s":""}
                            </div>
                          </div>
                          <div style={{width:"1px",background:"rgba(255,255,255,.08)",alignSelf:"stretch"}}/>
                          <div>
                            <div style={{fontSize:"18px",fontWeight:900,color:"#EDF4FF"}}>
                              {fmt(rs.volume)}
                            </div>
                            <div style={{fontSize:"8px",color:"rgba(255,255,255,.4)",marginTop:"1px"}}>
                              volume total injecté
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* Rank badge */}
                      <div style={{
                        width:"32px",height:"32px",borderRadius:"50%",flexShrink:0,
                        background:`${rg?.color||"#4A9EDB"}25`,
                        border:`1.5px solid ${rg?.color||"#4A9EDB"}50`,
                        display:"flex",alignItems:"center",justifyContent:"center",
                        fontSize:"13px",fontWeight:900,color:rg?.light||"#6DB5EC"
                      }}>
                        #{idx+1}
                      </div>
                    </div>

                    {/* Barre de volume */}
                    <div style={{marginTop:"10px",height:"6px",borderRadius:"3px",background:"rgba(255,255,255,.06)",overflow:"hidden",position:"relative",zIndex:1}}>
                      <div style={{
                        height:"100%",borderRadius:"3px",
                        width:`${pct}%`,
                        background:`linear-gradient(90deg,${rg?.color||"#4A9EDB"},${rg?.light||"#6DB5EC"})`,
                        transition:"width 1s ease",
                        boxShadow:`0 0 8px ${rg?.color||"#4A9EDB"}55`
                      }}/>
                    </div>

                    {/* Joueurs de cette région */}
                    {(() => {
                      const regionPlayers = leaderboard.filter(p => p.region === rs.region);
                      if (regionPlayers.length === 0) return null;
                      return (
                        <div style={{marginTop:"10px",paddingTop:"8px",borderTop:"1px solid rgba(255,255,255,.06)",position:"relative",zIndex:1}}>
                          <div style={{fontSize:"8px",color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"6px"}}>Joueurs · {regionPlayers.length}</div>
                          <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                            {regionPlayers.map((p, pi) => {
                              const isMe = p.name === username;
                              return (
                                <div key={p.name} style={{
                                  display:"flex",alignItems:"center",gap:"6px",
                                  padding:"5px 8px",borderRadius:"8px",
                                  background:isMe?"rgba(74,158,219,.1)":"rgba(255,255,255,.02)",
                                  border:isMe?"1px solid rgba(74,158,219,.25)":"1px solid transparent",
                                }}>
                                  <span style={{fontSize:"10px",fontWeight:700,color:"rgba(255,255,255,.35)",width:"16px",textAlign:"center"}}>{pi+1}</span>
                                  <span style={{fontSize:"11px",fontWeight:isMe?800:500,color:isMe?"#EDF4FF":"rgba(255,255,255,.65)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
                                  {isMe && <span style={{fontSize:"7px",background:"rgba(74,158,219,.2)",color:"#6DB5EC",padding:"1px 4px",borderRadius:"4px",fontWeight:700,flexShrink:0}}>MOI</span>}
                                  {p.connected ? (
                                    <span style={{fontSize:"10px",fontWeight:700,color:rg?.light||"#6DB5EC",flexShrink:0}}>{fmt(p.score)}</span>
                                  ) : (
                                    /* v25.0.5 — barre supprimée (calcul cassé : buffer/500 alors que seuil=5000)
                                                 + cohérence avec le classement individuel */
                                    <span style={{
                                      fontSize:"8px",fontWeight:600,color:"#E8A020",letterSpacing:".02em",
                                      padding:"2px 6px",borderRadius:"6px",
                                      background:"rgba(255,160,32,.12)",border:"1px solid rgba(255,160,32,.3)",
                                      flexShrink:0,whiteSpace:"nowrap"
                                    }}>En attente</span>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                );
              })}
            </div>
          ) : regionalLoading ? (
            <div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,.35)",fontSize:"12px",animation:"shimmer 1.5s ease infinite"}}>
              ⏳ Chargement des stats régionales…
            </div>
          ) : (
            <div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,.35)",fontSize:"13px"}}>
              Aucune donnée régionale disponible.
            </div>
          )}

          {/* Info pédago */}
          <div style={{
            marginTop:"16px",padding:"10px 14px",borderRadius:"12px",
            background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",
            fontSize:"10px",color:"rgba(255,255,255,.45)",lineHeight:1.6
          }}>
            💡 En France, GRDF opère 6 grandes directions régionales. Chaque site raccordé contribue au volume total de sa région.
            L'objectif national est d'atteindre 10% de gaz renouvelable dans le réseau d'ici 2030.
          </div>
        </div>
      )}

      {/* ══ ONGLET RÉCOMPENSES ══ */}
      {/* v25.0.6 — bloc inactif : la condition rankTab === "badges" n'arrive
                   plus jamais (sous-onglet retiré). Conservé en attendant
                   la promotion en composant indépendant RewardsTab. */}
      {false && rankTab === "badges" && (
        <div style={{flex:1,padding:"12px 14px 30px",animation:"riseIn .3s ease"}}>

          {/* Certificats réalistes */}
          <div style={{fontSize:"10px",fontWeight:700,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"10px"}}>📜 Certificats officiels</div>
          <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"20px"}}>
            {[
              { id:"go",     icon:"📜", name:"Garantie d'Origine (GO)",  desc:"Chaque MWh injecté génère 1 GO",             unlocked: injected && totalScore >= 100,     detail: injected && totalScore>=100 ? `${Math.floor(totalScore/100)} GO émises` : injected ? `${fmt(totalScore)} / 100 m³` : "Raccordement requis", color:"#4A9EDB" },
              { id:"cpb",    icon:"🏛️", name:"Certificat de Production de Biogaz", desc:"Dispositif national obligatoire 2025", unlocked: totalScore >= 10000,               detail: totalScore>=10000 ? "Éligible CPB" : `${fmt(10000)} requis`, color:"#5544CC" },
              { id:"quali",  icon:"⭐", name:"Label Qualimétha",         desc:"Qualité CH₄ > 97% maintenue",                unlocked: injected && digesteurs >= 2,        detail: injected&&digesteurs>=2 ? "Certifié" : "2 digesteurs requis", color:"#E8A020" },
            ].map(cert => (
              <div key={cert.id} style={{
                padding:"14px 16px",borderRadius:"14px",
                background:cert.unlocked?"rgba(74,158,219,.08)":"rgba(255,255,255,.03)",
                border:`1px solid ${cert.unlocked?cert.color+"45":"rgba(255,255,255,.08)"}`,
                opacity:cert.unlocked?1:.55,transition:"all .4s"
              }}>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <div style={{
                    width:"40px",height:"40px",borderRadius:"12px",flexShrink:0,
                    background:cert.unlocked?cert.color+"22":"rgba(255,255,255,.04)",
                    border:`1.5px solid ${cert.unlocked?cert.color:"rgba(255,255,255,.1)"}`,
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",
                    boxShadow:cert.unlocked?`0 0 12px ${cert.color}35`:"none"
                  }}>{cert.unlocked?cert.icon:"🔒"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"13px",fontWeight:800,color:cert.unlocked?"#EDF4FF":"rgba(255,255,255,.3)"}}>{cert.name}</div>
                    <div style={{fontSize:"10px",color:"rgba(255,255,255,.4)",marginTop:"2px"}}>{cert.desc}</div>
                    {cert.detail && <div style={{fontSize:"10px",fontWeight:700,color:cert.unlocked?cert.color:"rgba(255,255,255,.25)",marginTop:"4px"}}>{cert.detail}</div>}
                  </div>
                  {cert.unlocked && <span style={{fontSize:"11px",fontWeight:700,color:cert.color,padding:"3px 10px",borderRadius:"20px",background:cert.color+"18",flexShrink:0}}>✅</span>}
                </div>
              </div>
            ))}
          </div>

          {/* Milestones de production */}
          <div style={{fontSize:"10px",fontWeight:700,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"10px"}}>🏆 Milestones de production</div>
          <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"20px"}}>
            {[
              { icon:"🥉", name:"Premier MWh injecté",       threshold:100,      medal:"bronze" },
              { icon:"🥈", name:"100 foyers alimentés",      threshold:1000000,   medal:"silver",  sub:"≈ 10 000 MWh" },
              { icon:"🥇", name:"1 000 foyers alimentés",    threshold:10000000,  medal:"gold",    sub:"≈ 100 000 MWh" },
              { icon:"💎", name:"Territoire Vert",            threshold:100000000, medal:"diamond", sub:"10% de la consommation régionale simulée" },
            ].map(ms => {
              const done = totalScore >= ms.threshold;
              const pct = Math.min(100, (totalScore / ms.threshold) * 100);
              const colors = { bronze:"#CD7F32", silver:"#C0C0C0", gold:"#F5BE50", diamond:"#6DB5EC" };
              const c = colors[ms.medal];
              return (
                <div key={ms.name} style={{
                  padding:"10px 14px",borderRadius:"12px",
                  background:done?`${c}12`:"rgba(255,255,255,.02)",
                  border:`1px solid ${done?c+"40":"rgba(255,255,255,.06)"}`,
                  opacity:done?1:.6
                }}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:done?0:"6px"}}>
                    <span style={{fontSize:"18px",filter:done?"none":"grayscale(100%) opacity(0.4)"}}>{ms.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"12px",fontWeight:700,color:done?c:"rgba(255,255,255,.35)"}}>{ms.name}</div>
                      {ms.sub && <div style={{fontSize:"9px",color:"rgba(255,255,255,.3)",marginTop:"1px"}}>{ms.sub}</div>}
                    </div>
                    {done ? (
                      <span style={{fontSize:"10px",fontWeight:700,color:c,padding:"2px 8px",borderRadius:"10px",background:c+"18"}}>✅</span>
                    ) : (
                      <span style={{fontSize:"10px",color:"rgba(255,255,255,.3)"}}>{pct.toFixed(0)}%</span>
                    )}
                  </div>
                  {!done && (
                    <div style={{height:"4px",borderRadius:"2px",background:"rgba(255,255,255,.06)",overflow:"hidden",marginTop:"4px"}}>
                      <div style={{height:"100%",borderRadius:"2px",width:`${pct}%`,background:`linear-gradient(90deg,${c}55,${c})`,transition:"width .5s"}}/>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Badges gamifiés */}
          {(() => {
            const allBadges = computeBadges({ owned, digesteurs, gnvStations, tractorGnv, autoDump });
            const byCat = {
              progression: allBadges.filter(b => b.category === "progression"),
              diversite:   allBadges.filter(b => b.category === "diversite"),
              maitrise:    allBadges.filter(b => b.category === "maitrise"),
            };

            const renderBadge = (b) => (
              <div key={b.id} style={{
                position:"relative",overflow:"hidden",
                padding:"12px 10px",borderRadius:"12px",textAlign:"center",
                background:b.done?`${b.color}12`:"rgba(255,255,255,.02)",
                border:`1px solid ${b.done?b.color+"40":"rgba(255,255,255,.06)"}`,
                opacity:b.done?1:.55,transition:"all .4s"
              }}>
                <div style={{fontSize:"24px",filter:b.done?"drop-shadow(0 0 8px "+b.color+"80)":"grayscale(100%) opacity(0.35)",marginBottom:"6px"}}>{b.icon}</div>
                <div style={{fontSize:"11px",fontWeight:800,color:b.done?b.color:"rgba(255,255,255,.35)"}}>{b.name}</div>
                <div style={{fontSize:"9px",color:"rgba(255,255,255,.35)",marginTop:"2px"}}>{b.desc}</div>
                {b.done ? (
                  <div style={{fontSize:"8px",fontWeight:700,color:b.color,marginTop:"4px",background:b.color+"18",padding:"2px 8px",borderRadius:"8px",display:"inline-block"}}>DÉBLOQUÉ</div>
                ) : b.pct != null ? (
                  <div style={{marginTop:"6px"}}>
                    <div style={{height:"3px",borderRadius:"2px",background:"rgba(255,255,255,.06)",overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:"2px",width:`${b.pct}%`,background:`linear-gradient(90deg,${b.color}55,${b.color})`,transition:"width .5s"}}/>
                    </div>
                    {b.detail && <div style={{fontSize:"8px",color:"rgba(255,255,255,.35)",marginTop:"3px",fontWeight:600}}>{b.detail}</div>}
                  </div>
                ) : null}
                {/* Mini-tampon statique en coin pour badges débloqués */}
                {b.done && (
                  <div style={{
                    position:"absolute",top:"6px",right:"4px",
                    transform:"rotate(-12deg)",opacity:.85,pointerEvents:"none"
                  }}>
                    <svg width="42" height="42" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
                      <circle cx="85" cy="85" r="72" fill="none" stroke="#B82E1A" strokeWidth="3" strokeDasharray="4 3" opacity="0.75"/>
                      <circle cx="85" cy="85" r="62" fill="none" stroke="#B82E1A" strokeWidth="5"/>
                      <text x="85" y="98" textAnchor="middle" fontSize="36" fontWeight="900" fill="#B82E1A" letterSpacing="2" fontFamily="Georgia, serif">OK</text>
                    </svg>
                  </div>
                )}
              </div>
            );

            const sectionTitleStyle = {fontSize:"10px",fontWeight:700,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"10px"};

            return (
              <>
                <div style={sectionTitleStyle}>🎖️ Progression</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"8px",marginBottom:"20px"}}>
                  {byCat.progression.map(renderBadge)}
                </div>

                <div style={sectionTitleStyle}>🌈 Diversité des intrants</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"8px",marginBottom:"20px"}}>
                  {byCat.diversite.map(renderBadge)}
                </div>

                <div style={sectionTitleStyle}>🏆 Maîtrise d'un intrant</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"8px"}}>
                  {byCat.maitrise.map(renderBadge)}
                </div>
              </>
            );
          })()}

          {/* Info pédago */}
          <div style={{
            marginTop:"16px",padding:"10px 14px",borderRadius:"12px",
            background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",
            fontSize:"10px",color:"rgba(255,255,255,.45)",lineHeight:1.6
          }}>
            💡 Les Garanties d'Origine (GO) et les Certificats de Production de Biogaz (CPB) sont de vrais mécanismes
            de la filière biométhane en France. Chaque certificat représente 1 MWh de biogaz injecté dans le réseau.
          </div>
        </div>
      )}
    </div>
  );
}

// ─── REWARDS TAB — onglet récompenses (v25.0.6) ──────────────────────────────
// Sorti de RankingTab pour devenir un onglet principal (meilleure découvrabilité).

// et badges gamifiés (progression / diversité / maîtrise).
function RewardsTab({ injected, totalScore, digesteurs, owned, gnvStations, tractorGnv, autoDump }) {
  return (
    <div style={{flex:1,padding:"12px 14px 30px",animation:"riseIn .3s ease"}}>

      {/* Certificats réalistes */}

        {[
          { id:"go",     icon:"📜", name:"Garantie d'Origine (GO)",  desc:"Chaque MWh injecté génère 1 GO",             unlocked: injected && totalScore >= 100,     detail: injected && totalScore>=100 ? `${Math.floor(totalScore/100)} GO émises` : injected ? `${fmt(totalScore)} / 100 m³` : "Raccordement requis", color:"#4A9EDB" },
          { id:"cpb",    icon:"🏛️", name:"Certificat de Production de Biogaz", desc:"Dispositif national obligatoire 2025", unlocked: totalScore >= 10000,               detail: totalScore>=10000 ? "Éligible CPB" : `${fmt(10000)} requis`, color:"#5544CC" },

        ].map(cert => (
          <div key={cert.id} style={{
            padding:"14px 16px",borderRadius:"14px",

            border:`1px solid ${cert.unlocked?cert.color+"45":"rgba(255,255,255,.08)"}`,
            opacity:cert.unlocked?1:.55,transition:"all .4s"
          }}>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{
                width:"40px",height:"40px",borderRadius:"12px",flexShrink:0,
                background:cert.unlocked?cert.color+"22":"rgba(255,255,255,.04)",
                border:`1.5px solid ${cert.unlocked?cert.color:"rgba(255,255,255,.1)"}`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",
                boxShadow:cert.unlocked?`0 0 12px ${cert.color}35`:"none"
              }}>{cert.unlocked?cert.icon:"🔒"}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:"13px",fontWeight:800,color:cert.unlocked?"#EDF4FF":"rgba(255,255,255,.3)"}}>{cert.name}</div>
                <div style={{fontSize:"10px",color:"rgba(255,255,255,.4)",marginTop:"2px"}}>{cert.desc}</div>
                {cert.detail && <div style={{fontSize:"10px",fontWeight:700,color:cert.unlocked?cert.color:"rgba(255,255,255,.25)",marginTop:"4px"}}>{cert.detail}</div>}
              </div>
              {cert.unlocked && <span style={{fontSize:"11px",fontWeight:700,color:cert.color,padding:"3px 10px",borderRadius:"20px",background:cert.color+"18",flexShrink:0}}>✅</span>}
            </div>
          </div>
        ))}
      </div>

      {/* Milestones de production */}
      <div style={{fontSize:"10px",fontWeight:700,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"10px"}}>🏆 Milestones de production</div>
      <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"20px"}}>
        {[
          { icon:"🥉", name:"Premier MWh injecté",       threshold:100,      medal:"bronze" },
          { icon:"🥈", name:"100 foyers alimentés",      threshold:1000000,   medal:"silver",  sub:"≈ 10 000 MWh" },
          { icon:"🥇", name:"1 000 foyers alimentés",    threshold:10000000,  medal:"gold",    sub:"≈ 100 000 MWh" },
          { icon:"💎", name:"Territoire Vert",            threshold:100000000, medal:"diamond", sub:"10% de la consommation régionale simulée" },
        ].map(ms => {
          const done = totalScore >= ms.threshold;
          const pct = Math.min(100, (totalScore / ms.threshold) * 100);
          const colors = { bronze:"#CD7F32", silver:"#C0C0C0", gold:"#F5BE50", diamond:"#6DB5EC" };
          const c = colors[ms.medal];
          return (
            <div key={ms.name} style={{
              padding:"10px 14px",borderRadius:"12px",
              background:done?`${c}12`:"rgba(255,255,255,.02)",
              border:`1px solid ${done?c+"40":"rgba(255,255,255,.06)"}`,
              opacity:done?1:.6
            }}>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:done?0:"6px"}}>
                <span style={{fontSize:"18px",filter:done?"none":"grayscale(100%) opacity(0.4)"}}>{ms.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"12px",fontWeight:700,color:done?c:"rgba(255,255,255,.35)"}}>{ms.name}</div>
                  {ms.sub && <div style={{fontSize:"9px",color:"rgba(255,255,255,.3)",marginTop:"1px"}}>{ms.sub}</div>}
                </div>
                {done ? (
                  <span style={{fontSize:"10px",fontWeight:700,color:c,padding:"2px 8px",borderRadius:"10px",background:c+"18"}}>✅</span>
                ) : (
                  <span style={{fontSize:"10px",color:"rgba(255,255,255,.3)"}}>{pct.toFixed(0)}%</span>
                )}
              </div>
              {!done && (
                <div style={{height:"4px",borderRadius:"2px",background:"rgba(255,255,255,.06)",overflow:"hidden",marginTop:"4px"}}>
                  <div style={{height:"100%",borderRadius:"2px",width:`${pct}%`,background:`linear-gradient(90deg,${c}55,${c})`,transition:"width .5s"}}/>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Badges gamifiés */}
      {(() => {
        const allBadges = computeBadges({ owned, digesteurs, gnvStations, tractorGnv, autoDump });
        const byCat = {
          progression: allBadges.filter(b => b.category === "progression"),
          diversite:   allBadges.filter(b => b.category === "diversite"),
          maitrise:    allBadges.filter(b => b.category === "maitrise"),
        };

        const renderBadge = (b) => (
          <div key={b.id} style={{
            position:"relative",overflow:"hidden",
            padding:"12px 10px",borderRadius:"12px",textAlign:"center",
            background:b.done?`${b.color}12`:"rgba(255,255,255,.02)",
            border:`1px solid ${b.done?b.color+"40":"rgba(255,255,255,.06)"}`,
            opacity:b.done?1:.55,transition:"all .4s"

            <div style={{fontSize:"24px",filter:b.done?"drop-shadow(0 0 8px "+b.color+"80)":"grayscale(100%) opacity(0.35)",marginBottom:"6px"}}>{b.icon}</div>

                position:"absolute",top:"6px",right:"4px",

        const sectionTitleStyle = {fontSize:"10px",fontWeight:700,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"10px"};

        return (
          <>
            <div style={sectionTitleStyle}>🎖️ Progression</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"8px",marginBottom:"20px"}}>

                          pour rester lisible. */}
            {UPGRADES.map((u, i) => {
              const intrantBadges = byCat.maitrise.filter(b => b.intrantIdx === i);

              const starsEarned = intrantBadges.filter(b => b.done).length;
              const c = MAITRISE_COLORS[i] || "#4A9EDB";
              return (
                <div key={`mastery-${i}`} style={{
                  marginBottom: "10px", padding: "10px 12px", borderRadius: "12px",
                  background: starsEarned > 0 ? `${c}10` : "rgba(255,255,255,.02)",
                  border: `1px solid ${starsEarned > 0 ? c+"30" : "rgba(255,255,255,.06)"}`,
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "8px" }}>
                    <span style={{ fontSize: "20px" }}>{u.icon}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: "12px", fontWeight: 800, color: "#EDF4FF" }}>{u.name}</div>
                      <div style={{ fontSize: "9px", color: "rgba(255,255,255,.4)" }}>{qty} acheté{qty > 1 ? "s" : ""}</div>

                    <div style={{ display: "flex", gap: "1px" }}>
                      {[0,1,2,3,4].map(si => (
                        <span key={si} style={{
                          fontSize: "12px",
                          color: si < starsEarned ? "#F5BE50" : "rgba(255,255,255,.15)",
                          filter: si < starsEarned ? "drop-shadow(0 0 4px rgba(245,190,80,.7))" : "none"
                        }}>★</span>
                      ))}
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: "3px" }}>
                    {intrantBadges.map(b => (
                      <div key={b.id} style={{
                        padding: "4px 2px", borderRadius: "6px", textAlign: "center",

                        opacity: b.done ? 1 : 0.5,
                      }}>
                        <div style={{ fontSize: "9px", fontWeight: 700, color: b.done ? "#F5BE50" : "rgba(255,255,255,.3)" }}>
                          {"★".repeat(b.starLevel)}
                        </div>
                        <div style={{ fontSize: "8px", color: b.done ? c : "rgba(255,255,255,.3)", fontWeight: 600, marginTop: "1px" }}>
                          +{Math.round((STAR_BONUSES[b.starLevel-1]-1)*100)}%
                        </div>
                        <div style={{ fontSize: "7px", color: "rgba(255,255,255,.35)", marginTop: "1px" }}>
                          {STAR_THRESHOLDS[b.starLevel-1]}

                </div>

            })}
          </>
        );
      })()}

      {/* Info pédago */}
      <div style={{
        marginTop:"16px",padding:"10px 14px",borderRadius:"12px",
        background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",
        fontSize:"10px",color:"rgba(255,255,255,.45)",lineHeight:1.6
      }}>
        💡 Les Garanties d'Origine (GO) et les Certificats de Production de Biogaz (CPB) sont de vrais mécanismes
        de la filière biométhane en France. Chaque certificat représente 1 MWh de biogaz injecté dans le réseau.
      </div>
    </div>
  );
}
