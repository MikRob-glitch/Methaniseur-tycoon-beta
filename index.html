// SHA-256 via Web Crypto API (disponible dans tous les navigateurs modernes)
const hashPassword = async (password) => {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
};

// Upsert joueur — V25.13 : tout passe par l'Edge Function /save (validation serveur).
//   score-only et full state fusionnés en un seul appel (l'Edge Function whitelist les colonnes).
const _supabaseSave = (payload) => {
  const token = getSessionToken();
  if (!token) {
    console.warn("[Save] Pas de session_token, save ignorée — il faut se reconnecter");
    return Promise.resolve({ ok: false, error: "no_session" });
  }
  return _callPlayersApi({ action: "save", session_token: token, state: payload })
    .then(r => {
      if (!r.ok) {
        console.warn("[Save] échec :", r.error, r.detail);
        if (r.error === "invalid_token" || r.error === "session_expired") {
          // Session morte : on purge → l'app détectera l'absence au prochain boot
          setSessionToken(null);
        }
      }
      return r;
    });
};

// ─────────────────────────────────────────────────────────────────────────────
// 🔌 SUPABASE REALTIME — WebSocket Phoenix + fallback polling
// ─────────────────────────────────────────────────────────────────────────────
function useSupabaseRealtime(onPlayerChange, active) {
  const [rtStatus, setRtStatus] = useState("disconnected");
  const onChangeRef = useRef(onPlayerChange);
  const wsRef = useRef(null);
  const refCounter = useRef(1);
  const heartbeatRef = useRef(null);
  const reconnectRef = useRef(null);
  const pollRef = useRef(null);
  const prevSigRef = useRef(null);
  const wsFailedRef = useRef(false);
  useEffect(() => { onChangeRef.current = onPlayerChange; }, [onPlayerChange]);

  // ── Polling fallback ──
  const startPolling = useCallback(() => {
    if (pollRef.current) return;
    const poll = () => {
      fetch(
        SUPABASE_URL + "/rest/v1/players?select=id,score_network,score_gnv,is_connected&order=updated_at.desc&limit=30",
        { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
      ).then(r => r.json()).then(rows => {
        setRtStatus("connected");
        const sig = JSON.stringify(rows.map(r => r.id + ":" + r.score_network + ":" + r.score_gnv));
        if (prevSigRef.current && sig !== prevSigRef.current && onChangeRef.current) {
          onChangeRef.current(rows);
        }
        prevSigRef.current = sig;
      }).catch(() => { setRtStatus("error"); });
    };
    poll();
    pollRef.current = setInterval(poll, 8000);
  }, []);

  const stopPolling = useCallback(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
  }, []);

  // ── WebSocket ──
  const connectWs = useCallback(() => {
    if (!SUPABASE_KEY || SUPABASE_URL.includes("VOTRE_PROJECT_ID")) return;
    if (wsRef.current && wsRef.current.readyState < 2) return;

    setRtStatus("connecting");
    const projectRef = SUPABASE_URL.replace("https://","").replace(".supabase.co","");
    const url = `wss://${projectRef}.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`;

    let ws;
    try { ws = new WebSocket(url); } catch { wsFailedRef.current = true; startPolling(); return; }
    wsRef.current = ws;

    const timeout = setTimeout(() => {
      if (ws.readyState !== 1) { ws.close(); wsFailedRef.current = true; startPolling(); }
    }, 5000);

    ws.onopen = () => {
      clearTimeout(timeout);
      stopPolling();
      const joinRef = String(refCounter.current++);
      const msgRef  = String(refCounter.current++);
      ws.send(JSON.stringify({
        topic: "realtime:public:players",
        event: "phx_join",
        payload: {
          config: {
            broadcast: { self: false },
            presence: { key: "" },
            postgres_changes: [{ event: "*", schema: "public", table: "players" }]
          }
        },
        ref: msgRef, join_ref: joinRef
      }));
      heartbeatRef.current = setInterval(() => {
        if (ws.readyState === 1) {
          ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:String(refCounter.current++), join_ref:null }));
        }
      }, 29000);
    };

    ws.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.event === "phx_reply" && msg.payload?.status === "ok" && msg.topic !== "phoenix") {
          setRtStatus("connected");
        }
        if (msg.event === "postgres_changes") {
          const data = msg.payload?.data;
          if (data && onChangeRef.current) onChangeRef.current(data);
        }
      } catch {}
    };

    ws.onerror = () => {
      clearTimeout(timeout);
      wsFailedRef.current = true;
      startPolling();
    };

    ws.onclose = () => {
      if (heartbeatRef.current) clearInterval(heartbeatRef.current);
      if (wsFailedRef.current) {
        startPolling();
      } else {
        setRtStatus("disconnected");
        reconnectRef.current = setTimeout(connectWs, 3000);
      }
    };
  }, [startPolling, stopPolling]);

  // ── Lifecycle ──
  useEffect(() => {
    if (!active || !SUPABASE_KEY || SUPABASE_URL.includes("VOTRE_PROJECT_ID")) {
      setRtStatus("disconnected");
      return;
    }
    wsFailedRef.current = false;
    connectWs();
    return () => {
      if (heartbeatRef.current) clearInterval(heartbeatRef.current);
      if (reconnectRef.current) clearTimeout(reconnectRef.current);
      stopPolling();
      if (wsRef.current) { wsRef.current.onclose = null; wsRef.current.close(); wsRef.current = null; }
    };
  }, [active, connectWs, stopPolling]);

  return rtStatus;
}

// v25.14 — Helpers C/N (Carbone/Azote)
//   Le ratio C/N pondere par la masse de chaque intrant determine la qualite
//   du mix en methanisation reelle. Sweet spot industriel = 25.
//   Plus on s'eloigne, plus le yield CH4 chute (cf. inhibition methanogenese).
const CN_SWEET = 25;
const CN_WIDTH = 10;            // largeur de la zone "favorable" autour du sweet
const CN_MULT_MIN = 0.7;        // multiplicateur quand C/N tres eloigne (mono mauvais intrant)
const CN_MULT_MAX = 1.3;        // multiplicateur quand C/N optimal
const cnFromComposition = (composition) => {
  if (!Array.isArray(composition)) return null;
  let totalMass = 0, weightedCn = 0;
  for (let i = 0; i < 7; i++) {
    const m = composition[i] || 0;
    const c = UPGRADES[i]?.cn;
    if (typeof c !== 'number') continue;
    totalMass += m;
    weightedCn += m * c;
  }
  return totalMass > 0 ? weightedCn / totalMass : null;
};
const cnYieldMultiplier = (composition) => {
  const cn = cnFromComposition(composition);
  if (cn === null) return 1.0;
  const ratioScore = Math.max(0, 1 - Math.abs(cn - CN_SWEET) / CN_WIDTH);
  return CN_MULT_MIN + (CN_MULT_MAX - CN_MULT_MIN) * ratioScore;
};

// v25.0.9 — Helper : yield moyen pondéré (m³ CH₄/t) à partir d'une composition par intrant
//   composition = [t_lisier, t_verts, t_restau, t_step, t_indus, t_cive, t_biogazplus]
//   v25.14 : applique le bonus C/N (×0.7 a ×1.3 selon ratio_pond).
//   Retourne 0 si masse totale nulle (réservoir vide).
const yieldFromComposition = (composition) => {
  if (!Array.isArray(composition)) return 0;
  let totalMass = 0, totalGas = 0;
  for (let i = 0; i < 7; i++) {
    const m = composition[i] || 0;
    if (m > 0) {
      totalMass += m;
      totalGas  += m * UPGRADES[i].realYield;
    }
  }
  // v25.14 : applique le bonus C/N (0.7 a 1.3 selon ratio sweet spot 25)
  return totalMass > 0 ? (totalGas / totalMass) * cnYieldMultiplier(composition) : 0;
};
// v25.0.9 — Helper : masse totale d'une composition (somme des intrants)
const massFromComposition = (composition) => {
  if (!Array.isArray(composition)) return 0;
  let total = 0;
  for (let i = 0; i < 7; i++) total += composition[i] || 0;
  return total;
};

const reliabilityMultFor = (r) => {
  if (typeof r !== 'number' || isNaN(r)) return 1;        // fail-safe : pas de pénalité si state invalide
  if (r >= QUALIMETHA_THRESHOLD) {
    // Rampe premium : 95→1.00, 100→1.10
    const t = (Math.min(100, r) - QUALIMETHA_THRESHOLD) / (100 - QUALIMETHA_THRESHOLD);

function ThemeProvider({ children }) {
  const [mode, setMode] = useState(() => { try { return localStorage.getItem('mt-theme')||'dark'; } catch { return 'dark'; } });
  useEffect(() => { try { localStorage.setItem('mt-theme', mode); } catch {} }, [mode]);
  const toggle = () => setMode(m => m==='dark'?'light':'dark');
  const T = mode==='dark' ? DARK : LIGHT;
  return (<ThemeCtx.Provider value={{ mode, toggle, T }}>{children}</ThemeCtx.Provider>);
}

// ─── TUTORIAL OVERLAY COMPONENT ──────────────────────────────────────────────
function TutorialOverlay({ step, onNext, onSkip }) {
  const [rect, setRect] = useState(null);
  const [wh, setWh] = useState({ w: window.innerWidth, h: window.innerHeight });

  useEffect(() => {
    if (!step) return;
    const update = () => {
      setWh({ w: window.innerWidth, h: window.innerHeight });
      if (!step.target) { setRect(null); return; }
      const el = document.querySelector(step.target);
      if (el) {
        const r = el.getBoundingClientRect();
        const pad = 10;
        setRect({ x: r.left - pad, y: r.top - pad, w: r.width + pad * 2, h: r.height + pad * 2 });
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } else {
        setRect(null);
      }
    };
    // petit délai pour laisser le DOM se stabiliser après transition d'onglet
    const t = setTimeout(update, 350);
    window.addEventListener('resize', update);
    return () => { clearTimeout(t); window.removeEventListener('resize', update); };
  }, [step]);

  if (!step) return null;

  const W = wh.w, H = wh.h;
  const isCentered = !step.target || !rect;

  // Calcul position tooltip
  let tooltipStyle = {};
  let arrowStyle = null;

  if (!isCentered && rect) {
    const TW = Math.min(300, W - 32);
    const spaceBelow = H - (rect.y + rect.h);
    const spaceAbove = rect.y;
    const left = Math.max(16, Math.min(rect.x, W - TW - 16));

    if (spaceBelow >= 170) {
      tooltipStyle = { position: 'fixed', top: rect.y + rect.h + 14, left };
      arrowStyle = {
        position: 'absolute', top: -8, left: 24,
        width: 0, height: 0,
        borderLeft: '8px solid transparent', borderRight: '8px solid transparent',
        borderBottom: '8px solid rgba(74,158,219,.5)',
      };
    } else if (spaceAbove >= 170) {
      tooltipStyle = { position: 'fixed', bottom: H - rect.y + 14, left };
      arrowStyle = {
        position: 'absolute', bottom: -8, left: 24,
        width: 0, height: 0,
        borderLeft: '8px solid transparent', borderRight: '8px solid transparent',
        borderTop: '8px solid rgba(74,158,219,.5)',
      };
    } else {
      // fallback centré
      tooltipStyle = { position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)' };
    }
  } else {
    tooltipStyle = { position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)' };
  }

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 9990, pointerEvents: 'all' }}>
      {/* Overlay SVG avec trou de spotlight */}
      {!isCentered && rect ? (
        <svg
          style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none', overflow: 'visible' }}
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <mask id="tut-mask">
              <rect width="100%" height="100%" fill="white"/>
              <rect x={rect.x} y={rect.y} width={rect.w} height={rect.h} rx="10" fill="black"/>
            </mask>
          </defs>
          <rect width="100%" height="100%" fill="rgba(0,0,0,.72)" mask="url(#tut-mask)"/>
          {/* anneau pulsant autour de la cible */}
          <rect
            x={rect.x} y={rect.y} width={rect.w} height={rect.h} rx="10"
            fill="none" stroke="#4A9EDB" strokeWidth="2"
            opacity="0.9"
            style={{ animation: 'tutPulse 1.4s ease-in-out infinite' }}
          />
        </svg>
      ) : (
        <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,.72)', backdropFilter: 'blur(3px)' }}/>
      )}

      {/* Zone cliquable en dehors pour skip */}
      <div style={{ position: 'absolute', inset: 0 }} onClick={onSkip}/>

      {/* Tooltip card */}
      <div
        onClick={e => e.stopPropagation()}
        style={{
          ...tooltipStyle,
          width: Math.min(300, W - 32),
          background: 'linear-gradient(145deg,#0f2035 0%,#172840 100%)',
          border: '1.5px solid rgba(74,158,219,.45)',
          borderRadius: 16,
          padding: '18px 20px',
          boxShadow: '0 12px 50px rgba(0,0,0,.75), 0 0 0 1px rgba(74,158,219,.12)',
          zIndex: 9991,
          pointerEvents: 'all',
        }}
      >
        {arrowStyle && <div style={arrowStyle}/>}

        {/* Badge */}
        <div style={{ fontSize: '10px', color: 'rgba(74,158,219,.75)', marginBottom: '8px', fontWeight: 700, letterSpacing: '.07em', textTransform: 'uppercase' }}>
          💡 Tutoriel
        </div>

        {/* Titre */}
        <div style={{ fontSize: '15px', fontWeight: 800, color: '#EDF4FF', marginBottom: '8px', lineHeight: 1.3 }}>
          {step.title}
        </div>

        {/* Corps */}
        <div style={{ fontSize: '13px', color: 'rgba(255,255,255,.65)', lineHeight: 1.6, marginBottom: '16px' }}>
          {step.body}
        </div>

        {/* Boutons */}
        <div style={{ display: 'flex', gap: '8px', justifyContent: 'flex-end', alignItems: 'center' }}>
          <button onClick={onSkip} style={{
            padding: '7px 14px', borderRadius: 8, border: '1px solid rgba(255,255,255,.1)',
            background: 'transparent', color: 'rgba(255,255,255,.38)', fontSize: '12px',
            cursor: 'pointer', fontWeight: 600,
          }}>Passer tout</button>
          <button onClick={onNext} style={{
            padding: '8px 20px', borderRadius: 8, border: 'none',
            background: 'linear-gradient(135deg,#2A6FAA,#4A9EDB)', color: 'white',
            fontSize: '13px', fontWeight: 800, cursor: 'pointer',
            boxShadow: '0 4px 14px rgba(74,158,219,.45)',
          }}>Compris !</button>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const savedLogin = (() => { try { const s = localStorage.getItem('mt_login_v2'); return s ? JSON.parse(s) : null; } catch { return null; } })();
  // "verifying" = on a un localStorage mais on doit valider en Supabase avant d'ouvrir le jeu
  const [screen,   setScreen]  = useState(savedLogin ? "verifying" : "login");
  const [username, setUsername] = useState(savedLogin?.username || "");
  const [region,   setRegion]  = useState(savedLogin?.region   || "Centre-Ouest");
  const [savedMaia,setSavedMaia]= useState(savedLogin?.maia    || "");

  // ── Champs partagés ──
  const [maia,     setMaia]    = useState("");
  const [password, setPassword]= useState("");
  // ── Champs inscription seulement ──
  const [confirmPw, setConfirmPw] = useState("");
  const [displayName, setDisplayName] = useState("");
  const [regRegion, setRegRegion] = useState("Centre-Ouest");

  const [authLoading, setAuthLoading] = useState(false);
  const [authError,   setAuthError]   = useState("");
  const [showPw,      setShowPw]      = useState(false);

  // ── VÉRIFICATION SUPABASE AU DÉMARRAGE ────────────────────────────────────
  // Si un localStorage existe, on vérifie que le compte est toujours en base.
  // Si le joueur a été supprimé côté admin → on force la déconnexion.
  useEffect(() => {
    if (!savedLogin?.maia) return;
    supabaseCheckMaia(savedLogin.maia).then(agent => {
      if (agent) {
        // Compte toujours valide → jeu
        setScreen("game");
      } else {
        // Compte supprimé (ou Supabase inaccessible) → on purge et on renvoie au login
        try { localStorage.removeItem('mt_login_v2'); } catch {}
        setScreen("login");
      }
    }).catch(() => {
      // Erreur réseau : on laisse passer (on ne bloque pas offline)
      setScreen("game");
    });
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // ── CONNEXION ──────────────────────────────────────────────────────────────
  const doLogin = async () => {
    const m = maia.trim().toUpperCase();
    const p = password;
    if (m.length < 2 || p.length < 1) { setAuthError("Identifiant MAIA et mot de passe requis."); return; }
    setAuthLoading(true); setAuthError("");
    try {
      const hash = await hashPassword(p);
      // v25.12 — comparaison hash côté serveur via RPC (sécurité).
      const agent = await supabaseVerifyLogin(m, hash);
      if (!agent) {
        // Message unifié : ne pas révéler si le MAIA existe ou pas (anti-énumération)
        setAuthError("Identifiant ou mot de passe incorrect.");
        setAuthLoading(false); return;
      }
      const u = agent.username;
      const r = agent.region;
      setUsername(u); setRegion(r); setSavedMaia(m);
      try { localStorage.setItem('mt_login_v2', JSON.stringify({ username: u, region: r, maia: m })); } catch {}
      setScreen("game");
    } catch {
      setAuthError("Erreur réseau. Vérifiez votre connexion.");
    }
    setAuthLoading(false);
  };

  // ── INSCRIPTION ────────────────────────────────────────────────────────────
  const doRegister = async () => {
    const m = maia.trim().toUpperCase();
    const dn = displayName.trim();
    const p  = password;
    if (m.length < 2)  { setAuthError("Identifiant MAIA invalide."); return; }
    if (dn.length < 2) { setAuthError("Prénom & initiale requis (ex : Marie D.)."); return; }
    if (p.length < 6)  { setAuthError("Mot de passe trop court (6 caractères min)."); return; }
    if (p !== confirmPw) { setAuthError("Les mots de passe ne correspondent pas."); return; }
    setAuthLoading(true); setAuthError("");
    try {
      const existing = await supabaseCheckMaia(m);
      if (existing) {
        setAuthError("Ce MAIA est déjà enregistré. Connectez-vous.");
        setAuthLoading(false); return;
      }
      const hash = await hashPassword(p);
      const result = await supabaseRegisterAgent(m, hash, dn, regRegion);
      if (!result.ok) { setAuthError(result.error); setAuthLoading(false); return; }
      setUsername(dn); setRegion(regRegion); setSavedMaia(m);
      try { localStorage.setItem('mt_login_v2', JSON.stringify({ username: dn, region: regRegion, maia: m })); } catch {}
      setScreen("game");
    } catch {
      setAuthError("Erreur réseau. Vérifiez votre connexion.");
    }
    setAuthLoading(false);
  };

  // ── RENDER VERIFYING ──────────────────────────────────────────────────────
  if (screen === "verifying") {
    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0B1623 0%,#080E06 60%,#0B1623 100%)",
        display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"16px",
        fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
        <div style={{filter:"drop-shadow(0 0 20px rgba(74,158,219,.55))"}}><MiniDigesterIcon size={48}/></div>
        <div style={{color:"rgba(74,158,219,.8)",fontSize:"13px",letterSpacing:".1em",textTransform:"uppercase"}}>
          Vérification du compte…
        </div>
        <div style={{width:"40px",height:"40px",border:"3px solid rgba(74,158,219,.2)",
          borderTop:"3px solid #4A9EDB",borderRadius:"50%",
          animation:"spin 0.8s linear infinite"}}/>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  // ── RENDER AUTH ────────────────────────────────────────────────────────────
  if (screen !== "game") {
    const isRegister = screen === "register";
    const handleSubmit = isRegister ? doRegister : doLogin;
    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0B1623 0%,#080E06 60%,#0B1623 100%)",
        display:"flex",alignItems:"center",justifyContent:"center",
        fontFamily:"'Segoe UI',system-ui,sans-serif",padding:"20px"}}>
        <div style={{width:"100%",maxWidth:"380px",background:"rgba(255,255,255,0.03)",
          border:"1px solid rgba(74,158,219,.28)",borderRadius:"24px",padding:"36px 32px",
          boxShadow:"0 0 80px rgba(74,158,219,.09)"}}>

          {/* Header */}
          <div style={{textAlign:"center",marginBottom:"28px"}}>
            <div style={{marginBottom:"6px",filter:"drop-shadow(0 0 20px rgba(74,158,219,.55))"}}><MiniDigesterIcon size={56}/></div>
            <div style={{fontSize:"22px",fontWeight:800,color:"#4A9EDB",letterSpacing:"-0.5px"}}>Méthaniseur Tycoon</div>
          </div>

          {/* Onglets Connexion / Inscription */}
          <div style={{display:"flex",background:"rgba(255,255,255,.05)",borderRadius:"12px",padding:"3px",marginBottom:"24px"}}>
            {[["login","Connexion"],["register","Créer un compte"]].map(([s,label])=>(
              <button key={s} onClick={()=>{ setScreen(s); setAuthError(""); setPassword(""); setConfirmPw(""); }} style={{
                flex:1, padding:"9px", borderRadius:"10px", border:"none",
                background: screen===s ? "linear-gradient(135deg,#2A7DBB,#4A9EDB)" : "transparent",
                color: screen===s ? "#fff" : "rgba(255,255,255,.45)",
                fontWeight:700, fontSize:"13px", cursor:"pointer", transition:"all .2s",
              }}>{label}</button>
            ))}
          </div>

          {/* ── Champ MAIA ── */}
          <div style={{...AUTH_LABEL}}>Identifiant MAIA</div>
          <input
            value={maia} onChange={e=>{ setMaia(e.target.value.toUpperCase()); setAuthError(""); }}
            onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
            placeholder="ex : MA12345"
            style={{...AUTH_INPUT, letterSpacing:".06em", fontFamily:"monospace", fontSize:"16px"}}
          />

          {/* ── Champ Mot de passe ── */}
          <div style={{...AUTH_LABEL, marginTop:"14px"}}>Mot de passe</div>
          <div style={{position:"relative"}}>
            <input
              type={showPw?"text":"password"}
              value={password} onChange={e=>{ setPassword(e.target.value); setAuthError(""); }}
              onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
              placeholder={isRegister?"Choisissez un mot de passe (6 car. min)":"Votre mot de passe"}
              style={{...AUTH_INPUT, paddingRight:"44px"}}
            />
            <button onClick={()=>setShowPw(v=>!v)} style={{
              position:"absolute", right:"12px", top:"50%", transform:"translateY(-50%)",
              background:"none", border:"none", color:"rgba(255,255,255,.4)", cursor:"pointer", fontSize:"16px", padding:"4px",
            }}>{showPw?"🙈":"👁️"}</button>
          </div>

          {/* ── Champs inscription uniquement ── */}
          {isRegister && (<>
            <div style={{...AUTH_LABEL, marginTop:"14px"}}>Confirmer le mot de passe</div>
            <input
              type={showPw?"text":"password"}
              value={confirmPw} onChange={e=>{ setConfirmPw(e.target.value); setAuthError(""); }}
              onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
              placeholder="Répétez votre mot de passe"
              style={{...AUTH_INPUT}}
            />
            <div style={{...AUTH_LABEL, marginTop:"14px"}}>Prénom &amp; initiale <span style={{color:"rgba(255,255,255,.3)",fontWeight:400,fontSize:"10px",textTransform:"none"}}>(affiché dans le classement)</span></div>
            <input
              value={displayName} onChange={e=>{ setDisplayName(e.target.value); setAuthError(""); }}
              onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
              placeholder="ex : Marie D."
              style={{...AUTH_INPUT}}
            />
            <div style={{...AUTH_LABEL, marginTop:"14px"}}>Direction régionale</div>
            <select value={regRegion} onChange={e=>setRegRegion(e.target.value)} style={{
              ...AUTH_INPUT, background:"rgba(11,22,35,.75)",
            }}>
              {REGIONS.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </>)}

          {/* ── Message d'erreur ── */}
          {authError && (
            <div style={{marginTop:"12px",padding:"10px 14px",borderRadius:"10px",
              background:"rgba(224,88,88,.12)",border:"1px solid rgba(224,88,88,.35)",
              color:"#E88888",fontSize:"12px",lineHeight:"1.4"}}>
              ⚠️ {authError}
            </div>
          )}

          {/* ── Bouton principal ── */}
          <button onClick={handleSubmit} disabled={authLoading} style={{
            width:"100%", marginTop:"20px", padding:"15px", borderRadius:"14px", border:"none",

            color:"white", fontSize:"15px", fontWeight:800, cursor: authLoading ? "not-allowed" : "pointer",
            boxShadow: authLoading ? "none" : "0 6px 30px rgba(74,158,219,.44)",
            transition:"all .2s",
          }}>
            {authLoading ? "⏳ Vérification…" : isRegister ? "🚀 Créer mon compte" : "🔑 Se connecter"}
          </button>

          <div style={{textAlign:"center",marginTop:"14px",color:"rgba(255,255,255,.25)",fontSize:"10px"}}>
            Application interne GRDF · Accès réservé aux agents
          </div>
        </div>
      </div>
    );
  }

  return (<ThemeProvider><Game username={username} region={region} maia={savedMaia}/></ThemeProvider>);
}

// ─── BADGES : source unique ──────────────────────────────────────────────────
const MAITRISE_COLORS = ["#8B6F47","#22a86a","#E8A020","#5544CC","#BB6600","#F5BE50","#4A9EDB"];
const DIVERSITY_META = [
  { icon:"🌱", name:"Premiers pas",        color:"#6DB5EC" },
  { icon:"🍃", name:"Polyvalent",          color:"#22a86a" },
  { icon:"⭐", name:"Étoiles ×5",          color:"#F5BE50" },
  { icon:"♻️", name:"Économie Circulaire", color:"#4ADB94" },
];
const DIVERSITY_THRESHOLDS = [2, 4, 5, 7];

function computeBadges({ owned, digesteurs, gnvStations, tractorGnv, autoDump }) {
  const diversityCount = owned.filter(q => q > 0).length;

  const progression = [
    { id:"prog-gnv-pioneer", category:"progression", icon:"⛽", name:"Pionnier GNV",     desc:"Premier tracteur GNV",           done: !!tractorGnv,       color:"#4ADB94" },
    { id:"prog-megasite",    category:"progression", icon:<MiniDigesterIcon/>, name:"Méga-site",        desc:"3 digesteurs actifs",            done: digesteurs >= 3,    color:"#6DB5EC" },
    { id:"prog-autodump",    category:"progression", icon:"🤖", name:"Full Automatique", desc:"Déverseur automatique installé", done: !!autoDump,         color:"#E8A020" },
    { id:"prog-gnv-network", category:"progression", icon:"⛽", name:"Réseau GNV",       desc:"3 stations GNV opérationnelles", done: gnvStations >= 3,   color:"#4ADB94" },
  ];

  const diversity = DIVERSITY_THRESHOLDS.map((threshold, idx) => ({
    id: `div-${threshold}`,
    category: "diversite",
    ...DIVERSITY_META[idx],
    desc: `${threshold} types d'intrants différents`,
    done: diversityCount >= threshold,
    pct: Math.min(100, (diversityCount / threshold) * 100),
    detail: `${Math.min(diversityCount, threshold)}/${threshold}`,
  }));

  // v25.0.7 — Maîtrise multi-paliers (5 étoiles par intrant)
  // Chaque seuil 5/10/20/50/100 génère un badge séparé, débloquable progressivement.
  // Pédagogie : montre la courbe d'apprentissage opérationnel sur la durée.
  const STAR_LABELS = ["Initiation", "Pratique", "Expertise", "Excellence", "Maîtrise totale"];
  const mastery = [];
  UPGRADES.forEach((u, i) => {
    const qty = owned[i] || 0;
    STAR_THRESHOLDS.forEach((threshold, sIdx) => {
      const stars = sIdx + 1;
      const bonusPct = Math.round((STAR_BONUSES[sIdx] - 1) * 100);
      mastery.push({
        id: `mast-${i}-s${stars}`,
        category: "maitrise",
        icon: u.icon,
        name: `${u.name} ${"★".repeat(stars)}`,
        desc: `${threshold} achats — bonus +${bonusPct}% débit`,
        done: qty >= threshold,
        color: MAITRISE_COLORS[i] || "#4A9EDB",
        pct: Math.min(100, (qty / threshold) * 100),
        detail: `${Math.min(qty, threshold)}/${threshold} · ${STAR_LABELS[sIdx]}`,
        intrantIdx: i,
        starLevel: stars,
      });
    });
  });

  return [...progression, ...diversity, ...mastery];
}

// Affiche le ratio Carbone/Azote du stock actuel + multiplicateur yield resultant.
// Position : a gauche du bac d'intrants dans la digesteur scene.
function CNGauge({ composition }) {
  const [helpOpen, setHelpOpen] = useState(false);
  const cn = cnFromComposition(composition);
  const mult = cnYieldMultiplier(composition);
  // Si stock vide, affiche jauge inactive
  const isEmpty = cn === null;
  // Pour la position du curseur : mapper [CN_SWEET-CN_WIDTH*2, CN_SWEET+CN_WIDTH*2] sur [0, 100]
  const minCn = CN_SWEET - CN_WIDTH * 2;  // 5
  const maxCn = CN_SWEET + CN_WIDTH * 2;  // 45
  const cursorPct = isEmpty ? 50 : Math.max(0, Math.min(100, ((cn - minCn) / (maxCn - minCn)) * 100));
  // Zones colorees : sweet zone [15, 35] = (15-5)/(45-5)=25% a (35-5)/(45-5)=75%
  const sweetTop = 100 - 75;
  const sweetHeight = 75 - 25;
  const bonusPct = Math.round((mult - 1) * 100);
  const bonusColor = mult >= 1.15 ? '#4ADB94' : mult >= 0.95 ? '#F5BE50' : '#E05858';
  return (
    <>
    <div data-tut="cn-gauge" onClick={() => setHelpOpen(true)} title="Comprendre le ratio C/N" style={{
      width: '34px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px',
      position: 'absolute', left: '-38px', top: '24px', zIndex: 5, cursor: 'pointer',
      transition: 'transform .15s ease'
    }} onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.06)'}
       onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
      <div style={{fontSize: '8px', color: 'rgba(255,255,255,.55)', textTransform: 'uppercase', letterSpacing: '.05em'}}>C/N</div>
      <div style={{
        width: '24px', height: '112px', position: 'relative',
        background: 'linear-gradient(180deg, rgba(224,88,88,.25), rgba(74,158,219,.08), rgba(224,88,88,.25))',
        border: '1px solid rgba(74,158,219,.3)', borderRadius: '6px',
        overflow: 'hidden'
      }}>
        {/* Sweet zone (verte) */}
        <div style={{
          position: 'absolute', top: `${sweetTop}%`, left: 0, right: 0, height: `${sweetHeight}%`,
          background: 'linear-gradient(180deg, rgba(74,219,148,.20), rgba(74,219,148,.35), rgba(74,219,148,.20))',
          borderTop: '1px dashed rgba(74,219,148,.4)', borderBottom: '1px dashed rgba(74,219,148,.4)'
        }}/>
        {/* Marker sweet spot (25) */}
        <div style={{
          position: 'absolute', top: '50%', left: 0, right: 0, height: '1px',
          background: 'rgba(74,219,148,.8)', boxShadow: '0 0 4px rgba(74,219,148,.6)'
        }}/>
        {/* Curseur position actuelle */}
        {!isEmpty && (
          <div style={{
            position: 'absolute', top: `${100 - cursorPct}%`, left: '-2px', right: '-2px',
            transform: 'translateY(-50%)',
            height: '4px', background: bonusColor, borderRadius: '2px',
            boxShadow: `0 0 8px ${bonusColor}`, transition: 'top .5s ease'
          }}/>
        )}
        {/* Labels haut/bas */}
        <div style={{position:'absolute',top:'2px',left:0,right:0,textAlign:'center',fontSize:'7px',color:'rgba(255,255,255,.4)'}}>45</div>
        <div style={{position:'absolute',bottom:'2px',left:0,right:0,textAlign:'center',fontSize:'7px',color:'rgba(255,255,255,.4)'}}>5</div>
        <div style={{position:'absolute',top:'48%',left:0,right:0,textAlign:'center',fontSize:'7px',fontWeight:700,color:'rgba(74,219,148,.85)'}}>25</div>
      </div>
      {/* Valeur courante */}
      <div style={{textAlign:'center',lineHeight:1.2}}>
        <div style={{fontSize:'11px', fontWeight:800, color: isEmpty ? 'rgba(255,255,255,.3)' : bonusColor}}>
          {isEmpty ? '—' : cn.toFixed(1)}
        </div>
        <div style={{fontSize:'8px', fontWeight:700, color: isEmpty ? 'rgba(255,255,255,.25)' : bonusColor}}>
          {isEmpty ? '' : (bonusPct >= 0 ? '+' : '') + bonusPct + '%'}
        </div>
      </div>
    </div>
    {helpOpen && ReactDOM.createPortal(
      <>

              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:'15px',fontWeight:800,color:'#6DB5EC',lineHeight:1.2,letterSpacing:'-.2px'}}>Ratio C/N</div>
                <div style={{fontSize:'10px',color:'rgba(255,255,255,.5)',marginTop:'2px'}}>La recette du méthaniseur idéal</div>

// ─── GAME ─────────────────────────────────────────────────────────────────────
function Game({ username, region, maia }) {
  const {mode: themeMode, T} = useTheme();
  const isL = themeMode === 'light';

  const SAVE_KEY = `mt_save_v2_${username}`;
  const loadLocalSave = () => { try { const r=localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):null; } catch{return null;} };
  const saved = loadLocalSave();

  // ── CLOUD LOAD : réconciliation Supabase vs localStorage ─────────────────
  // On mount : on charge depuis Supabase. Si plus récent → on remplace le state.
  const [cloudSynced, setCloudSynced] = useState(false);

  const calcOffline = (sv) => {
    if (!sv?.lastSaved) return null;
    const elapsedSec = Math.min((Date.now() - sv.lastSaved) / 1000, 86400);
    if (elapsedSec < 5) return null;

    const ownedArr   = sv.owned || [0,0,0,0,0,0,0];
    const fr         = ownedArr.reduce((a,q,i) => a + fillFor(i, q), 0);
    if (fr <= 0) return null;

    const stockMaxOff    = ownedArr.reduce((a,q,i) => a + UPGRADES[i].bagCap * q * LOCAL_CAP_MULT, 0);
    const nDig           = sv.digesteurs || 1;
    const burnRateEff    = fr * nDig;

    // ── v24 : REMPLISSAGE DES TAMPONS LOCAUX ────────────────────────────────
    // Règle idle-friendly : offline, les tampons se remplissent jusqu'à 100 %
    // mais NE DÉCLENCHENT PAS les pannes. Aucune escalation, aucune pénalité.
    // L'état zone est forcé à 'ok' au retour pour repartir d'une base propre.
    const savedLocal = Array.isArray(sv.localStock) && sv.localStock.length === 7
                       ? sv.localStock : [0,0,0,0,0,0,0];
    const newLocal   = [...savedLocal];
    const newZoneState     = ['ok','ok','ok','ok','ok','ok','ok'];
    const newSatSince      = [null,null,null,null,null,null,null];
    const newOfflineUntil  = [null,null,null,null,null,null,null];
    let totalLocalStockGained = 0;
    for (let i = 0; i < 7; i++) {
      if (ownedArr[i] === 0) { newLocal[i] = 0; continue; }
      const cap   = UPGRADES[i].bagCap * ownedArr[i] * LOCAL_CAP_MULT;
      const baseI = fillFor(i, ownedArr[i]);
      const wasOffline = (Array.isArray(sv.zoneState) && sv.zoneState[i] === 'offline');
      // Si la zone était offline ET que le timer n'est pas écoulé, on garde la panne
      const offUntil = Array.isArray(sv.offlineUntil) ? sv.offlineUntil[i] : null;
      if (wasOffline && offUntil && Date.now() < offUntil) {
        newZoneState[i]    = 'offline';
        newOfflineUntil[i] = offUntil;
        newLocal[i]        = 0; // zone arrêtée
        continue;
      }
      // Sinon remplissage standard, plafonné à 100 %
      const target = Math.min(cap, savedLocal[i] + baseI * elapsedSec);
      const gain   = Math.max(0, target - savedLocal[i]);
      newLocal[i]  = target;
      totalLocalStockGained += gain;
    }

    // ── v24 : STOCK GLOBAL VIA "TRACTEURS IDÉAUX" ────────────────────────────
    // Hypothèse simplificatrice : pendant l'absence, les tracteurs vidaient
    // les tampons en continu. Au retour, le stock global a donc absorbé tout
    // ce qui aurait été produit (clamp stockMax). Ça respecte la promesse idle :
    // "rentrer = trouver le stock plein, prêt à digérer".
    const savedStock     = sv.stock || 0;
    // Production théorique pendant l'absence = somme des baseFill × dt, plafonnée
    // par la capacité globale (stockMax) ET par ce qui se trouvait déjà dans les
    // tampons locaux (on ne crée pas de matière à partir de rien).
    const idealProduction = fr * elapsedSec;
    const totalAvailable  = idealProduction + savedLocal.reduce((a,v,i) => a + (ownedArr[i]>0?v:0), 0);
    const stockGained     = Math.max(0, Math.min(stockMaxOff - savedStock, idealProduction));
    const stockAfterFill  = savedStock + stockGained;

    // ── v25.0 : YIELD MIX — m³ CH₄/t moyen pondéré ─────────────────────────
    // Apports gisement pendant offline : yield = moyenne pondérée par baseFill×qty×bonus
    // v25.0.7 — pondération via fillFor pour cohérence avec les bonus étoile
    const newFlowYield = fr > 0
      ? ownedArr.reduce((a,q,i) => a + fillFor(i, q) * UPGRADES[i].realYield, 0) / fr
      : 0;
    // Migration : si save < v25 (pas de yield persistés) et stock/charge présents
    //             → seed avec newFlowYield (best-effort, évite produced=0)
    const savedStockYield  = (sv.stockYield  != null) ? sv.stockYield  : ((sv.stock  > 0) ? newFlowYield : 0);
    const savedChargeYield = (sv.chargeYield != null) ? sv.chargeYield : ((sv.charge > 0) ? newFlowYield : 0);
    // Stock après remplissage = mix savedStock + stockGained (chacun avec leur yield)
    const stockMixYield = stockAfterFill > 0
      ? (savedStock * savedStockYield + stockGained * newFlowYield) / stockAfterFill
      : 0;

    // ── Digesteur : matière brûlable (logique préservée) ────────────────────
    let savedCharge = sv.charge || 0;
    let availableToDigest, stockConsumed = 0;

    if (sv.autoDump && stockAfterFill > 0) {
      const maxBurnable = Math.min(burnRateEff * elapsedSec, savedCharge + stockAfterFill);
      availableToDigest = maxBurnable;
      const fromCharge  = Math.min(savedCharge, maxBurnable);
      stockConsumed     = Math.max(0, maxBurnable - fromCharge);
    } else {
      availableToDigest = Math.min(savedCharge, burnRateEff * elapsedSec);
    }

    // Production = part de charge (yield charge) + part de stock (yield mix)
    const fromCharge = Math.min(savedCharge, availableToDigest);
    // v25.6 — la fiabilité sauvegardée module le yield d'extraction CH₄ pendant l'offline
    //         (cohérent avec le tick temps réel : mêmes intrants, qualité d'extraction variable)
    const offlineRelMult = reliabilityMultFor(typeof sv.reliability === 'number' ? sv.reliability : 100);
    const produced = (fromCharge * savedChargeYield + stockConsumed * stockMixYield) * offlineRelMult;
    if (produced < 0.01 && stockGained < 1 && totalLocalStockGained < 1) return null;

    // ── Gains par filière ─────────────────────────────────────────────────────
    const inj        = sv.injected || false;
    const gnvSplit   = sv.gnvSplit || 20;
    const gnvStations= sv.gnvStations || 0;
    let bmGained = 0, gnvBmGained = 0, eurosGained = 0;

    if (inj) {
      if (gnvStations > 0 && gnvSplit > 0) {
        const toGnv  = produced * (gnvSplit / 100);
        bmGained     = produced - toGnv;
        gnvBmGained  = toGnv;
      } else {
        bmGained = produced;
      }
      eurosGained = produced * BM_TO_EUR;
    }

    // ── États résiduels (pour corriger le state au retour) ────────────────────
    const remainingCharge = Math.max(0, savedCharge - Math.min(savedCharge, availableToDigest));
    const remainingStock  = Math.max(0, stockAfterFill - stockConsumed);
    // v25.0 — yields résiduels :
    //  · charge restante conserve son yield d'origine (on n'a fait que retirer)
    //  · stock restant conserve le yield mix (mélange savedStock + apports gisement)
    const remainingChargeYield = remainingCharge > 0 ? savedChargeYield : 0;
    const remainingStockYield  = remainingStock  > 0 ? stockMixYield    : 0;

    // ── v25.0.9 : compositions résiduelles ─────────────────────────────────
    //   Charge offline : on a consommé `Math.min(savedCharge, availableToDigest)`
    //                    → décrément proportionnel de chargeComposition
    //   Stock offline  : ajout par "tracteur idéal" proportionnel à fillFor par zone
    //                    moins le stockConsumed (proportionnel à la composition mixée)
    const savedStockComp  = Array.isArray(sv.stockComposition)  && sv.stockComposition.length === 7
      ? sv.stockComposition  : null;
    const savedChargeComp = Array.isArray(sv.chargeComposition) && sv.chargeComposition.length === 7
      ? sv.chargeComposition : null;
    // Composition de la charge restante (proportionnelle à savedCharge)
    let remainingChargeComposition = [0,0,0,0,0,0,0];
    const consumedFromCharge = Math.min(savedCharge, availableToDigest);
    if (savedChargeComp && savedCharge > 0) {
      const keepRatio = (savedCharge - consumedFromCharge) / savedCharge;
      remainingChargeComposition = savedChargeComp.map(m => (m || 0) * keepRatio);
    }
    // Composition du stock après remplissage offline + consommation auto-dump
    // 1) On part de savedStockComp (ou seed proportionnel si absent)
    // 2) On ajoute stockGained réparti proportionnellement à fillFor par intrant
    // 3) On retire stockConsumed proportionnellement à la composition résultante
    let stockCompAfterFill;
    if (savedStockComp) {
      stockCompAfterFill = [...savedStockComp];
    } else {
      // Migration : reconstruction depuis savedStock × yield via fillFor
      const totalFill = ownedArr.reduce((a,q,i) => a + fillFor(i, q), 0);
      stockCompAfterFill = totalFill > 0
        ? ownedArr.map((q, i) => savedStock * fillFor(i, q) / totalFill)
        : [savedStock, 0, 0, 0, 0, 0, 0];
    }
    if (stockGained > 0 && fr > 0) {
      // Apport offline réparti proportionnellement à fillFor (= flux gisement)
      for (let i = 0; i < 7; i++) {
        stockCompAfterFill[i] += stockGained * fillFor(i, ownedArr[i]) / fr;
      }
    }
    let remainingStockComposition = stockCompAfterFill;
    if (stockConsumed > 0 && stockAfterFill > 0) {
      const keepRatio = Math.max(0, (stockAfterFill - stockConsumed) / stockAfterFill);
      remainingStockComposition = stockCompAfterFill.map(m => (m || 0) * keepRatio);
    }

    return {
      elapsedSec, produced, injected: inj,
      stockGained, stockConsumed, remainingCharge, remainingStock,
      remainingChargeYield, remainingStockYield,
      remainingStockComposition, remainingChargeComposition,
      bmGained, gnvBmGained, eurosGained,
      // v24 — état des tampons locaux à appliquer au retour
      remainingLocalStock: newLocal,
      resetZoneState:      newZoneState,
      resetSaturatedSince: newSatSince,
      resetOfflineUntil:   newOfflineUntil,
      localStockGained:    totalLocalStockGained,
    };
  };
  const offlineGains = saved ? calcOffline(saved) : null;
  // Modal n'apparaît que pour les absences notables (>= 30s) pour éviter le spam
  const [offlineModal, setOfflineModal] = useState(!!offlineGains && offlineGains.elapsedSec >= 30);
  const [cloudOfflineGains, setCloudOfflineGains] = useState(null);
  // Gains affichés dans le modal (prio localStorage, fallback cloud)
  const displayedGains = offlineGains || cloudOfflineGains;

  // ── v24.3 : MENU UTILISATEUR (déconnexion) ─────────────────────────────────
  const [showUserMenu, setShowUserMenu] = useState(false);
  const userMenuRef = useRef(null);
  useEffect(() => {
    if (!showUserMenu) return;
    const onDocClick = (e) => {
      if (userMenuRef.current && !userMenuRef.current.contains(e.target)) {
        setShowUserMenu(false);
      }
    };
    document.addEventListener('mousedown', onDocClick);
    document.addEventListener('touchstart', onDocClick);
    return () => {
      document.removeEventListener('mousedown', onDocClick);
      document.removeEventListener('touchstart', onDocClick);
    };
  }, [showUserMenu]);

  // ── ÉTAT ────────────────────────────────────────────────────────────────────
  const [tab,     setTab]     = useState("game");
  const [rankTab, setRankTab] = useState("mine"); // v25.0.6 — "mine" | "regions" (badges promu en onglet principal)
  const [myRankTab, setMyRankTab] = useState("national"); // "national" | "regional" (nested under "mine")
  // v25.14 — Sous-onglets de classement multi-axes
  const [myRankMode, setMyRankMode] = useState("cumulative"); // "performance" | "mastery" | "cumulative"
  const [cumulativeView, setCumulativeView] = useState("season"); // "season" | "lifetime" (uniquement si mode=cumulative)
  const [lbPerf, setLbPerf] = useState([]);
  const [lbMastery, setLbMastery] = useState([]);
  const [lbSeason, setLbSeason] = useState([]);
  const [lbModeLoading, setLbModeLoading] = useState(false);
  const [mo,      setMo]      = useState(saved?.mo      ?? 0);
  const [bm,      setBm]      = useState(() => {
    const base = saved?.bm ?? 0;
    return base + (offlineGains?.bmGained || 0);
  });
  const [buffer,  setBuffer]  = useState(() => {
    const base = saved?.buffer ?? 10;
    const withOffline = (!offlineGains || displayedGains.injected)
      ? base
      : Math.min(INJECTION_THRESHOLD, base + (displayedGains.produced || 0));
    // Anti-deadlock : si aucun intrant acheté et pas encore raccordé, garantit au moins 1 m³
    const savedOwned   = saved?.owned   ?? [0,0,0,0,0,0,0];
    const savedInjected= saved?.injected ?? false;
    const isDeadlocked = !savedInjected && savedOwned.every(q => q === 0) && withOffline < 10;
    return isDeadlocked ? 10 : withOffline;
  });
  const [tutStep, setTutStep] = useState(saved?.tutStep ?? 0);

  // ── Tutoriel spotlight v2 ─────────────────────────────────────────────────
  const TUT_KEY = 'mt_seen_tutos_v1';
  const [seenTutos, setSeenTutos] = useState(() => {
    try {
      const raw = localStorage.getItem('mt_seen_tutos_v1');
      if (raw) return new Set(JSON.parse(raw));
    } catch {}
    // Joueurs existants : pré-marquer les étapes déjà dépassées selon l'état de la save
    const initial = new Set();
    if ((saved?.tutStep ?? 0) >= 3) {
      // Étapes de démarrage déjà faites
      ['welcome','tab-achats','buy-lisier','bac-intrants','pour-button'].forEach(id => initial.add(id));
    }
    if ((saved?.owned ?? []).filter(q => q > 0).length >= 2) initial.add('cn-ratio');
    if (saved?.epurateurOk)  initial.add('epurateur-intro');
    if (saved?.compresseurOk) initial.add('compresseur-intro');
    if (saved?.injected) {
      initial.add('raccordement');
      // Joueurs déjà injectés → pré-marquer gnv-intro + tractor-fleet
      // pour ne pas bloquer l'accès aux améliorations GNV/tracteurs au chargement
      initial.add('gnv-intro');
      initial.add('tractor-fleet');
    }
    return initial;
  });
  const [activeTuto, setActiveTuto] = useState(null);

  const markTutoSeen = useCallback((id) => {
    setSeenTutos(prev => {
      const next = new Set(prev);
      next.add(id);
      try { localStorage.setItem('mt_seen_tutos_v1', JSON.stringify([...next])); } catch {}
      return next;
    });
    setActiveTuto(null);
  }, []);

  const skipAllTutos = useCallback(() => {
    const all = new Set(TUTORIAL_STEPS.map(s => s.id));
    try { localStorage.setItem('mt_seen_tutos_v1', JSON.stringify([...all])); } catch {}
    setSeenTutos(all);
    setActiveTuto(null);
  }, []);

  const replayTutos = useCallback(() => {
    try { localStorage.removeItem('mt_seen_tutos_v1'); } catch {}
    setSeenTutos(new Set());
    setActiveTuto(null);
  }, []);
  // ─────────────────────────────────────────────────────────────────────────

  const [owned,   setOwned]   = useState(saved?.owned   ?? [0,0,0,0,0,0,0]);

  const [stock,   setStock]   = useState(() => offlineGains?.remainingStock  ?? saved?.stock  ?? 0);
  const [pouring, setPouring] = useState(false);
  const [pourProg,setPourProg]= useState(0);

  const [charge,    setCharge]    = useState(() => offlineGains?.remainingCharge ?? saved?.charge ?? 0);
  const [bubbles, setBubbles] = useState([]);

  // v25.0 — yield moyen pondéré (m³ CH₄/t) du contenu BAC et digesteur.
  // Mis à jour par moyenne pondérée à chaque dépôt tracteur / vidage BAC.
  // 0 quand le réservoir est vide (pas de yield à propager).
  // Migration : si l'ancien save a stock/charge > 0 mais pas de yield, on seed avec
  //             la moyenne pondérée des intrants possédés (best-effort, évite la prod nulle).
  const _migratedDefaultYield = (() => {
    const o = saved?.owned || [0,0,0,0,0,0,0];
    const totalFill = o.reduce((a,q,i) => a + fillFor(i, q), 0);
    if (totalFill <= 0) return 0;
    return o.reduce((a,q,i) => a + fillFor(i, q) * UPGRADES[i].realYield, 0) / totalFill;
  })();
  const [stockYield,  setStockYield]  = useState(() => {
    if (offlineGains?.remainingStockYield != null) return offlineGains.remainingStockYield;
    if (saved?.stockYield != null) return saved.stockYield;
    return (saved?.stock > 0) ? _migratedDefaultYield : 0;
  });
  const [chargeYield, setChargeYield] = useState(() => {
    if (offlineGains?.remainingChargeYield != null) return offlineGains.remainingChargeYield;
    if (saved?.chargeYield != null) return saved.chargeYield;
    return (saved?.charge > 0) ? _migratedDefaultYield : 0;
  });
  // v25.0.9 — Composition réelle du BAC et du digesteur (en tonnes par intrant).
  //   Source de vérité du yield (calculable comme yield = Σ(c[i]×realYield[i]) / Σc[i]).
  //   Migration : si save < v25.0.9, on reconstitue une composition cohérente avec
  //               la masse totale × yield moyen, en attribuant proportionnellement
  //               aux intrants possédés (best-effort).
  const _migrateComposition = (totalMass, yieldMoyen, ownedArr) => {
    if (totalMass <= 0) return [0,0,0,0,0,0,0];
    // On répartit proportionnellement à fillFor pour matcher le yield moyen au mieux
    const totalFill = ownedArr.reduce((a,q,i) => a + fillFor(i, q), 0);
    if (totalFill <= 0) {
      // Aucun intrant possédé : impossible à reconstituer — on attribue tout au Lisier (best fallback)
      return [totalMass, 0, 0, 0, 0, 0, 0];
    }
    return ownedArr.map((q, i) => totalMass * fillFor(i, q) / totalFill);
  };
  const [stockComposition, setStockComposition] = useState(() => {
    if (offlineGains?.remainingStockComposition) return offlineGains.remainingStockComposition;
    if (Array.isArray(saved?.stockComposition) && saved.stockComposition.length === 7) {
      return saved.stockComposition;
    }
    // Migration depuis ancienne save (yield scalaire)
    const o = saved?.owned || [0,0,0,0,0,0,0];
    return _migrateComposition(saved?.stock || 0, saved?.stockYield || _migratedDefaultYield, o);
  });
  const [chargeComposition, setChargeComposition] = useState(() => {
    if (offlineGains?.remainingChargeComposition) return offlineGains.remainingChargeComposition;
    if (Array.isArray(saved?.chargeComposition) && saved.chargeComposition.length === 7) {
      return saved.chargeComposition;
    }
    const o = saved?.owned || [0,0,0,0,0,0,0];
    return _migrateComposition(saved?.charge || 0, saved?.chargeYield || _migratedDefaultYield, o);
  });

  const [epurateurOk,  setEpurateurOk]  = useState(saved?.epurateurOk  ?? false);
  const [compresseurOk,setCompresseurOk]= useState(saved?.compresseurOk ?? false);
  const [injected,     setInjected]     = useState(saved?.injected     ?? false);
  const [unlockAnim,    setUnlockAnim]   = useState(null);
  const [sceneZoomAnim, setSceneZoomAnim] = useState(false);

  // ── GNV STATE ──
  const [gnvStations, setGnvStations] = useState(saved?.gnvStations ?? 0);
  const [gnvSplit,    setGnvSplit]    = useState(saved?.gnvSplit    ?? 20);
  const [gnvBm,       setGnvBm]       = useState(() => (saved?.gnvBm ?? 0) + (offlineGains?.gnvBmGained || 0));
  // v25.7 — tractorGnv dérivé de tractorGnvArr (voir plus bas, après déclaration de l'array)
  // Migration save legacy effectuée au niveau de tractorGnvArr
  const [digesteurs,  setDigesteurs]  = useState(saved?.digesteurs  ?? 1);
  const [euros,       setEuros]       = useState(() => (saved?.euros ?? 0) + (offlineGains?.eurosGained || 0));
  const [autoDump,    setAutoDump]    = useState(saved?.autoDump    ?? false);
  // v25.0.8 — seuil de déclenchement du déverseur automatique (% du BAC)
  //   Le déverseur automatique tente de déverser toutes les 2s, mais ne le
  //   fait QUE si le stock dépasse autoDumpThreshold % de stockMax.
  //   0%   = déverse dès qu'il y a de la matière (comportement v25.0)
  //   50%  = déverse seulement si BAC à moitié plein (compromis par défaut)
  //   90%  = quasi anti-saturation (laisse le BAC se remplir avant)
  const [autoDumpThreshold, setAutoDumpThreshold] = useState(saved?.autoDumpThreshold ?? 0);
  // ── FLOTTE TRACTEURS (v23) ──
  const [tractorCount,      setTractorCount]      = useState(saved?.tractorCount      ?? 1);
  const [tractorSpeedBoost, setTractorSpeedBoost] = useState(saved?.tractorSpeedBoost ?? false);
  const [tractorTrailers,   setTractorTrailers]   = useState(() => Array.isArray(saved?.tractorTrailers) ? saved.tractorTrailers : [false, false, false]);
  const [tractorGnvArr,     setTractorGnvArr]     = useState(() => {
    // v25.7 — migration : si saved.tractorGnvArr existe, l'utiliser
    if (Array.isArray(saved?.tractorGnvArr)) return saved.tractorGnvArr;
    // Sinon, migrer l'ancien flag global tractorGnv vers le 1ᵉʳ tracteur
    if (saved?.tractorGnv === true) return [true, false, false];
    return [false, false, false];
  });
  // v25.7 — tractorGnv dérivé : true dès qu'au moins un tracteur est converti (compat cloud + badges)
  const tractorGnv = tractorGnvArr.some(Boolean);

  const [localStock,     setLocalStock]     = useState(() => offlineGains?.remainingLocalStock ?? (Array.isArray(saved?.localStock)     && saved.localStock.length === 7     ? saved.localStock     : [0,0,0,0,0,0,0]));
  const [zoneState,      setZoneState]      = useState(() => offlineGains?.resetZoneState      ?? (Array.isArray(saved?.zoneState)      && saved.zoneState.length === 7      ? saved.zoneState      : ["ok","ok","ok","ok","ok","ok","ok"]));
  const [saturatedSince, setSaturatedSince] = useState(() => offlineGains?.resetSaturatedSince ?? (Array.isArray(saved?.saturatedSince) && saved.saturatedSince.length === 7 ? saved.saturatedSince : [null,null,null,null,null,null,null]));
  const [offlineUntil,   setOfflineUntil]   = useState(() => offlineGains?.resetOfflineUntil   ?? (Array.isArray(saved?.offlineUntil)   && saved.offlineUntil.length === 7   ? saved.offlineUntil   : [null,null,null,null,null,null,null]));
  // v25.1.25 — Animation au paiement de la relance (timestamp par zone, null si pas d'anim active)
  const [relaunchAnim,   setRelaunchAnim]   = useState([null,null,null,null,null,null,null]);

    const ts = (saved?.bm || 0) + (saved?.gnvBm || 0);

    if (ts >= 100) alreadySeen.push("go_mwh");
    if (ts >= 10000) alreadySeen.push("cpb");

  const [scoreF,      setScoreF]    = useState([]);

  // ── CLOUD LOAD on mount ──────────────────────────────────────────────────
  useEffect(() => {

      const localMs   = saved?.lastSaved || 0;
      if (remoteMs >= localMs) {
        // Supabase est plus récent (ou égal) → on applique AVEC catch-up offline
        // Bug v19 : écraser avec d.stock/d.charge/d.bm annulait les gains calculés
        // depuis localStorage. Fix : recalculer les gains offline depuis remoteMs.
        const cloudOwned = Array.isArray(d.owned) ? d.owned : (d.owned ? JSON.parse(d.owned) : [0,0,0,0,0,0,0]);
        const cloudSv = {
          lastSaved:   remoteMs,
          owned:       cloudOwned,
          stock:       d.stock || 0,
          charge:      d.charge || 0,
          stockYield:  d.stock_yield  || 0,
          chargeYield: d.charge_yield || 0,

        const cg = calcOffline(cloudSv); // cloud gains

        if (d.mo            != null) setMo(d.mo);

        }
        if (d.tut_step    != null) setTutStep(d.tut_step);
        if (d.owned       != null) setOwned(cloudOwned);
        // stock / charge : valeurs post-catch-up
        if (d.stock       != null) setStock(cg?.remainingStock ?? d.stock);
        if (d.charge      != null) setCharge(cg?.remainingCharge ?? d.charge);
        // v25.0 — yields post-catch-up (fallback save brute si pas de cg)

        // v25.0.9 — compositions post-catch-up
        const _cloudStockComp  = Array.isArray(d.stock_composition)  && d.stock_composition.length === 7  ? d.stock_composition  : null;
        const _cloudChargeComp = Array.isArray(d.charge_composition) && d.charge_composition.length === 7 ? d.charge_composition : null;
        if (_cloudStockComp  != null) setStockComposition(cg?.remainingStockComposition  ?? _cloudStockComp);
        if (_cloudChargeComp != null) setChargeComposition(cg?.remainingChargeComposition ?? _cloudChargeComp);
        if (d.epurateur   != null) setEpurateurOk(!!d.epurateur);
        if (d.compresseur != null) setCompresseurOk(!!d.compresseur);
        if (d.is_connected != null) setInjected(!!d.is_connected);
        if (d.gnv_stations != null) setGnvStations(d.gnv_stations);
        if (d.gnv_split   != null) setGnvSplit(d.gnv_split);
        // v25.7 — tractor_gnv legacy : migré vers tractor_gnv_arr (cf. bloc plus bas)
        if (d.digesteurs  != null) setDigesteurs(d.digesteurs);
        if (d.auto_dump   != null) setAutoDump(!!d.auto_dump);
        // v25.0.8 — seuil de déclenchement du déverseur
        if (d.auto_dump_threshold != null) setAutoDumpThreshold(d.auto_dump_threshold);
        // v23 — flotte tracteurs
        if (d.tractor_count       != null) setTractorCount(d.tractor_count);
        if (d.tractor_speed_boost != null) setTractorSpeedBoost(!!d.tractor_speed_boost);
        if (Array.isArray(d.tractor_trailers)) setTractorTrailers(d.tractor_trailers);
        // v25.7 — tractor_gnv_arr : utilisé directement si présent, sinon migration depuis tractor_gnv legacy
        if (Array.isArray(d.tractor_gnv_arr)) {
          setTractorGnvArr(d.tractor_gnv_arr);
        } else if (d.tractor_gnv === true) {
          setTractorGnvArr([true, false, false]);
        }
        if (d.pinned_zones        != null) {
          const pz = Array.isArray(d.pinned_zones) ? d.pinned_zones : (typeof d.pinned_zones === 'string' ? (()=>{try{return JSON.parse(d.pinned_zones);}catch{return [];}})() : []);
          setPinnedZones(pz);

        // v24 — gisements locaux
        const parseArr7 = v => {
          const arr = Array.isArray(v) ? v : (typeof v === 'string' ? (()=>{try{return JSON.parse(v);}catch{return null;}})() : null);
          return Array.isArray(arr) && arr.length === 7 ? arr : null;
        };
        if (d.local_stock     != null) { const a = parseArr7(d.local_stock);     if (a) setLocalStock(a); }
        if (d.zone_state      != null) { const a = parseArr7(d.zone_state);      if (a) setZoneState(a); }
        if (d.saturated_since != null) { const a = parseArr7(d.saturated_since); if (a) setSaturatedSince(a); }
        if (d.offline_until   != null) { const a = parseArr7(d.offline_until);   if (a) setOfflineUntil(a); }
        if (typeof d.reliability === 'number') setReliability(d.reliability);

        // Si localStorage n'avait pas de gains mais le cloud en a (cross-device) →

        if (cg && !offlineGains) {
          setCloudOfflineGains(cg);

        // ── Reconciliation seenRewards post-load (v25.2.3) ─────────────────
        // seenRewards n'est PAS persisté côté Supabase (uniquement localStorage).

        const _ts = (d.score_network || 0) + (d.gnv_bm || 0);
        const _inferred = [];
        if (d.is_connected && _ts >= 100)              _inferred.push("go_mwh");
        if (d.is_connected && _ts >= 10000)            _inferred.push("cpb");
        if (d.is_connected && (d.digesteurs || 1) >= 2) _inferred.push("quali");
        if (_ts >= 1000000)   _inferred.push("foyers100");
        if (_ts >= 10000000)  _inferred.push("foyers1k");
        if (_ts >= 100000000) _inferred.push("vert");
        if (_inferred.length > 0) {
          setSeenRewards(prev => {
            const merged = new Set([...prev, ..._inferred]);
            return merged.size === prev.length ? prev : Array.from(merged);

        }

  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // ── Anti-deadlock post-sync ─────────────────────────────────────────────────

  useEffect(() => {

  const [notif,       setNotif]     = useState(null);

  }, [tab, rankTab, myRankTab, myRankMode, cumulativeView, region, loadLeaderboardByMode]);

  // ── SAUVEGARDE AUTO ────────────────────────────────────────────────────────
  const stateRef = useRef({});
  useEffect(() => {
    stateRef.current = { mo,bm,buffer,tutStep,owned,stock,charge,stockYield,chargeYield,stockComposition,chargeComposition,epurateurOk,compresseurOk,injected,gnvStations,gnvSplit,gnvBm,tractorGnv,digesteurs,euros,autoDump,autoDumpThreshold,seenRewards,tractorCount,tractorSpeedBoost,tractorTrailers,tractorGnvArr,pinnedZones,localStock,zoneState,saturatedSince,offlineUntil,reliability };
  });

    // Supabase — source de vérité primaire
    // v25.0.2 — pid DOIT matcher l'id généré au register (sinon 2 lignes pour 1 maia)
    //   Register : `${maia}`.toLowerCase().replace(/\s+/g,'_')

    const pid = `${maia || username}`.toLowerCase().replace(/\s+/g,'_');

    });
    // Full state — best-effort
    supabaseUpsert({
      id:           pid,
      maia:         maia || undefined,
      username,
      region,
      score_network: stateRef.current.bm,
      score_gnv:    stateRef.current.gnvBm,
      is_connected: stateRef.current.injected,

      stock:        stateRef.current.stock,

      auto_dump:    stateRef.current.autoDump,

      offline_until:       stateRef.current.offlineUntil,
      reliability:         stateRef.current.reliability,

      stock_yield:         stateRef.current.stockYield,

      stock_composition:   stateRef.current.stockComposition,

    });
  }, [SAVE_KEY, username, region, maia]);
  useEffect(() => { const id=setInterval(saveGame,15000); return ()=>clearInterval(id); }, [saveGame]);

  // ── v24.3 : DÉCONNEXION ────────────────────────────────────────────────────
  // Sauvegarde finale (best-effort) → purge le token de session local → reload.
  // La save de jeu côté Supabase reste intacte (clef = MAIA), donc la progression
  // est intégralement récupérée à la prochaine connexion.
  const handleLogout = useCallback(() => {
    if (!window.confirm("Se déconnecter ?\n\nTa progression est sauvegardée — tu la retrouveras à la prochaine connexion.")) return;
    try { saveGame(); } catch {}
    // v25.13 — invalide le token côté serveur + purge local
    const tok = getSessionToken();
    if (tok) { try { _callPlayersApi({ action: "logout", session_token: tok }); } catch {} }
    try { localStorage.removeItem('mt_login_v2'); } catch {}
    try { setSessionToken(null); } catch {}

    setTimeout(() => location.reload(), 600);
  }, [saveGame]);

  // ── BADGES : détecte les transitions locked→unlocked et alimente la file ─
  // v25.2.3 — gate sur cloudSynced : on ne snapshot la référence qu'APRÈS
  //           le chargement Supabase, sinon recharger l'app avec une save cloud

  useEffect(() => {

    const doneNow = new Set(list.filter(b => b.done).map(b => b.id));

      prevBadgeDoneRef.current = doneNow;

    }
    const newlyDone = list.filter(b => b.done && !prevBadgeDoneRef.current.has(b.id));
    if (newlyDone.length > 0) {
      setBadgeQueue(q => [...q, ...newlyDone]);

  const chargeRef       = useRef(charge);

  // ── CATCH-UP : appliqué au retour d'arrière-plan ──────────────────────────
  // v24 : on n'utilise PLUS fillRate → stock direct. À la place :
  //   1) On remplit les tampons locaux jusqu'à 100 % (pas d'escalation offline)

  //   3) On reset zoneState aux zones non offline → 'ok'
  //   4) Digestion classique (inchangée)
  // Refs miroirs v24 (déclarées AVANT applyCatchUp pour respecter l'ordre lexical)
  const ownedRefV24        = useRef(owned);           useEffect(()=>{ownedRefV24.current=owned;},[owned]);
