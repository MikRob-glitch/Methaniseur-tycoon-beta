// รขโโฌรขโโฌรขโโฌ DIGESTEUR MANIFOLD รขโฌโ collecteur biogaz horizontal รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
function DigesteurManifold({ digesteurs, isDigesting }) {
  // IMPORTANT: on utilise DW (largeur dรยดme) pour le positionnement,
  // pas TW (cuve), car la rangรยฉe de digesteurs est espacรยฉe selon DW.
  const UNIT_W = digesteurs === 1 ? 88 : digesteurs === 2 ? 74 : 60;
  const GAP    = digesteurs === 3 ? 4 : 8;
  const totalW = digesteurs * UNIT_W + (digesteurs - 1) * GAP;
  // v25.1.11 : EXTENSION vers la GAUCHE pour que le tube collecteur sorte de l'รยฉcran.
  // v25.1.14 : SVG en position:absolute pour que l'extension ne force PAS la largeur
  //   de la colonne digesteurs (qui sur Android coupait le bac รย  droite).
  const LEFT_EXT = 140;
  const svgW   = totalW + LEFT_EXT;
  const svgH   = 38;
  const cY     = 14;
  const centers = Array.from({length:digesteurs}, (_,i) => LEFT_EXT + i*(UNIT_W+GAP) + UNIT_W/2);
  const x1 = centers[0], xN = centers[digesteurs-1];

  return (
    // v25.1.14 : Wrapper avec hauteur rรยฉservรยฉe 38px et width:totalW (sans LEFT_EXT)
    // pour que le flex parent calcule la largeur SANS l'extension. Le SVG en absolu
    // dรยฉborde visuellement รย  gauche sans impacter le layout.
    <div style={{position:"relative", width:`${totalW}px`, height:`${svgH}px`, overflow:"visible"}}>
      <svg width={svgW} height={svgH} viewBox={`0 0 ${svgW} ${svgH}`}
        style={{position:"absolute", right:0, top:0, overflow:"visible", display:"block"}}>

        {/* Branches vers chaque digesteur (v25.1.23 : รยฉteintes si !isDigesting) */}
        {centers.map((px,i) => (
          <React.Fragment key={i}>
            <rect x={px-4} y={cY} width={8} height={svgH-cY} rx={3}
              fill="#1E3848" stroke="rgba(74,158,219,.3)" strokeWidth=".8"/>
            <rect x={px-2} y={cY+2} width={4} height={svgH-cY-4} rx={2}
              fill={isDigesting ? "rgba(102,238,136,.4)" : "rgba(74,158,219,.15)"}
              style={{animation: isDigesting ? "chargePulse 1.4s ease infinite" : "none"}}/>
          </React.Fragment>
        ))}

        {/* v25.1.11 รขโฌโ Tube collecteur รโฐTENDU vers la gauche (x=0 = bord รยฉcran)
            jusqu'aux digesteurs (xN). L'animation va vers la GAUCHE (gasFlowReverse). */}
        <rect x={0} y={cY-4} width={xN-0+4} height={8} rx={4}
          fill="#1E3848" stroke="rgba(74,158,219,.42)" strokeWidth="1.5"/>
        <line x1={0} y1={cY} x2={xN} y2={cY}
          stroke="rgba(102,238,136,.6)" strokeWidth="4"
          strokeDasharray="10 8" strokeLinecap="round"
          style={{animation: isDigesting ? "gasFlowReverse 1s linear infinite" : "none"}}/>

        {/* Flรยจche pointant vers la GAUCHE (sortie hors champ vers la cuve) */}
        <polygon points={`-2,${cY} 10,${cY-6} 10,${cY+6}`}
          fill={isDigesting ? "rgba(102,238,136,.85)" : "rgba(74,158,219,.5)"}/>

        <text x={LEFT_EXT-4} y={cY-9} textAnchor="end"
          fontSize="8" fill={isDigesting ? "rgba(102,238,136,.95)" : "rgba(74,158,219,.6)"}
          fontWeight="700" letterSpacing=".3">
          รขโโฌ Biogaz vers la cuve
        </text>

        {/* Badge Biogaz (centrรยฉ entre les digesteurs, inchangรยฉ) */}
        {digesteurs > 1 && (
          <React.Fragment>
            <rect x={(x1+xN)/2-19} y={0} width={38} height={12} rx={6}
              fill="rgba(11,22,35,.9)" stroke="rgba(74,158,219,.28)" strokeWidth="1"/>
            <text x={(x1+xN)/2} y={9} textAnchor="middle"
              fontSize="7" fill="rgba(74,158,219,.9)" fontWeight="700">Biogaz</text>
          </React.Fragment>
        )}
      </svg>
    </div>
  );
}

// รขโโฌรขโโฌรขโโฌ DIGESTEUR FEEDER รขโฌโ distributeur d'intrants avec vis sans fin รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
// v25.1.18 รขโฌโ Symรยฉtrique du DigesteurManifold mais avec sรยฉmantique diffรยฉrente :
//   รยท Tube horizontal SOUS les dรยดmes (au-dessus des cuves) qui distribue les intrants
//   รยท Branches MONTANTES vers chaque digesteur (les intrants entrent par le haut/dรยดme)
//   รยท Animation = vis sans fin (chevrons /// qui dรยฉfilent de droite รย  gauche)
//   รยท Active uniquement quand `pouring=true` (le levier dรยฉclenche la vis)
//   รยท S'รยฉtend vers la DROITE (vers le bac) au lieu de gauche (collecteur biogaz)
//   รยท Couleur ambre/terre (intrants solides) plutรยดt que vert (gaz)
function DigesteurFeeder({ digesteurs, pouring }) {
  // v25.1.21 รขโฌโ Simplifiรยฉ : seulement le tube horizontal SOUS les digesteurs avec
  // branches MONTANTES vers le bas de chaque digesteur. La connexion vers le bac
  // est dรยฉsormais gรยฉrรยฉe par un <Pipe> ancrรยฉ (cf. AnchorProvider de la VUE 1).
  const UNIT_W = digesteurs === 1 ? 88 : digesteurs === 2 ? 74 : 60;
  const GAP    = digesteurs === 3 ? 4 : 8;
  const totalW = digesteurs * UNIT_W + (digesteurs - 1) * GAP;
  const svgH   = 22;
  const cY     = 8;
  const centers = Array.from({length:digesteurs}, (_,i) => i*(UNIT_W+GAP) + UNIT_W/2);
  const x1 = centers[0], xN = centers[digesteurs-1];

  return (
    <div style={{position:"relative", width:`${totalW}px`, height:`${svgH}px`}}>
      <svg width={totalW} height={svgH} viewBox={`0 0 ${totalW} ${svgH}`}
        style={{display:"block", overflow:"visible"}}>

        {/* Branches MONTANTES vers chaque digesteur */}
        {centers.map((px,i) => (
          <React.Fragment key={i}>
            <rect x={px-4} y={0} width={8} height={cY} rx={3}
              fill="#3a2c10" stroke="rgba(232,160,32,.3)" strokeWidth=".8"/>
            <rect x={px-2} y={1} width={4} height={cY-2} rx={2}
              fill={pouring ? "rgba(232,160,32,.85)" : "rgba(232,160,32,.18)"}
              style={{animation: pouring ? "chargePulse 1.4s ease infinite" : "none"}}/>
          </React.Fragment>
        ))}

        {/* TUBE horizontal complet */}
        <rect x={x1-4} y={cY} width={(xN-x1)+8} height={9} rx={4}
          fill="#3a2c10" stroke="rgba(232,160,32,.42)" strokeWidth="1.5"/>

        {/* VIS SANS FIN : 2 brins dรยฉfilants pour effet hรยฉlicoรยฏdal */}
        <line x1={x1-2} y1={cY+4.5} x2={xN+2} y2={cY+4.5}
          stroke="rgba(245,190,80,.85)" strokeWidth="2.5"
          strokeDasharray="3 5" strokeLinecap="round"
          style={{animation: pouring ? "augerSpin .35s linear infinite" : "none"}}/>
        <line x1={x1-2} y1={cY+4.5} x2={xN+2} y2={cY+4.5}
          stroke="rgba(232,160,32,.6)" strokeWidth="1.5"
          strokeDasharray="2 6" strokeDashoffset="3" strokeLinecap="round"
          style={{animation: pouring ? "augerSpin .35s linear infinite" : "none"}}/>

        {/* Embout DROIT รขโฌโ point de raccordement vers le bac (sera ciblรยฉ par l'ancre feeder.right) */}
        <rect x={xN+2} y={cY-2} width={6} height={13} rx={2}
          fill="#5a4520" stroke="rgba(232,160,32,.6)" strokeWidth=".8"
          data-anchor-target="feeder-right-embout"/>

        {/* Badge "Intrants" centrรยฉ sur le tube */}
        {digesteurs > 1 && (
          <React.Fragment>
            <rect x={(x1+xN)/2-22} y={cY+13} width={44} height={9} rx={4}
              fill="rgba(11,22,35,.9)" stroke="rgba(232,160,32,.28)" strokeWidth=".8"/>
            <text x={(x1+xN)/2} y={cY+19} textAnchor="middle"
              fontSize="6.5" fill="rgba(245,190,80,.85)" fontWeight="700">Intrants</text>
          </React.Fragment>
        )}
      </svg>
    </div>
  );
}

// รขโโฌรขโโฌรขโโฌ SINGLE DIGESTEUR รขโฌโ dรยดme CSS garanti รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
function SingleDigesteur({ index, total, bubbles, chargePct, isDigesting, bmPerHour, isNew }) {
  const TW   = total===1 ? 80 : total===2 ? 66 : 52;   // largeur cuve
  const DW   = total===1 ? 88 : total===2 ? 74 : 60;   // largeur dรยดme
  const TH   = total===1 ? 76 : total===2 ? 68 : 58;   // hauteur cuve
  const PH   = total===1 ? 16 : total===2 ? 12 : 10;   // hauteur tuyau montant
  const DMIN = total===1 ? 24 : total===2 ? 20 : 16;   // dรยดme vide
  const DMAX = total===1 ? 66 : total===2 ? 56 : 44;   // dรยดme plein
  const domeH  = Math.round(DMIN + chargePct * (DMAX - DMIN));
  const liqH   = Math.round(chargePct * (TH - 4));
  const cx     = TW / 2;
  const b1Y    = Math.round(TH * 0.32);
  const b2Y    = Math.round(TH * 0.67);
  const bHalf  = Math.round(TW * 0.30);
  const oscDur = isDigesting ? `${(3.2 - chargePct * 1.8).toFixed(1)}s` : null;

  return (
    <div style={{
      display:"flex", flexDirection:"column", alignItems:"center",
      animation: isNew ? "digesteurAppear 0.8s cubic-bezier(.22,.68,0,1.2) forwards" : "none",
    }}>

      {/* Tuyau montant vers collecteur */}
      <div style={{
        width:"8px", height:`${PH}px`,
        background:"#1E3848", border:"1px solid rgba(74,158,219,.32)",
        borderRadius:"4px 4px 0 0", position:"relative", overflow:"hidden",
      }}>
        {isDigesting && (
          <div style={{
            position:"absolute", inset:"1px 1px 0",
            background:"repeating-linear-gradient(to bottom,rgba(102,238,136,.65) 0px,rgba(102,238,136,.65) 5px,transparent 5px,transparent 10px)",
            animation:"gasFlow .7s linear infinite",
          }}/>
        )}
      </div>

      {/* รขโโฌรขโโฌ DรโME CSS รขโฌโ demi-cercle, rendu garanti รขโโฌรขโโฌ */}
      <div style={{width:`${DW}px`, position:"relative"}}>
        <div style={{
          width:`${DW}px`,
          height:`${domeH}px`,
          borderRadius:"50% 50% 0 0 / 100% 100% 0 0",
          background: isDigesting
            ? "linear-gradient(180deg,#D8F0B0 0%,#7CC84C 42%,#2E7020 100%)"
            : "linear-gradient(180deg,#5A7A50 0%,#2A4A22 60%,#162A10 100%)",
          border:`3px solid ${isDigesting?"#9ADA60":"#3A5A30"}`,
          borderBottom:"none",
          position:"relative",
          overflow:"hidden",
          boxShadow: isDigesting
            ? `0 0 ${14+chargePct*22}px rgba(100,220,60,${.4+chargePct*.3}),0 -3px 16px rgba(100,220,60,.2)`
            : "none",
          transition:"height .35s cubic-bezier(.22,.68,0,1.2),box-shadow .6s,background .8s,border-color .8s",
          animation: isDigesting ? "domePulse 3.5s ease-in-out infinite" : "none",
          flexShrink:0,
        }}>
          {/* Reflet gauche (blur) */}
          <div style={{
            position:"absolute", top:"10%", left:"12%",
            width:"18%", height:"62%",
            background:"rgba(255,255,255,.22)",
            borderRadius:"50%", filter:"blur(4px)",
          }}/>
          {/* Sangles */}
          {[30,63].map((top,i) => (
            <div key={i} style={{
              position:"absolute", left:0, right:0, top:`${top}%`,
              height:"3px", background:"rgba(15,50,10,.45)", borderRadius:"2px",
            }}/>
          ))}
        </div>
      </div>

      {/* Collier de jonction cuve รขโ โ dรยดme */}
      <div style={{
        width:`${TW+8}px`, height:"10px", flexShrink:0,
        background:"#1C3040", border:"1.5px solid rgba(100,170,220,.38)",
        borderRadius:"3px", display:"flex", alignItems:"center", justifyContent:"space-evenly",
      }}>
        {[0,1,2,3,4].map(i => (
          <div key={i} style={{
            width:"5px", height:"5px", borderRadius:"50%",
            background:"#0E1E2C", border:"1px solid rgba(74,158,219,.35)",
          }}/>
        ))}
      </div>

      {/* รขโโฌรขโโฌ CUVE รขโโฌรขโโฌ */}
      <div style={{
        width:`${TW}px`, height:`${TH}px`, flexShrink:0,
        background:"#182838", borderRadius:"0 0 6px 6px",
        position:"relative", overflow:"hidden",
      }}>
        {/* Face gauche รยฉclairรยฉe */}
        <div style={{position:"absolute",top:0,left:0,bottom:0,width:"9px",background:"rgba(255,255,255,.04)"}}/>
        {/* Face droite ombrรยฉe */}
        <div style={{position:"absolute",top:0,right:0,bottom:0,width:"9px",background:"rgba(0,0,0,.2)"}}/>

        {/* Niveau digestat */}
        {liqH > 0 && (
          <div style={{
            position:"absolute", bottom:0, left:"1px", right:"1px",
            height:`${liqH}px`, background:"rgba(28,120,55,.5)",
            borderRadius:"0 0 5px 5px", transition:"height .35s ease",
          }}>
            {chargePct > 0.05 && (
              <div style={{
                position:"absolute", top:"-3px", left:0, right:0,
                height:"5px", background:"rgba(60,195,88,.35)",
                borderRadius:"50%", animation:"shimmer 2.5s ease infinite",
              }}/>
            )}
          </div>
        )}

        {/* Bandes de renfort */}
        {[22,52,80].map((p,i) => (
          <div key={i} style={{
            position:"absolute", left:0, right:0, top:`${p}%`,
            height:"2px", background:"rgba(74,130,190,.15)",
          }}/>
        ))}

        {/* Agitateur SVG */}
        <svg width={TW} height={TH} viewBox={`0 0 ${TW} ${TH}`}
          style={{position:"absolute",top:0,left:0,overflow:"visible"}}>

          {/* Axe */}
          <rect x={cx-3} y={2} width={6} height={TH-4} rx={3}
            fill="#1E3A50" stroke="rgba(74,158,219,.25)" strokeWidth=".8"/>

          {/* Carter moteur */}
          <rect x={cx-9} y={-1} width={18} height={11} rx={4}
            fill="#1A2E42" stroke="rgba(74,158,219,.3)" strokeWidth="1.2"/>

          {/* Pales niveau 1 */}
          <g style={{transformOrigin:`${cx}px ${b1Y}px`,
            animation:oscDur?`paddle-osc ${oscDur} ease-in-out infinite`:"none"}}>
            <rect x={cx-bHalf-3} y={b1Y-4} width={bHalf} height={7} rx={3.5}
              fill="#2B6A8A" stroke="rgba(74,158,219,.55)" strokeWidth="1"/>
            <rect x={cx+3} y={b1Y-4} width={bHalf} height={7} rx={3.5}
              fill="#2B6A8A" stroke="rgba(74,158,219,.55)" strokeWidth="1"/>
            <circle cx={cx} cy={b1Y} r={5}
              fill="#182E42" stroke="rgba(74,158,219,.4)" strokeWidth="1.5"/>
          </g>

          {/* Pales niveau 2 */}
          <g style={{transformOrigin:`${cx}px ${b2Y}px`,
            animation:oscDur?`paddle-osc-inv ${oscDur} ease-in-out infinite`:"none"}}>
            <rect x={cx-bHalf-3} y={b2Y-4} width={bHalf} height={7} rx={3.5}

      </div>

      {total > 1 && (
        <div style={{fontSize:"8px",color:"rgba(74,158,219,.65)",fontWeight:700,marginTop:"3px"}}>
          #{index+1}
        </div>
      )}
    </div>
  );
}
