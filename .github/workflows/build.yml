# ============================================================================
# Methaniseur Tycoon - Build & Deploy
# ============================================================================
# Declenche a chaque push sur main.
# 1. Precompile le JSX en JS vanilla (Babel CLI)
# 2. Assemble index.html (header sans Babel runtime + JS compile + tail)
# 3. Deploie sur GitHub Pages
# ============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer Babel
        run: |
          npm init -y --silent
          npm install --save-dev @babel/core @babel/cli @babel/preset-react --silent

      - name: Detecter JSX source
        id: jsx
        run: |
          JSX="methaniseur-tycoon-v25_16.jsx"
          if [ ! -f "$JSX" ]; then
            JSX=$(ls *.jsx 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$JSX" ]; then
            echo "Aucun fichier .jsx trouve"
            exit 1
          fi
          echo "file=$JSX" >> $GITHUB_OUTPUT
          echo "Source JSX: $JSX"

      - name: Compiler JSX
        run: |
          npx babel "${{ steps.jsx.outputs.file }}" \
            --presets @babel/preset-react \
            --out-file compiled.js
          echo "Compilation OK ($(wc -l < compiled.js) lignes)"

      - name: Assembler index.html
        run: |
          sed \
            -e '/babel\.min\.js/d' \
            -e 's|type="text/babel"[^>]*>|type="text/javascript">|' \
            -e 's|<meta name="apple-mobile-web-app-capable"|<meta name="mobile-web-app-capable" content="yes"/>\n  <meta name="apple-mobile-web-app-capable"|' \
            shell_header.html > _header_compiled.html
          cat _header_compiled.html compiled.js shell_tail.html > index.html
          echo "index.html assemble ($(wc -l < index.html) lignes, $(du -h index.html | cut -f1))"

      - name: Preparer les fichiers statiques
        run: |
          mkdir -p _site
          cp index.html sw.js manifest.json _site/
          for f in icon.svg icon-192.png icon-512.png icon-180.png; do
            [ -f "$f" ] && cp "$f" _site/
          done
          ls -lh _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
